<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>商業質感 - 火柴人五階變身 (鏡頭完美修正版)</title>
    <style>
        body {
            margin: 0;
            background-color: #0d0000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            color: white;
            font-family: 'Microsoft JhengHei', sans-serif;
            touch-action: none;
        }
        canvas {
            filter: contrast(1.1) brightness(1.2);
            cursor: pointer;
            z-index: 1;
            display: block;
        }
        #ui {
            position: absolute;
            top: env(safe-area-inset-top, 20px);
            width: 100%;
            display: flex;
            justify-content: center;
            pointer-events: none;
            z-index: 2;
            padding-top: 20px;
        }
        .text-container {
            text-align: center;
            text-shadow: 0 0 10px rgba(255,0,150,0.8);
            transition: text-shadow 0.3s ease;
        }
        .text-container.stage-5 {
            text-shadow: 0 0 15px rgba(0,255,255,0.9);
        }
        h2 { margin: 0; font-size: clamp(20px, 5vw, 28px); }
        p { margin: 5px 0 0 0; opacity: 0.7; font-size: clamp(12px, 3vw, 14px); }
        
        .toggle-container {
            position: absolute;
            top: calc(env(safe-area-inset-top, 20px) + 25px);
            left: max(20px, env(safe-area-inset-left, 20px));
            display: flex;
            align-items: center;
            pointer-events: auto;
            gap: 10px;
            z-index: 3;
        }
        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #333;
            transition: .4s;
            border-radius: 34px;
            box-shadow: 0 0 5px rgba(0,0,0,0.5) inset;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider {
            background-color: #ff0096;
            box-shadow: 0 0 10px #ff0096;
        }
        input:checked + .slider:before {
            transform: translateX(20px);
        }
        .toggle-label {
            font-size: clamp(12px, 3vw, 15px);
            font-weight: bold;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body>
    <div class="toggle-container">
        <label class="switch">
            <input type="checkbox" id="autoToggle" checked>
            <span class="slider"></span>
        </label>
        <span class="toggle-label">自動展示</span>
    </div>

    <div id="ui">
        <div class="text-container" id="textContainer">
            <h2 id="stageText">一階 (常態)</h2>
            <p>點擊畫面或切換左側開關</p>
        </div>
    </div>

    <canvas id="auraCanvas"></canvas>

<script>
const canvas = document.getElementById('auraCanvas');
const ctx = canvas.getContext('2d');
const stageText = document.getElementById('stageText');
const textContainer = document.getElementById('textContainer');
const autoToggle = document.getElementById('autoToggle');

let currentZoom = 1;
let currentFocusX = window.innerWidth / 2;
let currentFocusY = window.innerHeight * 0.75;

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    if(currentFocusY === 0) {
        currentFocusX = canvas.width / 2;
        currentFocusY = canvas.height * 0.75; 
    }
}

window.addEventListener('resize', resizeCanvas);
resizeCanvas(); 

const particles = [];
const lightning = [];
const snowflakes = []; 
const beamParticles = []; 

let currentStage = 1;
let autoTimer = null;
let time = 0; 

let fadeAlpha = 0; 
let fadeState = 'none'; 
let teleportTimer = 0;
let stage5Timer = 0;

function nextStage() {
    if (fadeState !== 'none' && currentStage === 5) return; 
    if (fadeState === 'teleport_prep') return;

    if (currentStage === 4) {
        fadeState = 'teleport_prep';
        teleportTimer = 0;
        clearInterval(autoTimer);
        return;
    }

    currentStage = currentStage < 5 ? currentStage + 1 : 1;
    
    if(currentStage === 5) {
        textContainer.classList.add('stage-5');
        clearInterval(autoTimer); 
        fadeState = 'wait';
        stage5Timer = 0;
    } else {
        textContainer.classList.remove('stage-5');
    }
}

canvas.addEventListener('click', nextStage);

autoToggle.addEventListener('change', (e) => {
    if (e.target.checked) {
        if (fadeState === 'none' && currentStage !== 5 && fadeState !== 'teleport_prep') {
            autoTimer = setInterval(nextStage, 3000);
        }
    } else {
        clearInterval(autoTimer);
    }
});

if (autoToggle.checked) {
    autoTimer = setInterval(nextStage, 3000);
}

class EnergyBeam {
    constructor(x, y, type, speedMult) {
        this.x = x + (Math.random() - 0.5) * 80;
        this.y = y;
        this.type = type;
        this.speedY = (Math.random() * -10 - 4) * speedMult;
        this.speedX = (Math.random() - 0.5) * 2;
        this.width = Math.random() * 5 + 1;
        this.height = Math.random() * 60 + 30;
        this.life = 1.0;
        this.decay = Math.random() * 0.02 + 0.015;
    }

    update() {
        this.y += this.speedY;
        this.x += this.speedX;
        this.life -= this.decay;
    }

    draw() {
        ctx.save();
        ctx.globalCompositeOperation = 'lighter';
        let alpha = this.life * 0.6; 
        
        let grad = ctx.createLinearGradient(this.x, this.y, this.x, this.y + this.height);
        if (this.type === 'cyan_inner') {
            grad.addColorStop(0, `rgba(200, 255, 255, ${alpha})`);
            grad.addColorStop(1, `rgba(0, 150, 255, 0)`);
        } else if (this.type === 'cyan_outer') {
            grad.addColorStop(0, `rgba(180, 240, 255, ${alpha * 0.8})`);
            grad.addColorStop(1, `rgba(0, 100, 255, 0)`);
        } else if (this.type === 'inner') {
            grad.addColorStop(0, `rgba(255, 200, 255, ${alpha})`);
            grad.addColorStop(1, `rgba(200, 0, 150, 0)`);
        } else {
            grad.addColorStop(0, `rgba(255, 255, 180, ${alpha})`);
            grad.addColorStop(1, `rgba(255, 100, 0, 0)`);
        }

        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.moveTo(this.x - this.width, this.y + this.height);
        ctx.lineTo(this.x, this.y);
        ctx.lineTo(this.x + this.width, this.y + this.height);
        ctx.fill();
        ctx.restore();
    }
}

class Lightning {
    constructor(x, y, colorHue) {
        this.x = x + (Math.random() - 0.5) * 160;
        this.y = y - Math.random() * 350;
        this.life = 1.0;
        this.colorHue = colorHue; 
        this.points = [{x: this.x, y: this.y}];
        for(let i=0; i<4; i++) {
            this.points.push({
                x: this.points[i].x + (Math.random() - 0.5) * 40,
                y: this.points[i].y - Math.random() * 30
            });
        }
    }
    draw() {
        ctx.save();
        ctx.globalCompositeOperation = 'lighter';
        ctx.strokeStyle = this.colorHue === 'cyan' 
            ? `rgba(180, 255, 255, ${this.life * 0.9})` 
            : `rgba(200, 220, 255, ${this.life * 0.8})`;
        ctx.lineWidth = 2 / currentZoom;
        ctx.beginPath();
        ctx.moveTo(this.points[0].x, this.points[0].y);
        for(let i=1; i<this.points.length; i++) ctx.lineTo(this.points[i].x, this.points[i].y);
        ctx.stroke();
        ctx.restore();
        this.life -= 0.12;
    }
}

class BeamParticle {
    constructor(startX, startY, angle) {
        this.x = startX + (Math.random() - 0.5) * 60;
        this.y = startY + (Math.random() - 0.5) * 60;
        let speed = Math.random() * 35 + 20;
        this.vx = Math.cos(angle) * speed;
        this.vy = Math.sin(angle) * speed;
        this.life = 1.0;
        this.size = Math.random() * 5 + 2;
    }
    update() {
        this.x += this.vx;
        this.y += this.vy;
        this.life -= 0.03;
    }
    draw() {
        ctx.save();
        ctx.globalCompositeOperation = 'lighter';
        ctx.fillStyle = `rgba(0, 255, 255, ${this.life})`;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
        ctx.fill();
        ctx.restore();
    }
}

class Snowflake {
    constructor() {
        this.x = Math.random() * canvas.width;
        this.y = -10 - (Math.random() * 50); 
        this.size = Math.random() * 2.5 + 0.5;
        this.opacity = Math.random() * 0.6 + 0.2;
        this.vx = 0; 
        this.vy = Math.random() * 1 + 0.5; 
        this.angle = Math.random() * Math.PI * 2;
        this.spin = (Math.random() - 0.5) * 0.05;
        this.wobble = Math.random() * 1.5; 
    }

    update(auraCenter, auraRadius, auraForce, globalWind) {
        this.angle += this.spin;
        let dx = this.x - auraCenter.x;
        let dy = this.y - auraCenter.y;
        let dist = Math.sqrt(dx * dx + dy * dy);

        if (dist < auraRadius) {
            let pushForce = ((auraRadius - dist) / auraRadius) * auraForce;
            this.vx += (dx / dist) * pushForce;
            this.vy += (dy / dist) * pushForce;
        }

        this.vx *= 0.92;
        this.vy *= 0.95;
        this.vy += 0.03; 
        if (this.vy > 3) this.vy = 3; 

        this.x += this.vx + Math.cos(this.angle) * this.wobble + globalWind;
        this.y += this.vy;

        if (this.x > canvas.width + 50) this.x = -50;
        if (this.x < -50) this.x = canvas.width + 50;
    }

    draw() {
        ctx.save();
        ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
    }
}

function drawBackgroundText(stage, glowIntensity) {
    const texts = {
        1: ["靜", "如", "止", "水"],
        2: ["蓄", "勢", "待", "發"],
        3: ["狂", "暴", "極", "限"],
        4: ["無", "我", "境", "界"],
        5: ["毀", "天", "滅", "地"]
    };
    
    ctx.save();
    let fontSize = Math.max(30, Math.min(canvas.width * 0.08, 50));
    ctx.font = `bold ${fontSize}px 'Microsoft JhengHei'`;
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    
    ctx.shadowBlur = glowIntensity > 0 ? 20 : 0;
    
    if (stage === 5) {
        ctx.shadowColor = "rgba(0, 255, 255, 0.9)";
        ctx.fillStyle = "rgba(230, 255, 255, 0.9)";
    } else {
        ctx.shadowColor = stage === 4 ? "rgba(255, 200, 255, 0.8)" : "rgba(255, 0, 150, 0.8)";
        ctx.fillStyle = stage === 4 ? "rgba(255, 240, 255, 0.8)" : "rgba(255, 255, 255, 0.7)";
    }
    
    let textX = canvas.width > 600 ? canvas.width - 80 : canvas.width - 40; 
    let startY = canvas.height / 2 - (fontSize * 2);
    let spacing = fontSize * 1.2;

    const chars = texts[stage];
    for (let i = 0; i < chars.length; i++) {
        ctx.fillText(chars[i], textX, startY + i * spacing);
    }
    ctx.restore();
}

function drawKamehameha(startX, startY, angle, globalTime) {
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    
    let length = canvas.width * 2.5; 
    let endX = startX + Math.cos(angle) * length;
    let endY = startY + Math.sin(angle) * length;

    let pulse = Math.sin(globalTime * 0.5) * 10;
    let fastPulse = Math.sin(globalTime * 2.0) * 8;
    let coreWidth = 25 + pulse * 0.5 + fastPulse;
    let outerWidth = 80 + pulse * 2;

    ctx.beginPath();
    ctx.moveTo(startX, startY);
    ctx.lineTo(endX, endY);
    ctx.strokeStyle = `rgba(0, 200, 255, 0.5)`;
    ctx.lineWidth = outerWidth;
    ctx.lineCap = "round";
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(startX, startY);
    ctx.lineTo(endX, endY);
    ctx.strokeStyle = `rgba(255, 255, 255, 0.9)`;
    ctx.lineWidth = coreWidth;
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(startX, startY, coreWidth * 1.8, 0, Math.PI * 2);
    let grad = ctx.createRadialGradient(startX, startY, 0, startX, startY, outerWidth * 1.3);
    grad.addColorStop(0, 'white');
    grad.addColorStop(0.3, 'rgba(0, 255, 255, 0.8)');
    grad.addColorStop(1, 'rgba(0, 200, 255, 0)');
    ctx.fillStyle = grad;
    ctx.fill();

    ctx.restore();
}

function drawStickman(cx, cy, stage, glowIntensity, fadeState) {
    ctx.save();
    ctx.lineWidth = 5 / currentZoom; 
    ctx.strokeStyle = "#ffffff";
    ctx.lineCap = "round";
    ctx.lineJoin = "round";
    
    ctx.shadowBlur = glowIntensity;
    
    if (stage === 5) {
        ctx.shadowColor = "rgba(0, 255, 255, 1)"; 
    } else if (stage === 4) {
        ctx.shadowColor = "rgba(255, 200, 255, 1)"; 
    } else {
        ctx.shadowColor = "rgba(255, 0, 150, 1)";
    }

    let headY, bodyTop, bodyBot, leftArm, rightArm, leftLeg, rightLeg;

    // 【修正】移除了所有造成雙重位移的 cy 加減法，現在人物位置會跟氣焰中心完美對齊
    if (fadeState === 'teleport_prep') {
        headY = cy - 80; bodyTop = cy - 65; bodyBot = cy - 20;
        leftArm = [{x: cx, y: bodyTop}, {x: cx-20, y: cy-35}, {x: cx-10, y: cy-20}]; 
        rightArm = [{x: cx, y: bodyTop}, {x: cx+30, y: cy-50}, {x: cx+12, y: headY}]; 
        leftLeg = [{x: cx, y: bodyBot}, {x: cx-10, y: cy+20}, {x: cx-5, y: cy+50}];   
        rightLeg = [{x: cx, y: bodyBot}, {x: cx+10, y: cy+20}, {x: cx+5, y: cy+50}];
    } 
    else if (stage === 1) { 
        headY = cy - 80; bodyTop = cy - 65; bodyBot = cy - 20;
        leftArm = [{x: cx, y: bodyTop}, {x: cx-20, y: cy-35}, {x: cx-10, y: cy-25}]; 
        rightArm = [{x: cx, y: bodyTop}, {x: cx+15, y: cy-20}]; 
        leftLeg = [{x: cx, y: bodyBot}, {x: cx-10, y: cy+30}];
        rightLeg = [{x: cx, y: bodyBot}, {x: cx+15, y: cy+30}];
    } else if (stage === 2) { 
        headY = cy - 70; bodyTop = cy - 55; bodyBot = cy - 10;
        leftArm = [{x: cx, y: bodyTop}, {x: cx-30, y: cy-30}, {x: cx-15, y: cy-15}];
        rightArm = [{x: cx, y: bodyTop}, {x: cx+30, y: cy-30}, {x: cx+15, y: cy-15}];
        leftLeg = [{x: cx, y: bodyBot}, {x: cx-25, y: cy+15}, {x: cx-20, y: cy+35}];
        rightLeg = [{x: cx, y: bodyBot}, {x: cx+25, y: cy+15}, {x: cx+20, y: cy+35}];
    } else if (stage === 3) { 
        headY = cy - 80; bodyTop = cy - 65; bodyBot = cy - 20;
        leftArm = [{x: cx, y: bodyTop}, {x: cx-40, y: cy-45}, {x: cx-35, y: cy-80}];
        rightArm = [{x: cx, y: bodyTop}, {x: cx+40, y: cy-45}, {x: cx+35, y: cy-80}];
        leftLeg = [{x: cx, y: bodyBot}, {x: cx-30, y: cy+30}];
        rightLeg = [{x: cx, y: bodyBot}, {x: cx+30, y: cy+30}];
    } else if (stage === 4) { 
        headY = cy - 80; bodyTop = cy - 65; bodyBot = cy - 20;
        leftArm = [{x: cx, y: bodyTop}, {x: cx-25, y: cy-35}, {x: cx+15, y: cy-35}]; 
        rightArm = [{x: cx, y: bodyTop}, {x: cx+25, y: cy-35}, {x: cx-15, y: cy-40}]; 
        leftLeg = [{x: cx, y: bodyBot}, {x: cx-10, y: cy+20}, {x: cx-5, y: cy+50}];   
        rightLeg = [{x: cx, y: bodyBot}, {x: cx+20, y: cy+5}, {x: cx+15, y: cy+35}];   
    } else if (stage === 5) {
        let tilt = 20;
        headY = cy - 80 + tilt; 
        bodyTop = cy - 65 + tilt; 
        bodyBot = cy - 20;
        
        let handTargetX = cx + 55;
        let handTargetY = cy + 25;
        
        leftArm = [{x: cx, y: bodyTop}, {x: cx + 15, y: cy - 10}, {x: handTargetX, y: handTargetY}];
        rightArm = [{x: cx, y: bodyTop}, {x: cx + 35, y: cy - 20}, {x: handTargetX, y: handTargetY}];
        
        leftLeg = [{x: cx, y: bodyBot}, {x: cx - 25, y: cy + 20}, {x: cx - 35, y: cy + 50}];
        rightLeg = [{x: cx, y: bodyBot}, {x: cx + 15, y: cy + 30}, {x: cx + 25, y: cy + 60}];
    }

    ctx.beginPath();
    ctx.arc(cx, headY, 15, 0, Math.PI * 2); 
    ctx.moveTo(cx, bodyTop); ctx.lineTo(cx, bodyBot); 
    ctx.moveTo(leftArm[0].x, leftArm[0].y);
    for(let i=1; i<leftArm.length; i++) ctx.lineTo(leftArm[i].x, leftArm[i].y); 
    ctx.moveTo(rightArm[0].x, rightArm[0].y);
    for(let i=1; i<rightArm.length; i++) ctx.lineTo(rightArm[i].x, rightArm[i].y); 
    ctx.moveTo(leftLeg[0].x, leftLeg[0].y);
    for(let i=1; i<leftLeg.length; i++) ctx.lineTo(leftLeg[i].x, leftLeg[i].y); 
    ctx.moveTo(rightLeg[0].x, rightLeg[0].y);
    for(let i=1; i<rightLeg.length; i++) ctx.lineTo(rightLeg[i].x, rightLeg[i].y); 
    ctx.stroke();
    ctx.restore();
}

function animate() {
    time++; 
    let globalWind = Math.sin(time * 0.01) * 1.5 + Math.sin(time * 0.003) * 0.5;

    if (fadeState === 'teleport_prep') {
        teleportTimer++;
        if (teleportTimer > 35) { 
            fadeState = 'wait';
            currentStage = 5;
            stage5Timer = 0;
            textContainer.classList.add('stage-5');
        }
    } else if (currentStage === 5) {
        if (fadeState === 'wait') {
            stage5Timer++;
            if (stage5Timer > 150) { 
                fadeState = 'out';
            }
        } else if (fadeState === 'out') {
            fadeAlpha += 0.015; 
            if (fadeAlpha >= 1) {
                fadeAlpha = 1;
                currentStage = 1;
                textContainer.classList.remove('stage-5');
                fadeState = 'in';
                
                particles.length = 0;
                lightning.length = 0;
                beamParticles.length = 0;
            }
        }
    } else if (fadeState === 'in') {
        fadeAlpha -= 0.015; 
        if (fadeAlpha <= 0) {
            fadeAlpha = 0;
            fadeState = 'none';
            if (autoToggle.checked) {
                clearInterval(autoTimer);
                autoTimer = setInterval(nextStage, 3000);
            }
        }
    }

    ctx.fillStyle = 'rgba(13, 0, 0, 0.35)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // 全域基礎座標 (修正後直接在此控制)
    let charX = canvas.width / 2;
    let charY = canvas.height * 0.75;
    
    if (currentStage === 2) charY += 15;
    if (currentStage === 4 || fadeState === 'teleport_prep') charY -= 60;
    
    if (currentStage === 5) {
        charX = canvas.width * 0.15;
        charY = canvas.height * 0.25;
    }

    const auraCenter = { x: charX, y: charY - 50 };

    let scaleFactor = canvas.width < 600 ? 0.8 : 1; 
    let config = { outer: 0, inner: 0, lightning: 1, glow: 0, speed: 1, name: "", auraRadius: 0, auraForce: 0, zoom: 1, shake: 0 };
    
    let evalStage = fadeState === 'teleport_prep' ? 4 : currentStage;

    switch(evalStage) {
        case 1: config = { outer: 0.5, inner: 0, lightning: 1.1, glow: 0, speed: 0.3, name: "一階 (常態)", auraRadius: 60 * scaleFactor, auraForce: 0.5, zoom: 1.0, shake: 0 }; break;
        case 2: config = { outer: 2, inner: 1, lightning: 1.1, glow: 15, speed: 0.6, name: "二階 (蓄力)", auraRadius: 100 * scaleFactor, auraForce: 1.5, zoom: 1.15, shake: 0 }; break;
        case 3: config = { outer: 4, inner: 3, lightning: 0.96, glow: 35, speed: 1.0, name: "三階 (爆發)", auraRadius: 160 * scaleFactor, auraForce: 3, zoom: 1.35, shake: 2 }; break;
        case 4: config = { outer: 8, inner: 5, lightning: 0.88, glow: 80, speed: 1.6, name: "四階 (極意)", auraRadius: 240 * scaleFactor, auraForce: 6, zoom: 1.6, shake: 4 }; break;
        case 5: config = { outer: 12, inner: 8, lightning: 0.8, glow: 120, speed: 2.5, name: "五階 (氣功炮)", auraRadius: 350 * scaleFactor, auraForce: 10, zoom: 1.0, shake: 6 }; break;
    }

    stageText.innerText = config.name;

    let targetFocusX = auraCenter.x;
    let targetFocusY = auraCenter.y;
    
    // 【關鍵修正】第四階段與敬禮時，把鏡頭焦點再往上移 30px，讓人物的構圖往下壓，遠離頂部 UI
    if (evalStage === 4) {
        targetFocusY -= 30;
    }

    if (currentStage === 5) {
        targetFocusX = canvas.width / 2;
        targetFocusY = canvas.height / 2;
    }

    let lerpSpeed = currentStage === 5 ? 0.1 : 0.05;
    currentZoom += (config.zoom - currentZoom) * lerpSpeed;
    currentFocusX += (targetFocusX - currentFocusX) * lerpSpeed;
    currentFocusY += (targetFocusY - currentFocusY) * lerpSpeed;

    let shakeIntensity = config.shake * (1 - fadeAlpha);
    let shakeX = (Math.random() - 0.5) * shakeIntensity;
    let shakeY = (Math.random() - 0.5) * shakeIntensity;

    let particleMultiplier = canvas.width < 600 ? 0.6 : 1;
    let outerCount = Math.floor(config.outer * particleMultiplier) + (Math.random() < ((config.outer * particleMultiplier) % 1) ? 1 : 0);
    let innerCount = Math.floor(config.inner * particleMultiplier) + (Math.random() < ((config.inner * particleMultiplier) % 1) ? 1 : 0);

    for(let i=0; i<outerCount; i++) particles.push(new EnergyBeam(charX, charY, currentStage === 5 ? 'cyan_outer' : 'outer', config.speed));
    for(let i=0; i<innerCount; i++) particles.push(new EnergyBeam(charX, charY, currentStage === 5 ? 'cyan_inner' : 'inner', config.speed));
    if (Math.random() > config.lightning) lightning.push(new Lightning(charX, charY, currentStage === 5 ? 'cyan' : 'normal'));

    let snowDensity = canvas.width > 800 ? 0.4 : 0.2;
    if (Math.random() > (1 - snowDensity)) snowflakes.push(new Snowflake());

    ctx.save();
    ctx.translate(canvas.width / 2 + shakeX, canvas.height / 2 + shakeY);
    ctx.scale(currentZoom, currentZoom);
    ctx.translate(-currentFocusX, -currentFocusY);

    for (let i = snowflakes.length - 1; i >= 0; i--) {
        snowflakes[i].update(auraCenter, config.auraRadius, config.auraForce, globalWind);
        snowflakes[i].draw();
        if (snowflakes[i].y > canvas.height + 150) snowflakes.splice(i, 1);
    }

    for (let i = particles.length - 1; i >= 0; i--) {
        particles[i].update();
        if (particles[i].life > 0.5) particles[i].draw();
    }
    
    ctx.restore();

    drawBackgroundText(currentStage, config.glow);

    ctx.save();
    ctx.translate(canvas.width / 2 + shakeX, canvas.height / 2 + shakeY);
    ctx.scale(currentZoom, currentZoom);
    ctx.translate(-currentFocusX, -currentFocusY);

    if (currentStage === 5) {
        let beamStartX = charX + 55;
        let beamStartY = charY + 25;
        let beamAngle = Math.atan2(canvas.height - beamStartY + 100, canvas.width - beamStartX + 100); 
        
        drawKamehameha(beamStartX, beamStartY, beamAngle, time);

        for(let i=0; i<4; i++) beamParticles.push(new BeamParticle(beamStartX, beamStartY, beamAngle));
        for (let i = beamParticles.length - 1; i >= 0; i--) {
            beamParticles[i].update();
            beamParticles[i].draw();
            if (beamParticles[i].life <= 0) beamParticles.splice(i, 1);
        }
    }

    drawStickman(charX, charY, currentStage, config.glow, fadeState);

    for (let i = particles.length - 1; i >= 0; i--) {
        if (particles[i].life <= 0.5) particles[i].draw();
        if (particles[i].life <= 0) particles.splice(i, 1);
    }

    for (let i = lightning.length - 1; i >= 0; i--) {
        lightning[i].draw();
        if (lightning[i].life <= 0) lightning.splice(i, 1);
    }

    ctx.restore();

    if (fadeAlpha > 0) {
        ctx.save();
        ctx.fillStyle = `rgba(0, 0, 0, ${fadeAlpha})`;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.restore();
    }

    requestAnimationFrame(animate);
}

animate();
</script>
