<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>十興國小-籃球隊</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,800;1,900&family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #0f172a; 
            user-select: none; 
            -webkit-user-select: none;
            touch-action: manipulation;
            min-height: 100vh; 
            margin: 0;
            font-family: 'Noto Sans TC', sans-serif;
            display: flex;
            align-items: flex-start;
        }
        
        .card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.7) !important;
            max-width: 1000px;
            margin: 0 auto;
            width: 100%;
        }

        .card-body {
            position: relative; 
            background-color: #1e293b !important;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            border-radius: 12px;
            overflow: hidden;
        }

        #canvasContainer {
            position: relative;
            width: 100%;
            aspect-ratio: 2 / 1; 
            height: auto; 
            max-height: 80vh; 
            margin: 0 auto;
        }

        #gameCanvas {
            background-color: #1e293b; 
            display: block;
            width: 100%; 
            height: 100%;
            cursor: crosshair; 
            border-radius: 12px;
        }

        #fullscreenBtn {
            position: fixed;
            top: 15px;
            left: 65px; 
            right: auto;
            width: 40px;
            height: 40px;
            background: rgba(15, 23, 42, 0.6);
            border: 1.5px solid rgba(0, 242, 254, 0.4);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #00f2fe;
            font-size: 1.5rem;
            cursor: pointer;
            z-index: 9999;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            pointer-events: auto;
            opacity: 0;
            visibility: hidden;
        }

        #homeBtn {
            position: fixed;
            top: 15px;
            left: 15px;
            width: 40px;
            height: 40px;
            background: rgba(15, 23, 42, 0.6);
            border: 1.5px solid rgba(0, 242, 254, 0.4);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #00f2fe;
            font-size: 1.3rem;
            cursor: pointer;
            z-index: 9999;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            pointer-events: auto;
            opacity: 0;
            visibility: hidden;
        }

        @media (hover: hover) {
            #fullscreenBtn:hover, #homeBtn:hover {
                transform: scale(1.1);
                background: rgba(15, 23, 42, 0.95);
                border-color: #00f2fe;
                box-shadow: 0 6px 15px rgba(0, 242, 254, 0.3);
            }
        }

        #fullscreenBtn:focus, #homeBtn:focus {
            outline: none;
        }

        #fullscreenBtn.show-btn, #homeBtn.show-btn {
            opacity: 1;
            visibility: visible;
        }

        #ballLayer {
            position: fixed; 
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none; 
            z-index: 9999; 
            overflow: hidden; 
        }

        .dom-basketball {
            position: absolute;
            border-radius: 50%;
            background: linear-gradient(to bottom, rgba(255,255,255,0) 42%, #ffffff 42%, #ffffff 58%, rgba(255,255,255,0) 58%), #f97316;
            border-style: solid;
            border-color: #ffffff;
            pointer-events: none; 
            transform: translate(-50%, -50%);
            display: none;
            animation: spinBall 0.8s linear infinite;
            will-change: left, top, opacity;
        }

        @keyframes spinBall {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        .menu-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.85); 
            backdrop-filter: blur(4px); 
            -webkit-backdrop-filter: blur(4px);
            z-index: 30; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.4s, transform 0.4s; 
            visibility: visible;
            opacity: 1;
            overflow: hidden;
            cursor: pointer;
            border-radius: 12px;
        }
        
        .menu-overlay::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 200%; height: 200%;
            background: repeating-linear-gradient(
                45deg,
                transparent,
                transparent 4px,
                rgba(0, 242, 254, 0.03) 4px,
                rgba(0, 242, 254, 0.03) 8px
            );
            pointer-events: none;
            z-index: -1;
            animation: panBackground 20s linear infinite;
        }

        @keyframes panBackground {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-50px, -50px); }
        }

        .menu-overlay.hidden {
            visibility: hidden;
            opacity: 0;
            transform: scale(1.05); 
            pointer-events: none;
        }
        
        .title-wrapper {
            position: relative;
            display: inline-block;
            text-align: center;
            margin-top: 15px;
        }

        .game-title {
            font-family: 'Montserrat', 'Noto Sans TC', sans-serif;
            font-weight: 900;
            font-style: italic;
            font-size: 2.8rem; 
            margin-bottom: 0.5rem; 
            text-transform: uppercase;
            background: linear-gradient(45deg, #00f2fe, #4facfe, #00f2fe); 
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
            animation: floatTitle 3s ease-in-out infinite, gradientShine 3s linear infinite;
            padding-right: 0.2em;
        }

        .year-badge {
            position: absolute;
            top: -5px; 
            left: -80px; 
            font-family: 'Montserrat', sans-serif;
            font-weight: 900;
            font-size: 1.1rem;
            font-style: italic;
            color: #facc15;
            background: rgba(15, 23, 42, 0.85);
            border: 2px solid #facc15;
            border-radius: 8px;
            padding: 2px 10px;
            transform: rotate(-12deg);
            box-shadow: 0 4px 10px rgba(250, 204, 21, 0.4);
            letter-spacing: 1px;
            z-index: 10;
            animation: pulseBadge 2s infinite;
            pointer-events: none;
        }

        @keyframes pulseBadge {
            0%, 100% { transform: rotate(-12deg) scale(1); box-shadow: 0 4px 10px rgba(250, 204, 21, 0.4); }
            50% { transform: rotate(-12deg) scale(1.08); box-shadow: 0 6px 15px rgba(250, 204, 21, 0.7); }
        }

        .game-subtitle {
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            font-size: 1.5rem;
            color: #e2e8f0;
            margin-bottom: 1rem;
            letter-spacing: 1px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            text-align: center;
        }

        @keyframes floatTitle {
            0%, 100% { transform: translateY(0); filter: drop-shadow(0px 5px 15px rgba(0, 242, 254, 0.3)); }
            50% { transform: translateY(-8px); filter: drop-shadow(0px 10px 20px rgba(0, 242, 254, 0.7)); }
        }
        @keyframes gradientShine {
            to { background-position: 200% center; }
        }

        .instruction-box {
            background: rgba(255, 255, 255, 0.05);
            border-left: 4px solid #00f2fe;
            padding: 10px 20px;
            border-radius: 6px;
            color: #e2e8f0;
            margin-bottom: 1rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            position: relative;
            backdrop-filter: blur(10px);
            text-align: center;
            transition: opacity 0.5s ease-in-out; 
            min-height: 80px; 
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .btn-play {
            position: relative;
            background: linear-gradient(135deg, #00f2fe, #4facfe);
            border: none;
            color: white;
            font-weight: 800;
            letter-spacing: 1.5px;
            border-radius: 50px;
            padding: 12px 45px; 
            box-shadow: 0 8px 25px rgba(0, 242, 254, 0.4);
            transition: all 0.3s ease;
            overflow: hidden;
            cursor: pointer;
        }
        
        .btn-play::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 50%; height: 100%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.4) 50%, rgba(255,255,255,0) 100%);
            transform: skewX(-25deg);
            animation: sweepLight 3s infinite;
        }

        @keyframes sweepLight {
            0% { left: -100%; }
            20% { left: 200%; }
            100% { left: 200%; }
        }

        .btn-play:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 12px 30px rgba(0, 242, 254, 0.6);
            color: white;
        }

        .pulse-text {
            animation: pulseOpacity 2s infinite;
        }
        @keyframes pulseOpacity {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        .music-controls {
            z-index: 50;
            margin-bottom: 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        .btn-music {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid #4facfe;
            color: #4facfe;
            border-radius: 8px;
            padding: 8px 16px;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        .btn-music:hover {
            background: #4facfe;
            color: #0f172a;
        }

        /* =======================================
           手機直向顯示修復區 (調整比例與縮小字體)
           ======================================= */
        @media (max-width: 768px) and (orientation: portrait) {
            #canvasContainer { 
                aspect-ratio: 3 / 4; /* 改為 3:4 直向比例，拉出垂直空間 */
                height: auto;
                min-height: 480px;   /* 設定最小高度，確保選單絕對不會擠在一起 */
                max-height: 85vh;
            }
            .title-wrapper { margin-top: 5px; }
            .game-title { font-size: 1.8rem; margin-bottom: 0.2rem; }
            .year-badge { top: -10px; left: -25px; font-size: 0.8rem; padding: 2px 6px; }
            
            .instruction-box { padding: 10px; margin-bottom: 0.8rem; width: 95%; min-height: 70px; }
            
            /* 強制縮小手機版的招募標題與內文 */
            #recruitTitle { font-size: 1.1rem !important; margin-bottom: 5px !important; }
            #recruitMain { font-size: 0.95rem !important; line-height: 1.4; display: inline-block; }
            #recruitSub { font-size: 0.75rem !important; }

            .btn-play { padding: 8px 24px; }
            .pulse-text { font-size: 0.75rem !important; }
            
            /* 縮小音樂按鈕區塊 */
            .music-controls { margin-bottom: 0.8rem; }
            .btn-music { padding: 6px 12px; font-size: 0.8rem; }
            #musicStatus { font-size: 0.7rem !important; }
            
            #fullscreenBtn {
                top: 10px;
                left: 54px;
                right: auto;
            }
            #homeBtn {
                top: 10px;
                left: 10px;
            }
        }

        #gameWrapper:fullscreen, #gameWrapper:-webkit-full-screen, #gameWrapper:-moz-full-screen, #gameWrapper:-ms-fullscreen {
            background-color: #0f172a !important;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100vw;
            height: 100vh;
            padding: 0;
            border-radius: 0;
        }
        
        #gameWrapper:fullscreen #canvasContainer, #gameWrapper:-webkit-full-screen #canvasContainer, #gameWrapper:-moz-full-screen #canvasContainer, #gameWrapper:-ms-fullscreen #canvasContainer {
            width: 100vw;
            height: 100vh;
            max-width: none;
            max-height: none;
        }

        #gameWrapper:fullscreen #gameCanvas, #gameWrapper:-webkit-full-screen #gameCanvas, #gameWrapper:-moz-full-screen #gameCanvas, #gameWrapper:-ms-fullscreen #gameCanvas {
            border-radius: 0;
        }
    </style>
</head>
<body>

<div id="ballLayer"></div>

<div class="container-fluid p-2 p-md-4">
    <div class="row justify-content-center m-0">
        <div class="col-12 text-center p-0">
            <div class="card shadow-lg">
                <div class="card-body" id="gameWrapper">
                    
                    <div id="mainMenuOverlay" class="menu-overlay">
                        <div class="title-wrapper">
                            <div id="yearBadge" class="year-badge"></div>
                            <div class="game-title">十興國小 籃球隊</div>
                        </div>
                  
                        <div class="instruction-box" id="instructionBox">
                            <div class="fs-4 mb-2" id="recruitTitle"></div>
                            <div class="fs-5">
                                <span class="text-warning fw-bold" id="recruitMain"></span><br>
                                <span class="fs-6" id="recruitSub"></span>
                            </div>
                        </div>

                        <div class="music-controls">
                            <div style="display: flex; gap: 10px;">
                                <button id="selectMusicBtn" class="btn-music">🎵 選擇背景音樂</button>
                                <button id="playSavedMusicBtn" class="btn-music" style="display: none;">▶️ 播放上次音樂</button>
                            </div>
                            <div id="musicStatus" style="font-size: 0.8rem; color: #cbd5e1;">系統尚未載入音樂檔案</div>
                        </div>
                        
                        <button id="startBtn" class="btn btn-play d-flex flex-column align-items-center">
                            <span class="pulse-text" style="font-size: 0.85rem; font-weight: 400; letter-spacing: 2px;">- 點擊畫面任意處開始 -</span>
                        </button>
                    </div>

                    <div id="canvasContainer">
                        <div id="fullscreenBtn" title="全螢幕">⛶</div>
                        <div id="homeBtn" title="回到起始頁面">🏀</div>
                        <canvas id="gameCanvas"></canvas>
                    </div>
                    
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // ==========================================
    // 遊戲資料設定區
    // ==========================================

    const TITLE_BADGE_TEXT = "2026";

    const RECRUIT_CONFIG = {
        interval: 4000, 
        fadeSpeed: 500, 
        messages: [
            {
                title: "🏀 十興國小籃球隊 招募中！",
                main: "喜歡打球嗎？加入我們一起在球場上熱血奮戰！",
                sub: "(歡迎熱愛籃球的同學加入我們的行列 👀)"
            },
            {
                title: "🏆 挑戰自我，團隊合作",
                main: "跟著古教練一起扎實訓練，提升籃球技巧！",
                sub: "(無經驗可，只要有一顆肯學與堅持的心 💪)"
            },
            {
                title: "🎯 遊戲第四面牆突破版",
                main: "點擊畫面上的球員，直接把球投出視窗框架之外吧！",
                sub: "(老師隨時在場邊盯著你們 👀)"
            }
        ]
    };

    const PLAYER_NAMES = [
        "徐毅丞", "董宥葳", "吳秉恩", "劉軒禎", "蔡昕宏", "林稟硯", "范睿軒", "蘇靖翔",
        "張栩睿", "黃御展", "張煒誠", "張皓丞", "蔡棏曜", "范翔鈞", "邱得洛", "黃晟祐",
        "周楷杰", "沈廷軒", "鄭光熙", "黃宇紘", "張家閎", "邱嚴平", "羅毅軒", "姜樂",
        "郭曜丞", "古宇超", "陳品勳"
    ];

    const TEACHER_QUOTES = [
        "專心點！眼睛看哪裡啊！ 👀", "跑位！跑起來！不要站在那邊發呆！ 🏃‍♂️💨",
        "防守！手舉高！ ✋🤚", "這球傳得太隨便了！ 🤦‍♂️", "呼吸！調整節奏！ 🧘‍♂️",
        "平常練習是這樣教的嗎？ 💢", "卡位！籃板球是誰的！ 🛡️🏀",
        "好球！繼續保持！ 🔥👏", "節奏慢下來！不要急！ 🐢",
        "不要一直運球，球傳出去！ 🏀", "膝蓋彎曲！重心壓低！ 🦵",
        "到底有沒有吃飯啊？跑這麼慢！ 🍚", "快攻！快攻！不要拖時間！ ⚡",
        "喊聲啊！都不講話怎麼配合！ 🗣️", "盯人！你的防守者呢？ 👀",
        "出手要果斷！不要猶豫！ 🎯", "體力不行了是不是？撐下去！ 💦"
    ];

    const MISS_QUOTES = [
        "這在投什麼東西？！ 🤷‍♂️", "手腕！用手腕的力量！ 💪",
        "用力過猛啦！ 💥", "沒進沒關係，趕快回防！ 🛡️🏃‍♂️", "專注力呢？ 🧐",
        "麵包球！這力道也差太多了吧！ 🍞", "打鐵啦！籃框都要被你敲壞了！ 🔨",
        "瞄準再投啊！閉著眼睛投是不是？ 🫣", "投籃弧度太低了！ 📉",
        "自己投不進自己去搶籃板！ 🏃‍♂️", "今天手感很冰喔！ 🥶",
        "這球太離譜了，投到哪裡去了！ 🛸"
    ];

    document.getElementById('yearBadge').textContent = TITLE_BADGE_TEXT;

    const instructionBox = document.getElementById('instructionBox');
    const recruitTitle = document.getElementById('recruitTitle');
    const recruitMain = document.getElementById('recruitMain');
    const recruitSub = document.getElementById('recruitSub');
    let currentRecruitIdx = 0;
    let recruitTimer = null;

    function renderRecruitMessage() {
        const msg = RECRUIT_CONFIG.messages[currentRecruitIdx];
        recruitTitle.innerHTML = `<strong>${msg.title}</strong>`;
        recruitMain.textContent = msg.main;
        recruitSub.textContent = msg.sub;
        instructionBox.style.opacity = 1;
    }

    function cycleRecruitMessage() {
        instructionBox.style.opacity = 0; 
        setTimeout(() => {
            currentRecruitIdx = (currentRecruitIdx + 1) % RECRUIT_CONFIG.messages.length;
            renderRecruitMessage(); 
        }, RECRUIT_CONFIG.fadeSpeed);
    }

    renderRecruitMessage();
    recruitTimer = setInterval(cycleRecruitMessage, RECRUIT_CONFIG.interval);

    const bgmAudio = new Audio();
    bgmAudio.loop = true;
    bgmAudio.volume = 0.4;
    let isMusicLoaded = false;

    const selectMusicBtn = document.getElementById('selectMusicBtn');
    const playSavedMusicBtn = document.getElementById('playSavedMusicBtn');
    const musicStatus = document.getElementById('musicStatus');

    [selectMusicBtn, playSavedMusicBtn].forEach(btn => {
        btn.addEventListener('click', (e) => e.stopPropagation());
    });

    const DB_NAME = 'SHB_AudioDB';
    const STORE_NAME = 'settings';

    function openDB() {
        return new Promise((resolve, reject) => {
            const request = indexedDB.open(DB_NAME, 1);
            request.onupgradeneeded = (e) => {
                if (!e.target.result.objectStoreNames.contains(STORE_NAME)) {
                    e.target.result.createObjectStore(STORE_NAME);
                }
            };
            request.onsuccess = () => resolve(request.result);
            request.onerror = () => reject(request.error);
        });
    }

    async function saveFileHandle(handle) {
        const db = await openDB();
        return new Promise((resolve, reject) => {
            const tx = db.transaction(STORE_NAME, 'readwrite');
            const request = tx.objectStore(STORE_NAME).put(handle, 'bgmHandle');
            request.onsuccess = () => resolve();
            request.onerror = () => reject(request.error);
        });
    }

    async function getFileHandle() {
        const db = await openDB();
        return new Promise((resolve, reject) => {
            const tx = db.transaction(STORE_NAME, 'readonly');
            const request = tx.objectStore(STORE_NAME).get('bgmHandle');
            request.onsuccess = () => resolve(request.result);
            request.onerror = () => reject(request.error);
        });
    }

    async function verifyPermission(fileHandle) {
        const options = { mode: 'read' };
        if ((await fileHandle.queryPermission(options)) === 'granted') { return true; }
        if ((await fileHandle.requestPermission(options)) === 'granted') { return true; }
        return false;
    }

    async function playFileFromHandle(fileHandle) {
        try {
            const file = await fileHandle.getFile();
            if (bgmAudio.src) {
                URL.revokeObjectURL(bgmAudio.src);
            }
            const url = URL.createObjectURL(file);
            bgmAudio.src = url;
            await bgmAudio.play();
            
            isMusicLoaded = true;
            playSavedMusicBtn.style.display = 'inline-block';
            playSavedMusicBtn.textContent = '⏸️ 暫停音樂';
            musicStatus.textContent = `🎵 正在播放: ${file.name}`;
            musicStatus.style.color = '#10b981';
        } catch (error) {
            console.error('播放失敗:', error);
            musicStatus.textContent = '❌ 播放失敗，可能檔案已移動或損毀';
            musicStatus.style.color = '#ef4444';
        }
    }

    selectMusicBtn.addEventListener('click', async () => {
        try {
            if (!window.showOpenFilePicker) {
                alert("您的瀏覽器不支援 File System Access API，請使用新版 Chrome 或 Edge。");
                return;
            }
            const [fileHandle] = await window.showOpenFilePicker({
                types: [{
                    description: 'Audio Files',
                    accept: { 'audio/*': ['.mp3', '.wav', '.ogg', '.m4a'] }
                }],
                excludeAcceptAllOption: true,
                multiple: false
            });
            await saveFileHandle(fileHandle);
            await playFileFromHandle(fileHandle);
        } catch (error) {
            if (error.name !== 'AbortError') {
                console.error(error);
                musicStatus.textContent = '讀取檔案失敗';
            }
        }
    });

    playSavedMusicBtn.addEventListener('click', async () => {
        if (isMusicLoaded) {
            if (!bgmAudio.paused) {
                bgmAudio.pause();

    const AudioContext = window.AudioContext || window.webkitAudioContext;
    let audioCtx;

    class SoundManager {
        constructor() { this.enabled = false; }
        init() {
            if (!audioCtx) audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            this.enabled = true;
        }
        playShoot() {
            if (!this.enabled || !audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(300, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.1, audioCtx.currentTime + 0.02);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.start(audioCtx.currentTime); osc.stop(audioCtx.currentTime + 0.1);
        }
        playBounce() {
            if (!this.enabled || !audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.start(audioCtx.currentTime); osc.stop(audioCtx.currentTime + 0.1);
        }
        playSwish() {
            if (!this.enabled || !audioCtx) return;
            const bufferSize = audioCtx.sampleRate * 0.35; 
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1; 
            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'highpass'; filter.frequency.value = 3000; 
            const gain = audioCtx.createGain();
            gain.gain.setValueAtTime(0, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.25, audioCtx.currentTime + 0.05);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            noise.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
            noise.start(audioCtx.currentTime);
        }
        playWhistle() {
            if (!this.enabled || !audioCtx) return;
            const osc1 = audioCtx.createOscillator(); const osc2 = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc1.connect(gain); osc2.connect(gain); gain.connect(audioCtx.destination);
            osc1.type = 'square'; osc2.type = 'square';
            osc1.frequency.setValueAtTime(2000, audioCtx.currentTime);
            osc2.frequency.setValueAtTime(2200, audioCtx.currentTime);
            gain.gain.setValueAtTime(0, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.05, audioCtx.currentTime + 0.05);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc1.start(audioCtx.currentTime); osc2.start(audioCtx.currentTime);
            osc1.stop(audioCtx.currentTime + 0.3); osc2.stop(audioCtx.currentTime + 0.3);
        }
    }

    class QuoteManager {
        constructor() {
            this.quotes = [];

        addQuote(text, color = '#facc15') {
            let visibleLogicalLeft = -currentOffsetX;

            let maxX = visibleLogicalLeft + visibleWidth * 0.8;

            let y = 60 + Math.random() * 40;
            this.quotes.push({ text: text, x: x, y: y, alpha: 1.0, color: color, life: 120 });
        }
        updateAndDraw(ctx) {
            let currentTime = Date.now();
            let visibleLogicalLeft = -currentOffsetX;
            let visibleWidth = canvas.clientWidth / globalScaleFactor;

            if (currentTime - this.lastRandomQuoteTime > this.randomQuoteInterval) {
                if (Math.random() > 0.6) { 
                    this.addQuote(TEACHER_QUOTES[Math.floor(Math.random() * TEACHER_QUOTES.length)]);
                    soundManager.playWhistle(); 
                }
                this.lastRandomQuoteTime = currentTime;
                this.randomQuoteInterval = 3000 + Math.random() * 3000; 
            }
            
            let dynamicFontSize = Math.max(11, Math.min(22, visibleWidth * 0.04));

            for (let i = this.quotes.length - 1; i >= 0; i--) {
                let q = this.quotes[i];
                q.y -= 0.3; q.life--;
                if (q.life < 30) q.alpha = q.life / 30;
                else if (q.life > 105) q.alpha = (120 - q.life) / 15;
                else q.alpha = 1.0;

                if (q.life <= 0) { this.quotes.splice(i, 1); continue; }
                ctx.save();
                ctx.globalAlpha = q.alpha;
                ctx.font = `bold ${dynamicFontSize}px "Noto Sans TC", sans-serif`;
                ctx.textAlign = 'center'; 
                ctx.fillStyle = q.color;
                
                let safeX = q.x;

                ctx.fillText(`💬 老師：「${q.text}」`, safeX, q.y, visibleWidth * 0.9);

        }

    // === 單一右側籃框 ===
    class BasketballHoop {
        constructor() {
            this.rimY = 85; 
            this.netAnim = 0; 
            this.swishActive = false;
            this.baseY = 160;
        }
        get poleX() { return 570; }
        get backboardX() { return 562; }
        get rimLeft() { return 542; }
        get rimRight() { return 562; }

        triggerSwish() { this.netAnim = 1.0; this.swishActive = true; }
        update() {
            if (this.swishActive) {
                this.netAnim -= 0.035; 
                if (this.netAnim <= 0) { this.netAnim = 0; this.swishActive = false; }
            }
        }
        draw(ctx) {
            ctx.save();
            ctx.fillStyle = 'rgba(0, 0, 0, 0.4)'; 
            ctx.beginPath(); 
            ctx.ellipse(this.poleX + 5, this.baseY + 45, 18, 6, 0, 0, Math.PI * 2); 
            ctx.fill();

            ctx.fillStyle = '#475569'; ctx.fillRect(this.poleX, 40, 10, this.baseY); 
            ctx.fillStyle = 'rgba(240, 248, 255, 0.85)'; ctx.fillRect(this.backboardX, 40, 8, 60); 
            ctx.strokeStyle = '#ef4444'; ctx.lineWidth = 3; ctx.strokeRect(this.backboardX, 55, 8, 25); 
            
            let sway = 0, stretch = 0; 
            if (this.swishActive) {
                sway = Math.sin((1 - this.netAnim) * Math.PI * 6) * (10 * this.netAnim);
                stretch = Math.sin((1 - this.netAnim) * Math.PI * 2) * (7 * this.netAnim);
            }

            ctx.strokeStyle = 'rgba(255, 255, 255, 0.7)'; ctx.lineWidth = 1.5; ctx.beginPath();
            let netTopY = this.rimY, netBotY = netTopY + 22 + stretch; 
            let netBotLeft = this.rimLeft + 3.5 + sway, netBotRight = this.rimRight - 3.5 + sway;

            for (let i = 0; i <= 6; i++) {
                let ratio = i / 6;
                let topX = (this.rimLeft + 1) + (this.rimRight - this.rimLeft - 2) * ratio; 
                let botX = netBotLeft + (netBotRight - netBotLeft) * ratio;
                ctx.moveTo(topX, netTopY);
                ctx.quadraticCurveTo(topX + sway * 0.5, netTopY + 11 + stretch * 0.5, botX, netBotY);
            }
            for (let j = 1; j <= 3; j++) {
                let ratio = j / 4;
                let y = netTopY + (netBotY - netTopY) * ratio;
                let currentLeft = (this.rimLeft + 1) + ratio * (netBotLeft - (this.rimLeft + 1));
                let currentRight = (this.rimRight - 1) + ratio * (netBotRight - (this.rimRight - 1));
                ctx.moveTo(currentLeft, y);
                ctx.quadraticCurveTo(currentLeft + (currentRight - currentLeft) / 2, y + 4 * ratio + stretch * ratio, currentRight, y);
            }
            ctx.stroke();

            ctx.strokeStyle = '#ea580c'; ctx.lineWidth = 4; ctx.lineCap = 'round';
            ctx.beginPath(); ctx.moveTo(this.rimLeft, this.rimY); ctx.lineTo(this.rimRight, this.rimY); ctx.stroke();
            ctx.restore();
        }
    }

    const stickmanColors = ['#38bdf8', '#10b981', '#facc15', '#ef4444', '#a855f7', '#f472b6', '#cbd5e1'];
    
    class Stickman {
        constructor() { 
            this.ballElement = document.createElement('div');
            this.ballElement.className = 'dom-basketball';
            document.getElementById('ballLayer').appendChild(this.ballElement);
            this.init(true); 
        }

        init(randomStart = false) {
            if (this.playerName && !availableNames.includes(this.playerName)) availableNames.push(this.playerName);
            if (availableNames.length === 0) availableNames = [...PLAYER_NAMES];
            this.playerName = availableNames.splice(Math.floor(Math.random() * availableNames.length), 1)[0];

            this.baseY = 95 + Math.random() * 125; 
            
            this.y = this.baseY;
            this.scale = 0.4 + (this.baseY / 300) * 0.8; 
            this.speed = (1.5 + Math.random() * 2) * this.scale; 
            
            let visibleLogicalLeft = -currentOffsetX;
            let visibleWidth = canvas.clientWidth / globalScaleFactor || 1000;
            
            if (randomStart) {
                this.x = visibleLogicalLeft + Math.random() * visibleWidth;
            } else {
                this.x = visibleLogicalLeft - 50 - Math.random() * 200;
            }
            
            this.localFrames = Math.random() * 1000; 
            this.color = stickmanColors[Math.floor(Math.random() * stickmanColors.length)];
            this.ballColor = '#f97316';
            this.alpha = 1; 
            this.ballAlpha = 1; 
            
            this.state = 'run'; this.jumpVy = 0;
            this.ballThrown = false; this.ballScored = false; 
            this.willScore = true; this.missQuoteTriggered = false; 
            
            this.ballWorldX = 0; this.ballWorldY = 0;
            this.ballVx = 0; this.ballVy = 0; this.worldGravity = 0;
        }

        forceShoot() {
            if (this.state !== 'run') return; 
            this.state = 'jump'; this.jumpVy = -8 * this.scale;
            this.willScore = Math.random() > 0.5;
        }

        update() {
            if (this.state === 'run') {
                this.x += this.speed; this.localFrames += this.speed * 0.2; 
                let jumpDistance = 120 * this.scale; 
                if (this.x > (globalHoop.rimLeft - 2) - jumpDistance) {
                    this.forceShoot(); this.willScore = Math.random() > 0.15; 
                }
            } else if (this.state === 'jump') {
                this.x += this.speed * 0.7; this.y += this.jumpVy;
                this.jumpVy += 0.35 * this.scale; 

                if (this.jumpVy > -1 * this.scale && !this.ballThrown) {
                    this.ballThrown = true; soundManager.playShoot(); 

                    this.ballWorldX = this.x + 20 * this.scale;
                    this.ballWorldY = this.y - 5 * this.scale; 

                    let hoopTargetX = (globalHoop.rimLeft + globalHoop.rimRight) / 2; 
                    let hoopTargetY = globalHoop.rimY; 
                    
                    if (!this.willScore) {
                        hoopTargetX += (Math.random() > 0.5 ? -18 : 15);
                        hoopTargetY -= Math.random() * 10; 
                    }

                    let dx = hoopTargetX - this.ballWorldX;
                    let flightFrames = Math.max(16, dx / 12); 
                    let gravity = 0.6;
                    let rX = (Math.random() - 0.5) * 6;
                    let rY = (Math.random() - 0.5) * 6;
                    
                    this.ballVx = (hoopTargetX + rX - this.ballWorldX) / flightFrames;
                    this.ballVy = (hoopTargetY + rY - this.ballWorldY - 0.5 * gravity * flightFrames * flightFrames) / flightFrames;
                    this.worldGravity = gravity;
                }

                if (this.y >= this.baseY) {
                    this.y = this.baseY; this.state = 'run_away';
                }
            } else if (this.state === 'run_away') {
                this.x += this.speed; this.localFrames += this.speed * 0.2; 
            }

            if (this.ballThrown) {
                let prevBallY = this.ballWorldY; 
                this.ballWorldX += this.ballVx; 
                this.ballWorldY += this.ballVy;
                this.ballVy += this.worldGravity;

                if (!this.ballScored && prevBallY < globalHoop.rimY && this.ballWorldY >= globalHoop.rimY) {
                    if (this.willScore && this.ballWorldX > globalHoop.rimLeft - 5 && this.ballWorldX < globalHoop.rimRight + 5) {
                        this.ballScored = true; globalHoop.triggerSwish(); soundManager.playSwish(); 
                    } else if (!this.willScore && this.ballWorldX > globalHoop.rimLeft - 20 && this.ballWorldX < globalHoop.rimRight + 20) {
                        this.ballVy = -this.ballVy * (0.4 + Math.random() * 0.3); 
                        this.ballVx = this.ballVx * 0.5 + (Math.random() - 0.5) * 6; 
                        this.ballWorldY = globalHoop.rimY - 2; soundManager.playBounce(); 

                        if (!this.missQuoteTriggered && Math.random() > 0.5) {
                            this.missQuoteTriggered = true;
                            quoteManager.addQuote(`${this.playerName}，${MISS_QUOTES[Math.floor(Math.random() * MISS_QUOTES.length)]}`, '#ef4444');
                            soundManager.playWhistle(); 
                        }
                    }
                }

                const groundY = 300 - 8; 
                if (this.ballWorldY >= groundY) {
                    this.ballWorldY = groundY; 
                    this.ballVy = -this.ballVy * 0.55; 
                    this.ballVx = this.ballVx * 0.8;  

                    if (Math.abs(this.ballVy) > 2.5) {
                        soundManager.playBounce(); 
                    } else {
                        this.ballVy = 0;
                        this.worldGravity = 0; 
                        if (Math.abs(this.ballVx) < 0.2) {
                            this.ballVx = 0; 
                        }
                    }

                    if (Math.abs(this.ballVy) < 3) {
                        this.ballAlpha = Math.max(0, this.ballAlpha - 0.03);
                    }
                }
            }

            let fadeOutStart = RIGHT_EDGE_X;
            if (this.x > fadeOutStart) {
                this.alpha = Math.max(0, 1 - (this.x - fadeOutStart) / 100);
            } else {
                this.alpha = 1;
            }

            if (this.x > RIGHT_EDGE_X + 200) {
                this.init();
            }
        }

        draw(renderParams) {
            ctx.save();
            ctx.globalAlpha = this.alpha;
            
            ctx.translate(this.x, this.y); ctx.scale(this.scale, this.scale);
            const cx = 0, headY = 10, neckY = 20, hipY = 36, footY = 50;
            
            let visibleWidth = canvas.clientWidth / globalScaleFactor;
            let dynamicNameSize = Math.max(11, Math.min(20, visibleWidth * 0.035));
            ctx.save(); 
            ctx.fillStyle = '#ffffff'; 
            ctx.font = `bold ${dynamicNameSize}px "Noto Sans TC", sans-serif`; 
            ctx.textAlign = 'center'; 
            ctx.fillText(this.playerName, cx, headY - 18, 100); 
            ctx.restore();

            ctx.strokeStyle = this.color; ctx.lineWidth = 4; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
            
            if (!isMobileDevice) {
                ctx.shadowColor = this.color; 
                ctx.shadowBlur = 4;
            } else {
                ctx.shadowBlur = 0;
            }

            ctx.beginPath(); ctx.arc(cx, headY, 7, 0, Math.PI * 2); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(cx, neckY); ctx.lineTo(cx, hipY); ctx.stroke();

            let ballX = 0, ballY = 0, drawLocalBall = false;

            if (this.state === 'run' || this.state === 'run_away') {
                const runCycle = Math.sin(this.localFrames); 
                let leftKneeX = cx - 12 * runCycle, leftKneeY = hipY + 6, leftFootX = cx - 18 * runCycle, leftFootY = footY;
                let rightKneeX = cx + 12 * runCycle, rightKneeY = hipY + 6, rightFootX = cx + 18 * runCycle, rightFootY = footY;
                ctx.beginPath(); ctx.moveTo(cx, hipY); ctx.lineTo(leftKneeX, leftKneeY); ctx.lineTo(leftFootX, leftFootY); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(cx, hipY); ctx.lineTo(rightKneeX, rightKneeY); ctx.lineTo(rightFootX, rightFootY); ctx.stroke();

                let leftElbowX = cx - 8, leftElbowY = neckY + 8, leftHandX = cx - 15 + 10 * runCycle, leftHandY = neckY + 15;
                ctx.beginPath(); ctx.moveTo(cx, neckY); ctx.lineTo(leftElbowX, leftElbowY); ctx.lineTo(leftHandX, leftHandY); ctx.stroke();

                if (this.state === 'run') {
                    ballX = cx + 25; ballY = hipY + Math.sin(this.localFrames * 0.8) * 12; drawLocalBall = true;
                    let rightElbowX = cx + 12, rightElbowY = neckY + 5, rightHandX = ballX - 3, rightHandY = ballY - 6;
                    ctx.beginPath(); ctx.moveTo(cx, neckY); ctx.lineTo(rightElbowX, rightElbowY); ctx.lineTo(rightHandX, rightHandY); ctx.stroke();
                } else {
                    let rightElbowX = cx + 8, rightElbowY = neckY + 8, rightHandX = cx + 15 - 10 * runCycle, rightHandY = neckY + 15;
                    ctx.beginPath(); ctx.moveTo(cx, neckY); ctx.lineTo(rightElbowX, rightElbowY); ctx.lineTo(rightHandX, rightHandY); ctx.stroke();
                }
            } else if (this.state === 'jump') {
                let leftKneeX = cx - 5, leftKneeY = hipY + 15, leftFootX = cx - 10, leftFootY = hipY + 30; 
                let rightKneeX = cx + 15, rightKneeY = hipY - 5, rightFootX = cx + 15, rightFootY = hipY + 15; 
                ctx.beginPath(); ctx.moveTo(cx, hipY); ctx.lineTo(leftKneeX, leftKneeY); ctx.lineTo(leftFootX, leftFootY); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(cx, hipY); ctx.lineTo(rightKneeX, rightKneeY); ctx.lineTo(rightFootX, rightFootY); ctx.stroke();

                let leftElbowX = cx - 15, leftElbowY = neckY + 5, leftHandX = cx - 20, leftHandY = neckY - 5;
                ctx.beginPath(); ctx.moveTo(cx, neckY); ctx.lineTo(leftElbowX, leftElbowY); ctx.lineTo(leftHandX, leftHandY); ctx.stroke();

                if (!this.ballThrown) {
                    let rightElbowX = cx + 10, rightElbowY = neckY - 5, rightHandX = cx + 20, rightHandY = headY - 15;
                    ctx.beginPath(); ctx.moveTo(cx, neckY); ctx.lineTo(rightElbowX, rightElbowY); ctx.lineTo(rightHandX, rightHandY); ctx.stroke();
                    ballX = rightHandX + 5; ballY = rightHandY - 5; drawLocalBall = true;
                } else {
                    let rightElbowX = cx + 15, rightElbowY = neckY - 10, rightHandX = cx + 25, rightHandY = headY - 25;
                    ctx.beginPath(); ctx.moveTo(cx, neckY); ctx.lineTo(rightElbowX, rightElbowY); ctx.lineTo(rightHandX, rightHandY); ctx.stroke();
                }
            }

            if (drawLocalBall) {
                ctx.shadowBlur = 0; ctx.beginPath(); ctx.arc(ballX, ballY, 8, 0, Math.PI * 2); 
                ctx.fillStyle = this.ballColor; ctx.fill();
                ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 1.5; 
                ctx.beginPath(); ctx.moveTo(ballX - 8, ballY); ctx.lineTo(ballX + 8, ballY); ctx.stroke();
            }
            
            ctx.restore();

            if (this.ballThrown) {
                if (gameStarted) {
                    if (this.ballElement.style.display !== 'block') {
                        this.ballElement.style.display = 'block';
                    }
                    
                    let screenX = renderParams.canvasRect.left + (this.ballWorldX + renderParams.offsetX) * renderParams.scaleFactorCSS;
                    let screenY = renderParams.canvasRect.top + (this.ballWorldY + renderParams.offsetY) * renderParams.scaleFactorCSS;

                    let r = 8 * this.scale * renderParams.scaleFactorCSS;
                    let bw = 1.5 * this.scale * renderParams.scaleFactorCSS;

                    this.ballElement.style.width = `${r * 2}px`;
                    this.ballElement.style.height = `${r * 2}px`;
                    this.ballElement.style.left = `${screenX}px`;
                    this.ballElement.style.top = `${screenY}px`;
                    this.ballElement.style.borderWidth = `${bw}px`;
                    
                    this.ballElement.style.opacity = this.ballAlpha;
                } else {
                    if (this.ballElement.style.display !== 'none') {
                        this.ballElement.style.display = 'none';
                    }
                    
                    ctx.save();
                    ctx.shadowBlur = 0; 
                    ctx.globalAlpha = this.ballAlpha; 
                    
                    let br = 8 * this.scale; 
                    ctx.beginPath(); ctx.arc(this.ballWorldX, this.ballWorldY, br, 0, Math.PI * 2); 
                    ctx.fillStyle = this.ballColor; ctx.fill();
                    ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 1.5 * this.scale; 
                    ctx.beginPath(); ctx.moveTo(this.ballWorldX - br, this.ballWorldY); ctx.lineTo(this.ballWorldX + br, this.ballWorldY); ctx.stroke();
                    ctx.restore();
                }
            } else {
                if (this.ballElement.style.display !== 'none') {
                    this.ballElement.style.display = 'none';
                }
            }
        }
    }

    const stickmanCount = isMobileDevice ? 5 : 8;
    const stickmen = [];
    for (let i = 0; i < stickmanCount; i++) stickmen.push(new Stickman());

    const speedLines = [];
    for(let i = 0; i < 15; i++) {
        speedLines.push({
            x: Math.random() * 2000, y: Math.random() * 300, 
            length: Math.random() * 100 + 50, speed: Math.random() * 2 + 1, alpha: Math.random() * 0.15 + 0.05  
        });
    }

    canvas.addEventListener('pointerdown', (e) => {
        if (!mainMenuOverlay.classList.contains('hidden')) return;

        fullscreenBtn.classList.add('show-btn');
        homeBtn.classList.add('show-btn');

        const rect = canvas.getBoundingClientRect();
        let cssX = e.clientX - rect.left;
        let cssY = e.clientY - rect.top;

        let mouseX = cssX / globalScaleFactor - currentOffsetX;
        let mouseY = cssY / globalScaleFactor - currentOffsetY;

        for (let i = stickmen.length - 1; i >= 0; i--) {
            let man = stickmen[i];
            if (man.state === 'run' && Math.hypot(mouseX - man.x, mouseY - (man.y + 20)) < 60 * man.scale) {
                man.forceShoot(); break; 
            }
        }
    });

    function animate() {
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        const displayWidth = canvas.clientWidth;
        const displayHeight = canvas.clientHeight;
        
        const targetWidth = Math.max(1, Math.round(displayWidth * dpr));
        const targetHeight = Math.max(1, Math.round(displayHeight * dpr));

        if (canvas.width !== targetWidth || canvas.height !== targetHeight) {
            canvas.width = targetWidth; canvas.height = targetHeight;
        }

        const VIEW_WIDTH = 560; 
        const VIEW_X_MIN = 40;  

        let scaleFactor = targetWidth / VIEW_WIDTH;
        let actualLogicalHeight = targetHeight / scaleFactor;

        // 防呆：確保垂直視野至少有 280 的高度，才不會把籃框或地板切掉
        if (actualLogicalHeight < 280) {
            scaleFactor = targetHeight / 280;
            actualLogicalHeight = targetHeight / scaleFactor;
        }

        let actualLogicalWidth = targetWidth / scaleFactor;

        let renderOffsetX = -VIEW_X_MIN;
        
        // Y軸中心點設為 160 (原本是200)，讓畫面整體往下沉，上方保留足夠空間顯示籃板與訊息
        let renderOffsetY = -160 + (actualLogicalHeight / 2);

        currentOffsetX = renderOffsetX;
        currentOffsetY = renderOffsetY;
        globalScaleFactor = scaleFactor / dpr;

        ctx.setTransform(1, 0, 0, 1, 0, 0); 
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        ctx.scale(scaleFactor, scaleFactor);
        ctx.translate(renderOffsetX, renderOffsetY);

        ctx.lineCap = 'round';
        let visibleLogicalLeft = -currentOffsetX;
        let visibleLogicalRight = -currentOffsetX + actualLogicalWidth;

        for (let i = 0; i < speedLines.length; i++) {
            let line = speedLines[i];
            line.x -= line.speed;
            if (line.x + line.length < visibleLogicalLeft) { 
                line.x = visibleLogicalRight + Math.random() * 100; 
                line.y = -renderOffsetY + Math.random() * actualLogicalHeight; 
            }
            ctx.beginPath(); ctx.moveTo(line.x, line.y); ctx.lineTo(line.x + line.length, line.y);
            ctx.strokeStyle = `rgba(56, 189, 248, ${line.alpha})`; ctx.lineWidth = 1.5; ctx.stroke();
        }

        drawCourtLines(ctx);
        globalHoop.update(); 
        globalHoop.draw(ctx);

        const canvasRect = canvas.getBoundingClientRect();
        const renderParams = { 
            canvasRect, 
            scaleFactorCSS: globalScaleFactor, 
            offsetX: currentOffsetX,
            offsetY: currentOffsetY
        };

        stickmen.sort((a, b) => a.y - b.y);
        stickmen.forEach(man => { man.update(); man.draw(renderParams); });
        
        quoteManager.updateAndDraw(ctx);

        requestAnimationFrame(animate);
    }

    animate(); 
</script>
</body>
