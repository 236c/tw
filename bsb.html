<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>專業籃球記分板</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #222;
            color: #fff;
            font-family: 'Arial', sans-serif;
            /* 避免網頁出現多餘的滾動條 */
            overflow-x: hidden; 
        }
        .scoreboard-card {
            background-color: #000;
            border: 2px solid #444;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
        }
        .score-text {
            font-size: 120px;
            font-weight: bold;
            color: #ff3333;
            line-height: 1;
            font-family: 'Courier New', Courier, monospace;
        }
        .timer-text {
            font-size: 80px;
            font-weight: bold;
            color: #ffcc00;
            font-family: 'Courier New', Courier, monospace;
        }
        .label-text {
            font-size: 1.2rem;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .sub-data {
            font-size: 40px;
            color: #ff9900;
            font-weight: bold;
        }
        .control-panel {
            background-color: #333;
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
        }

        /* ======= 強制橫向顯示的 CSS 魔法 ======= */
        @media screen and (orientation: portrait) {
            body {
                transform: rotate(-90deg);
                transform-origin: left top;
                width: 100vh;
                height: 100vw;
                position: absolute;
                top: 100%;
                left: 0;
                overflow-y: auto;
            }
            .container {
                max-width: 95vw;
                padding-bottom: 20px;
            }
        }
    </style>
</head>
<body>

<div class="container mt-4">
    <div class="scoreboard-card text-center">
        <div class="row align-items-center">
            <div class="col-4">
                <div class="label-text mb-2">主隊 HOME</div>
                <div class="score-text" id="home-score">0</div>
                <div class="row mt-3">
                    <div class="col-6">
                        <div class="label-text">犯規</div>
                        <div class="sub-data" id="home-fouls">0</div>
                    </div>
                    <div class="col-6">
                        <div class="label-text">暫停</div>
                        <div class="sub-data" id="home-to">3</div>
                    </div>
                </div>
            </div>

            <div class="col-4">
                <div class="label-text">比賽時間</div>
                <div class="timer-text" id="game-timer">12:00</div>
                
                <div class="mt-4">
                    <div class="label-text">節數 PERIOD</div>
                    <div class="score-text" style="font-size: 60px; color: #00ff00;" id="period">1</div>
                </div>
            </div>

            <div class="col-4">
                <div class="label-text mb-2">客隊 GUEST</div>
                <div class="score-text" id="guest-score">0</div>
                <div class="row mt-3">
                    <div class="col-6">
                        <div class="label-text">犯規</div>
                        <div class="sub-data" id="guest-fouls">0</div>
                    </div>
                    <div class="col-6">
                        <div class="label-text">暫停</div>
                        <div class="sub-data" id="guest-to">3</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="control-panel">
        <h4 class="text-center mb-4">控制台</h4>
        
        <div class="row mb-4 bg-dark p-3 rounded align-items-center">
            <div class="col-md-4 text-center">
                <button class="btn btn-success btn-lg m-1" onclick="startTimer()">開始</button>
                <button class="btn btn-danger btn-lg m-1" onclick="stopTimer()">暫停計時</button>
            </div>
            <div class="col-md-4">
                <div class="input-group">
                    <span class="input-group-text">設定分鐘數</span>
                    <input type="number" id="set-minutes" class="form-control" value="12" min="1" max="60">
                    <button class="btn btn-primary" onclick="setTimer()">設定</button>
                </div>
            </div>
            <div class="col-md-4 text-center">
                <button class="btn btn-outline-light m-1" onclick="changePeriod(1)">下一節</button>
                <button class="btn btn-outline-warning m-1" onclick="resetGame()">重置</button>
                <button class="btn btn-outline-info m-1" onclick="toggleFullscreen()">📺 全螢幕</button>
            </div>
        </div>

        <div class="row text-center">
            <div class="col-md-5 bg-dark p-3 rounded">
                <h5>主隊控制</h5>
                <hr>
                <div class="mb-3">
                    <button class="btn btn-primary m-1" onclick="updateScore('home', 1)">+1 分</button>
                    <button class="btn btn-primary m-1" onclick="updateScore('home', 2)">+2 分</button>
                    <button class="btn btn-primary m-1" onclick="updateScore('home', 3)">+3 分</button>
                    <button class="btn btn-secondary m-1" onclick="updateScore('home', -1)">-1 分</button>
                </div>
                <div>
                    <button class="btn btn-warning m-1" onclick="updateFoul('home', 1)">犯規 +1</button>
                    <button class="btn btn-outline-warning m-1" onclick="updateFoul('home', -1)">-1</button>
                    <button class="btn btn-info m-1" onclick="updateTO('home', -1)">使用暫停</button>
                    <button class="btn btn-outline-info m-1" onclick="updateTO('home', 1)">+1</button>
                </div>
            </div>

            <div class="col-md-2 d-flex align-items-center justify-content-center">
                <h2 class="text-muted">VS</h2>
            </div>

            <div class="col-md-5 bg-dark p-3 rounded">
                <h5>客隊控制</h5>
                <hr>
                <div class="mb-3">
                    <button class="btn btn-danger m-1" onclick="updateScore('guest', 1)">+1 分</button>
                    <button class="btn btn-danger m-1" onclick="updateScore('guest', 2)">+2 分</button>
                    <button class="btn btn-danger m-1" onclick="updateScore('guest', 3)">+3 分</button>
                    <button class="btn btn-secondary m-1" onclick="updateScore('guest', -1)">-1 分</button>
                </div>
                <div>
                    <button class="btn btn-warning m-1" onclick="updateFoul('guest', 1)">犯規 +1</button>
                    <button class="btn btn-outline-warning m-1" onclick="updateFoul('guest', -1)">-1</button>
                    <button class="btn btn-info m-1" onclick="updateTO('guest', -1)">使用暫停</button>
                    <button class="btn btn-outline-info m-1" onclick="updateTO('guest', 1)">+1</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // 初始變數
    let data = {
        home: { score: 0, fouls: 0, to: 3 },
        guest: { score: 0, fouls: 0, to: 3 },
        period: 1,
        timeRemaining: 12 * 60 // 預設 12 分鐘轉換為秒
    };
    
    let timerInterval = null;
    let isRunning = false;

    // 更新顯示畫面
    function render() {
        document.getElementById('home-score').innerText = data.home.score;
        document.getElementById('home-fouls').innerText = data.home.fouls;
        document.getElementById('home-to').innerText = data.home.to;

        document.getElementById('guest-score').innerText = data.guest.score;
        document.getElementById('guest-fouls').innerText = data.guest.fouls;
        document.getElementById('guest-to').innerText = data.guest.to;

        document.getElementById('period').innerText = data.period;
        updateTimerDisplay();
    }

    // 分數控制
    function updateScore(team, points) {
        data[team].score += points;
        if (data[team].score < 0) data[team].score = 0; 
        render();
    }

    // 犯規控制
    function updateFoul(team, val) {
        data[team].fouls += val;
        if (data[team].fouls < 0) data[team].fouls = 0;
        render();
    }

    // 暫停控制
    function updateTO(team, val) {
        data[team].to += val;
        if (data[team].to < 0) data[team].to = 0;
        render();
    }

    // 節數控制
    function changePeriod(val) {
        data.period += val;
        if (data.period > 4) data.period = 'OT'; 
        data.home.fouls = 0; 
        data.guest.fouls = 0;
        render();
    }

    // --- 計時器邏輯 ---
    function updateTimerDisplay() {
        let minutes = Math.floor(data.timeRemaining / 60);
        let seconds = data.timeRemaining % 60;
        
        let formattedTime = 
            (minutes < 10 ? "0" + minutes : minutes) + ":" + 
            (seconds < 10 ? "0" + seconds : seconds);
            
        document.getElementById('game-timer').innerText = formattedTime;
    }

    function startTimer() {
        if (isRunning || data.timeRemaining <= 0) return;
        isRunning = true;
        timerInterval = setInterval(() => {
            if (data.timeRemaining > 0) {
                data.timeRemaining--;
                updateTimerDisplay();
            } else {
                stopTimer();
                alert("時間到！"); 
            }
        }, 1000);
    }

    function stopTimer() {
        isRunning = false;
        clearInterval(timerInterval);
    }

    function setTimer() {
        stopTimer();
        let mins = parseInt(document.getElementById('set-minutes').value);
        if (isNaN(mins) || mins < 1) mins = 12;
        data.timeRemaining = mins * 60;
        updateTimerDisplay();
    }

    function resetGame() {
        if(confirm("確定要重置整場比賽資料嗎？")) {
            stopTimer();
            data = {
                home: { score: 0, fouls: 0, to: 3 },
                guest: { score: 0, fouls: 0, to: 3 },
                period: 1,
                timeRemaining: parseInt(document.getElementById('set-minutes').value) * 60 || 12 * 60
            };
            render();
        }
    }

    // --- 全螢幕與鎖定橫向邏輯 ---
    function toggleFullscreen() {
        let elem = document.documentElement;
        
        if (!document.fullscreenElement) {
            // 進入全螢幕
            if (elem.requestFullscreen) {
                elem.requestFullscreen().then(() => {
                    // 嘗試鎖定螢幕為橫向
                    if (screen.orientation && screen.orientation.lock) {
                        screen.orientation.lock('landscape').catch(err => {
                            console.log("螢幕旋轉鎖定失敗或不支援:", err);
                        });
                    }
                }).catch(err => {
                    console.log(`全螢幕請求失敗: ${err.message}`);
                });
            }
        } else {
            // 退出全螢幕
            if (document.exitFullscreen) {
                document.exitFullscreen();
                if (screen.orientation && screen.orientation.unlock) {
                    screen.orientation.unlock();
                }
            }
        }
    }

    window.onload = render;
</script>

</body>
</html>
