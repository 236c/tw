<!DOCTYPE html>
<html lang="zh-TW" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PRO 專業籃球記分板</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

    <style>
        /* 基礎重置與防滑動 */
        * { user-select: none; }
        body, html { 
            height: 100%; width: 100%; overflow: hidden; 
            background-color: #0a0a0c; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            position: relative;
        }

        /* 數位面板字體 - 移除發光，改為加粗實心 */
        .digital-font { 
            font-family: 'Share Tech Mono', monospace; 
            font-weight: 700; 
        }
        .score-text {
            font-size: 20vmin;
            line-height: 0.9;
            color: #ff3333;
        }
        .timer-text {
            font-size: 16vmin;
            line-height: 0.9;
            color: #ffcc00;
        }
        .period-text {
            font-size: 8vmin;
            color: #00ff66;
        }
        .sub-val-text {
            font-size: 5vmin;
            color: #ff9900;
        }

        /* 區塊面板樣式 */
        .glass-panel {
            background: linear-gradient(145deg, #16181c, #0e0f11);
            border: 1px solid #2a2d35;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            border-radius: 16px;
        }
        
        .score-box { background-color: #000; border-radius: 12px; border: 2px solid #222; }
        
        /* 標籤樣式 */
        .team-label { font-size: 2.5vmin; letter-spacing: 4px; color: #8892b0; font-weight: 600; }
        .sub-label { font-size: 1.8vmin; color: #6c757d; text-transform: uppercase; letter-spacing: 1px;}

        /* 控制區按鈕網格 */
        .btn-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 0.8vmin; 
            height: 100%;
        }
        .btn-grid-sys {
            display: grid;
            grid-template-columns: 1fr;
            grid-template-rows: 2fr 1fr 1fr;
            gap: 0.8vmin;
            height: 100%;
        }

        /* 客製化按鈕覆蓋 - 字體放大到 3.5vmin 提升手機閱讀性 */
        .btn { font-size: 3.5vmin; font-weight: 600; border-radius: 8px; display: flex; align-items: center; justify-content: center; gap: 0.5rem; transition: all 0.15s ease;}
        .btn:active { transform: scale(0.96); }
        .btn-score-home { background-color: #0d6efd; color: white; border: none; }
        .btn-score-home:hover { background-color: #0b5ed7; color: white; }
        .btn-score-guest { background-color: #dc3545; color: white; border: none; }
        .btn-score-guest:hover { background-color: #bb2d3b; color: white; }

        /* === 手機直向時強制旋轉佈局 === */
        @media screen and (orientation: portrait) {
            #app {
                position: absolute !important;
                top: 50% !important;
                left: 50% !important;
                width: 100vh !important;
                height: 100vw !important;
                transform: translate(-50%, -50%) rotate(90deg) !important;
            }
            
            .score-text { font-size: 20vmax; }
            .timer-text { font-size: 16vmax; }
            .period-text { font-size: 8vmax; }
            .sub-val-text { font-size: 5vmax; }
            .team-label { font-size: 2.5vmax; }
            .sub-label { font-size: 1.8vmax; }
            /* 直向模式字體同步放大為 3.5vmax */
            .btn { font-size: 3.5vmax; }
        }
    </style>
</head>
<body>

<div id="app" class="container-fluid h-100 p-2 d-flex flex-column gap-2">
    
    <div class="row flex-grow-1 m-0 glass-panel p-2">
        <div class="col-4 d-flex flex-column h-100 score-box p-3 position-relative">
            <div class="team-label text-center mb-auto">主隊 HOME</div>
            <div class="digital-font score-text text-center" id="home-score">0</div>
            <div class="d-flex justify-content-between mt-auto px-4">
                <div class="text-center">
                    <div class="sub-label">犯規 FOULS</div>
                    <div class="digital-font sub-val-text" id="home-fouls">0</div>
                </div>
                <div class="text-center">
                    <div class="sub-label">暫停 T.O.</div>
                    <div class="digital-font sub-val-text" id="home-to">0</div>
                </div>
            </div>
        </div>

        <div class="col-4 d-flex flex-column h-100 justify-content-center align-items-center position-relative">
            <div class="team-label mb-2">比賽時間 GAME CLOCK</div>
            <div class="digital-font timer-text" id="game-timer">12:00</div>
            <div class="mt-3 text-center">
                <div class="sub-label">節數 PERIOD</div>
                <div class="digital-font period-text" id="period">1</div>
            </div>
        </div>

        <div class="col-4 d-flex flex-column h-100 score-box p-3 position-relative">
            <div class="team-label text-center mb-auto">客隊 GUEST</div>
            <div class="digital-font score-text text-center" id="guest-score">0</div>
            <div class="d-flex justify-content-between mt-auto px-4">
                <div class="text-center">
                    <div class="sub-label">暫停 T.O.</div>
                    <div class="digital-font sub-val-text" id="guest-to">0</div>
                </div>
                <div class="text-center">
                    <div class="sub-label">犯規 FOULS</div>
                    <div class="digital-font sub-val-text" id="guest-fouls">0</div>
                </div>
            </div>
        </div>
    </div>

    <div class="row h-50 m-0 gap-2">
        <div class="col glass-panel p-2 d-flex flex-column">
            <div class="team-label text-center mb-2 text-primary border-bottom border-secondary pb-1"><i class="bi bi-shield-fill"></i> 主隊控制</div>
            <div class="btn-grid">
                <button class="btn btn-score-home" onclick="updateScore('home', 1)">+1 分</button>
                <button class="btn btn-score-home" onclick="updateScore('home', 2)">+2 分</button>
                <button class="btn btn-score-home" onclick="updateScore('home', 3)">+3 分</button>
                <button class="btn btn-outline-secondary" onclick="updateScore('home', -1)">-1 分</button>
                <button class="btn btn-warning" onclick="updateFoul('home', 1)"><i class="bi bi-flag-fill"></i> 犯規 +1</button>
                <button class="btn btn-outline-warning" onclick="updateFoul('home', -1)">退 1</button>
                <button class="btn btn-info text-dark" onclick="updateTO('home', 1)"><i class="bi bi-pause-circle-fill"></i> 暫停 +1</button>
                <button class="btn btn-outline-info" onclick="updateTO('home', -1)">退 1</button>
            </div>
        </div>

        <div class="col-3 glass-panel p-2 d-flex flex-column">
            <div class="team-label text-center mb-2 text-light border-bottom border-secondary pb-1"><i class="bi bi-cpu-fill"></i> 系統控制</div>
            <div class="btn-grid-sys">
                <button class="btn btn-success shadow-lg" id="btn-timer" onclick="toggleTimer()">
                    <i class="bi bi-play-fill" id="timer-icon"></i> <span id="timer-text-label">開始計時</span>
                </button>
                <div class="d-flex gap-2">
                    <button class="btn btn-outline-light w-100" onclick="changePeriod(1)">下一節</button>
                    <button class="btn btn-outline-light w-100" data-bs-toggle="modal" data-bs-target="#timerModal" onclick="syncModalTimer()"><i class="bi bi-clock-history"></i> 設時</button>
                </div>
                <div class="d-flex gap-2">
                    <button class="btn btn-outline-danger w-100" data-bs-toggle="modal" data-bs-target="#resetModal"><i class="bi bi-arrow-counterclockwise"></i> 重置</button>
                    <button class="btn btn-outline-warning w-100" onclick="toggleFullscreen()"><i class="bi bi-arrows-fullscreen"></i> 全螢幕</button>
                </div>
            </div>
        </div>

        <div class="col glass-panel p-2 d-flex flex-column">
            <div class="team-label text-center mb-2 text-danger border-bottom border-secondary pb-1"><i class="bi bi-shield-fill"></i> 客隊控制</div>
            <div class="btn-grid">
                <button class="btn btn-score-guest" onclick="updateScore('guest', 1)">+1 分</button>
                <button class="btn btn-score-guest" onclick="updateScore('guest', 2)">+2 分</button>
                <button class="btn btn-score-guest" onclick="updateScore('guest', 3)">+3 分</button>
                <button class="btn btn-outline-secondary" onclick="updateScore('guest', -1)">-1 分</button>
                <button class="btn btn-warning" onclick="updateFoul('guest', 1)"><i class="bi bi-flag-fill"></i> 犯規 +1</button>
                <button class="btn btn-outline-warning" onclick="updateFoul('guest', -1)">退 1</button>
                <button class="btn btn-info text-dark" onclick="updateTO('guest', 1)"><i class="bi bi-pause-circle-fill"></i> 暫停 +1</button>
                <button class="btn btn-outline-info" onclick="updateTO('guest', -1)">退 1</button>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="timerModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content glass-panel border-secondary text-light">
      <div class="modal-header border-secondary">
        <h5 class="modal-title"><i class="bi bi-clock"></i> 設定比賽時間</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body text-center">
        <div class="digital-font text-warning mb-4" id="modal-timer-display" style="font-size: 10vmin; line-height: 1;">12:00</div>
        
        <div class="row g-2 px-4">
            <div class="col-6">
                <button class="btn btn-outline-light w-100 py-3" onclick="adjustTime(60)">+1 分鐘</button>
            </div>
            <div class="col-6">
                <button class="btn btn-outline-light w-100 py-3" onclick="adjustTime(-60)">-1 分鐘</button>
            </div>
            <div class="col-6">
                <button class="btn btn-outline-secondary w-100 py-3" onclick="adjustTime(1)">+1 秒鐘</button>
            </div>
            <div class="col-6">
                <button class="btn btn-outline-secondary w-100 py-3" onclick="adjustTime(-1)">-1 秒鐘</button>
            </div>
        </div>
        <div class="mt-3">
            <button class="btn btn-primary w-100 py-2" onclick="adjustTime(12*60, true)">預設 12 分鐘</button>
        </div>
      </div>
      <div class="modal-footer border-secondary">
        <button type="button" class="btn btn-success w-100 fs-4" data-bs-dismiss="modal">完成設定</button>
      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="resetModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content glass-panel border-secondary text-light">
      <div class="modal-header border-secondary">
        <h5 class="modal-title text-danger"><i class="bi bi-exclamation-triangle-fill"></i> 重置比賽</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body fs-5 text-center py-4">
        確定要將所有分數、犯規、暫停與時間<strong class="text-danger">歸零</strong>嗎？<br>此動作無法復原。
      </div>
      <div class="modal-footer border-secondary d-flex gap-2">
        <button type="button" class="btn btn-outline-secondary flex-fill" data-bs-dismiss="modal">取消</button>
        <button type="button" class="btn btn-danger flex-fill" data-bs-dismiss="modal" onclick="executeReset()">確定重置</button>
      </div>
    </div>
  </div>
</div>

<script>
    const DEFAULT_TIME = 12 * 60;
    let data = {
        home: { score: 0, fouls: 0, to: 0 },
        guest: { score: 0, fouls: 0, to: 0 },
        period: 1,
        timeRemaining: DEFAULT_TIME
    };
    
    let timerInterval = null;
    let isRunning = false;

    function render() {
        document.getElementById('home-score').innerText = data.home.score;
        document.getElementById('home-fouls').innerText = data.home.fouls;
        document.getElementById('home-to').innerText = data.home.to;
        document.getElementById('guest-score').innerText = data.guest.score;
        document.getElementById('guest-fouls').innerText = data.guest.fouls;
        document.getElementById('guest-to').innerText = data.guest.to;
        document.getElementById('period').innerText = data.period;
        updateTimerDisplay();
    }

    function updateScore(team, points) {
        data[team].score += points;
        if (data[team].score < 0) data[team].score = 0; 
        render();
    }

    function updateFoul(team, val) {
        data[team].fouls += val;
        if (data[team].fouls < 0) data[team].fouls = 0;
        render();
    }

    function updateTO(team, val) {
        data[team].to += val;
        if (data[team].to < 0) data[team].to = 0;
        render();
    }

    function changePeriod(val) {
        if(data.period === 'OT') return;
        data.period += val;
        if (data.period > 4) data.period = 'OT'; 
        data.home.fouls = 0; 
        data.guest.fouls = 0;
        render();
    }

    function updateTimerDisplay() {
        let minutes = Math.floor(data.timeRemaining / 60);
        let seconds = data.timeRemaining % 60;
        
        let formattedTime = 
            (minutes < 10 ? "0" + minutes : minutes) + ":" + 
            (seconds < 10 ? "0" + seconds : seconds);
        document.getElementById('game-timer').innerText = formattedTime;

        if(data.timeRemaining <= 60 && data.timeRemaining > 0) {
            document.getElementById('game-timer').style.color = '#ff3333';
        } else {
            document.getElementById('game-timer').style.color = '#ffcc00';
        }
    }

    function toggleTimer() {
        let btn = document.getElementById('btn-timer');
        let icon = document.getElementById('timer-icon');
        let label = document.getElementById('timer-text-label');

        if (isRunning) {
            clearInterval(timerInterval);
            isRunning = false;
            btn.classList.remove('btn-danger');
            btn.classList.add('btn-success');
            icon.className = "bi bi-play-fill";
            label.innerText = "開始計時";
        } else {
            if (data.timeRemaining <= 0) return;
            isRunning = true;
            btn.classList.remove('btn-success');
            btn.classList.add('btn-danger');
            icon.className = "bi bi-pause-fill";
            label.innerText = "暫停計時";

            timerInterval = setInterval(() => {
                if (data.timeRemaining > 0) {
                    data.timeRemaining--;
                    updateTimerDisplay();
                } else {
                    clearInterval(timerInterval);
                    isRunning = false;
                    btn.classList.remove('btn-danger');
                    btn.classList.add('btn-success');
                    icon.className = "bi bi-play-fill";
                    label.innerText = "開始計時";
                }
            }, 1000);
        }
    }

    function syncModalTimer() {
        if (isRunning) toggleTimer();
        updateModalDisplay();
    }

    function updateModalDisplay() {
        let minutes = Math.floor(data.timeRemaining / 60);
        let seconds = data.timeRemaining % 60;
        let formattedTime = (minutes < 10 ? "0" + minutes : minutes) + ":" + (seconds < 10 ? "0" + seconds : seconds);
        document.getElementById('modal-timer-display').innerText = formattedTime;
        updateTimerDisplay(); 
    }

    function adjustTime(seconds, isAbsolute = false) {
        if (isAbsolute) {
            data.timeRemaining = seconds;
        } else {
            data.timeRemaining += seconds;
        }
        if (data.timeRemaining < 0) data.timeRemaining = 0;
        if (data.timeRemaining > 3599) data.timeRemaining = 3599; 
        updateModalDisplay();
    }

    function executeReset() {
        if(isRunning) toggleTimer();
        data = {
            home: { score: 0, fouls: 0, to: 0 },
            guest: { score: 0, fouls: 0, to: 0 },
            period: 1,
            timeRemaining: DEFAULT_TIME
        };
        render();
    }

    function toggleFullscreen() {
        let elem = document.documentElement;
        if (!document.fullscreenElement) {
            if (elem.requestFullscreen) {
                elem.requestFullscreen().then(() => {
                    if (screen.orientation && screen.orientation.lock) {
                        if (!screen.orientation.type.startsWith('landscape')) {
                            screen.orientation.lock('landscape').catch(e => console.log(e));
                        }
                    }
                }).catch(e => console.log(e));
            }
        } else {
            if (document.exitFullscreen) {
                document.exitFullscreen();
            }
        }
    }

    window.onload = render;
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
