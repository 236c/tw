<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>專業籃球記分板</title>
    <style>
        /* 重置預設邊距，禁止選取文字與滑動 */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Arial', sans-serif; user-select: none; }
        body { background-color: #111; color: #fff; overflow: hidden; width: 100vw; height: 100vh; }
        
        /* 應用主體：彈性排版撐滿全螢幕 */
        #app { display: flex; flex-direction: column; width: 100%; height: 100%; padding: 1.5vmin; gap: 1.5vmin; }
        
        /* ======= 強制橫向顯示的 CSS 魔法 (已修改為向左轉觀看) ======= */
        @media screen and (orientation: portrait) {
            #app {
                transform: rotate(90deg); /* 順時針轉 90 度 */
                transform-origin: top left;
                width: 100vh;
                height: 100vw;
                position: absolute;
                top: 0;          /* 原點定在右上角 */
                left: 100vw;     /* 把整個畫面推回螢幕內 */
            }
        }

        /* --- 上半部：記分板 (佔 45% 高度) --- */
        .scoreboard { 
            display: flex; flex: 0.45; background-color: #000; border: 2px solid #444; 
            border-radius: 12px; box-shadow: 0 0 15px rgba(0,0,0,0.8);
        }
        .score-box { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .center-box { flex: 0.8; display: flex; flex-direction: column; align-items: center; justify-content: center; border-left: 2px solid #333; border-right: 2px solid #333; }
        
        .team-name { font-size: 3.5vmin; color: #aaa; letter-spacing: 2px; }
        .score { font-size: 22vmin; font-weight: bold; color: #ff3333; line-height: 1; font-family: 'Courier New', monospace; }
        .timer { font-size: 16vmin; font-weight: bold; color: #ffcc00; line-height: 1; font-family: 'Courier New', monospace; }
        
        .sub-info { display: flex; width: 80%; justify-content: space-around; margin-top: 1vmin; }
        .sub-item { display: flex; flex-direction: column; align-items: center; }
        .sub-label { font-size: 2.5vmin; color: #aaa; }
        .sub-val { font-size: 6vmin; color: #ff9900; font-weight: bold; }

        /* --- 下半部：控制台 (佔 55% 高度) --- */
        .controls { display: flex; flex: 0.55; gap: 1.5vmin; }
        
        /* 左、中、右三個控制區塊 */
        .ctrl-panel { 
            flex: 1; background-color: #222; border-radius: 12px; padding: 1.5vmin; 
            display: flex; flex-direction: column; align-items: center; 
        }
        .center-panel { flex: 0.8; } /* 中間稍微窄一點 */

        .team-title { font-size: 3vmin; color: #fff; margin-bottom: 1vmin; border-bottom: 1px solid #555; width: 100%; text-align: center; padding-bottom: 0.5vmin; }
        
        /* 按鈕網格排版 */
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1vmin; width: 100%; height: 100%; }
        .btn-grid-center { display: grid; grid-template-columns: 1fr; grid-template-rows: 2fr 1fr 1fr; gap: 1vmin; width: 100%; height: 100%; }
        
        button { 
            border: none; border-radius: 8px; font-weight: bold; font-size: 3vmin; cursor: pointer;
            display: flex; align-items: center; justify-content: center; width: 100%; height: 100%;
            transition: 0.1s;
        }
        button:active { transform: scale(0.95); opacity: 0.8; } /* 點擊回饋 */

        /* 各種按鈕顏色設定 */
        .btn-home-score { background-color: #0d6efd; color: white; }
        .btn-guest-score { background-color: #dc3545; color: white; }
        .btn-minus { background-color: #555; color: white; }
        .btn-foul { background-color: #fd7e14; color: white; }
        .btn-to { background-color: #0dcaf0; color: #000; }
        .btn-dark { background-color: #333; color: white; border: 1px solid #666; }
        .btn-start { background-color: #198754; color: white; font-size: 4.5vmin; }
        .btn-stop { background-color: #dc3545; color: white; font-size: 4.5vmin; }
        .btn-fs { background-color: #222; color: #ffcc00; border: 2px solid #ffcc00; }
    </style>
</head>
<body>

<div id="app">
    <div class="scoreboard">
        <div class="score-box">
            <div class="team-name">主隊 HOME</div>
            <div class="score" id="home-score">0</div>
            <div class="sub-info">
                <div class="sub-item"><span class="sub-label">犯規</span><span class="sub-val" id="home-fouls">0</span></div>
                <div class="sub-item"><span class="sub-label">暫停</span><span class="sub-val" id="home-to">0</span></div>
            </div>
        </div>

        <div class="center-box">
            <div class="team-name">比賽時間</div>
            <div class="timer" id="game-timer">12:00</div>
            <div class="sub-item mt-2">
                <span class="sub-label">節數 PERIOD</span>
                <span class="sub-val" style="color: #00ff00; font-size: 7vmin;" id="period">1</span>
            </div>
        </div>

        <div class="score-box">
            <div class="team-name">客隊 GUEST</div>
            <div class="score" id="guest-score">0</div>
            <div class="sub-info">
                <div class="sub-item"><span class="sub-label">犯規</span><span class="sub-val" id="guest-fouls">0</span></div>
                <div class="sub-item"><span class="sub-label">暫停</span><span class="sub-val" id="guest-to">0</span></div>
            </div>
        </div>
    </div>

    <div class="controls">
        <div class="ctrl-panel">
            <div class="team-title">主隊控制</div>
            <div class="btn-grid">
                <button class="btn-home-score" onclick="updateScore('home', 1)">+1 分</button>
                <button class="btn-home-score" onclick="updateScore('home', 2)">+2 分</button>
                <button class="btn-home-score" onclick="updateScore('home', 3)">+3 分</button>
                <button class="btn-minus" onclick="updateScore('home', -1)">-1 分</button>
                <button class="btn-foul" onclick="updateFoul('home', 1)">犯規 +1</button>
                <button class="btn-dark" onclick="updateFoul('home', -1)">-1</button>
                <button class="btn-to" onclick="updateTO('home', 1)">暫停 +1</button>
                <button class="btn-dark" onclick="updateTO('home', -1)">-1</button>
            </div>
        </div>

        <div class="ctrl-panel center-panel">
            <div class="team-title">系統控制</div>
            <div class="btn-grid-center">
                <button class="btn-start" id="btn-timer" onclick="toggleTimer()">開始計時</button>
                <div style="display: flex; gap: 1vmin;">
                    <button class="btn-dark" onclick="changePeriod(1)">下一節</button>
                    <button class="btn-dark" onclick="setTimer()">設定時間</button>
                </div>
                <div style="display: flex; gap: 1vmin;">
                    <button class="btn-dark" onclick="resetGame()">重置比賽</button>
                    <button class="btn-fs" onclick="toggleFullscreen()">📺 全螢幕</button>
                </div>
            </div>
        </div>

        <div class="ctrl-panel">
            <div class="team-title">客隊控制</div>
            <div class="btn-grid">
                <button class="btn-guest-score" onclick="updateScore('guest', 1)">+1 分</button>
                <button class="btn-guest-score" onclick="updateScore('guest', 2)">+2 分</button>
                <button class="btn-guest-score" onclick="updateScore('guest', 3)">+3 分</button>
                <button class="btn-minus" onclick="updateScore('guest', -1)">-1 分</button>
                <button class="btn-foul" onclick="updateFoul('guest', 1)">犯規 +1</button>
                <button class="btn-dark" onclick="updateFoul('guest', -1)">-1</button>
                <button class="btn-to" onclick="updateTO('guest', 1)">暫停 +1</button>
                <button class="btn-dark" onclick="updateTO('guest', -1)">-1</button>
            </div>
        </div>
    </div>
</div>

<script>
    // 預設比賽時間為 12 分鐘 (720秒)
    const DEFAULT_TIME = 12 * 60;
    let data = {
        home: { score: 0, fouls: 0, to: 0 },
        guest: { score: 0, fouls: 0, to: 0 },
        period: 1,
        timeRemaining: DEFAULT_TIME
    };
    
    let timerInterval = null;
    let isRunning = false;

    function render() {
        document.getElementById('home-score').innerText = data.home.score;
        document.getElementById('home-fouls').innerText = data.home.fouls;
        document.getElementById('home-to').innerText = data.home.to;
        document.getElementById('guest-score').innerText = data.guest.score;
        document.getElementById('guest-fouls').innerText = data.guest.fouls;
        document.getElementById('guest-to').innerText = data.guest.to;
        document.getElementById('period').innerText = data.period;
        updateTimerDisplay();
    }

    function updateScore(team, points) {
        data[team].score += points;
        if (data[team].score < 0) data[team].score = 0; 
        render();
    }

    function updateFoul(team, val) {
        data[team].fouls += val;
        if (data[team].fouls < 0) data[team].fouls = 0;
        render();
    }

    function updateTO(team, val) {
        data[team].to += val;
        if (data[team].to < 0) data[team].to = 0;
        render();
    }

    function changePeriod(val) {
        data.period += val;
        if (data.period > 4) data.period = 'OT'; 
        data.home.fouls = 0; 
        data.guest.fouls = 0;
        render();
    }

    function updateTimerDisplay() {
        let minutes = Math.floor(data.timeRemaining / 60);
        let seconds = data.timeRemaining % 60;
        let formattedTime = 
            (minutes < 10 ? "0" + minutes : minutes) + ":" + 
            (seconds < 10 ? "0" + seconds : seconds);
        document.getElementById('game-timer').innerText = formattedTime;
    }

    function toggleTimer() {
        let btn = document.getElementById('btn-timer');
        if (isRunning) {
            clearInterval(timerInterval);
            isRunning = false;
            btn.innerText = "開始計時";
            btn.className = "btn-start";
        } else {
            if (data.timeRemaining <= 0) return;
            isRunning = true;
            btn.innerText = "暫停計時";
            btn.className = "btn-stop";
            timerInterval = setInterval(() => {
                if (data.timeRemaining > 0) {
                    data.timeRemaining--;
                    updateTimerDisplay();
                } else {
                    clearInterval(timerInterval);
                    isRunning = false;
                    btn.innerText = "開始計時";
                    btn.className = "btn-start";
                    alert("時間到！"); 
                }
            }, 1000);
        }
    }

    function setTimer() {
        if (isRunning) toggleTimer();
        let mins = prompt("請輸入單節比賽時間 (分鐘)：", "12");
        if (mins !== null) {
            let parsedMins = parseInt(mins);
            if (!isNaN(parsedMins) && parsedMins > 0) {
                data.timeRemaining = parsedMins * 60;
                updateTimerDisplay();
            } else {
                alert("請輸入有效的數字！");
            }
        }
    }

    function resetGame() {
        if(confirm("確定要重置整場比賽資料嗎？")) {
            if(isRunning) toggleTimer();
            data = {
                home: { score: 0, fouls: 0, to: 0 },
                guest: { score: 0, fouls: 0, to: 0 },
                period: 1,
                timeRemaining: DEFAULT_TIME
            };
            render();
        }
    }

    function toggleFullscreen() {
        let elem = document.documentElement;
        if (!document.fullscreenElement) {
            if (elem.requestFullscreen) {
                elem.requestFullscreen().then(() => {
                    if (screen.orientation && screen.orientation.lock) {
                        screen.orientation.lock('landscape').catch(e => console.log(e));
                    }
                }).catch(e => console.log(e));
            }
        } else {
            if (document.exitFullscreen) {
                document.exitFullscreen();
            }
        }
    }

    window.onload = render;
</script>

</body>
</html>
