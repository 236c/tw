<!DOCTYPE html>
<html lang="zh-TW" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PRO 專業籃球記分板</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

    <style>
        /* 基礎重置與防滑動 */
        * { user-select: none; box-sizing: border-box; }
        body, html { 
            height: 100dvh; width: 100dvw; overflow: hidden; 
            background-color: #0a0a0c; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            position: fixed; top: 0; left: 0; margin: 0; padding: 0;
        }

        /* 數位面板字體設定 */
        .digital-font { 
            font-family: 'Share Tech Mono', monospace; 
            font-weight: 700; 
        }

        /* === 全新彈性框架佈局 === */
        #app {
            display: flex;
            flex-direction: column;
            height: 100dvh;
            width: 100dvw;
            padding: 1.5vmin;
            gap: 1.5vmin;
        }
        
        .layout-row {
            display: flex;
            width: 100%;
            gap: 1.5vmin;
            min-height: 0; 
        }
        
        #top-row { flex: 1.3; } 
        #bottom-row { flex: 1; }

        .panel {
            background: linear-gradient(145deg, #16181c, #0e0f11);
            border: 1px solid #2a2d35;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            padding: 2vmin;
            min-width: 0; 
        }

        /* 各區塊比例 */
        .panel-score { flex: 1; background-color: #050505; border: 2px solid #222; }
        .panel-time { flex: 1; justify-content: center; align-items: center; position: relative; }
        .panel-ctrl { flex: 1; }
        .panel-sys { flex: 0.8; } 

        /* === 雙重限制字體演算法 === */
        .score-text { font-size: min(13vmax, 28vmin); line-height: 0.95; color: #ff3333; }
        .timer-text { font-size: min(10vmax, 22vmin); line-height: 0.95; color: #ffcc00; }
        .period-text { font-size: min(4vmax, 9vmin); color: #00ff66; margin-top: 1vmin;}
        .sub-val-text { font-size: min(3vmax, 7vmin); line-height: 1; color: #ff9900; }
        
        .team-label { font-size: min(1.8vmax, 4vmin); letter-spacing: 0.3vmax; color: #8892b0; font-weight: 600; text-align: center; }
        .sub-label { font-size: min(1.2vmax, 2.5vmin); color: #6c757d; letter-spacing: 1px; margin-bottom: 0.5vmin; }

        /* === 控制區按鈕網格 === */
        .btn-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 1vmin; 
            flex: 1; 
            min-height: 0;
        }
        .btn-grid-sys {
            display: flex;
            flex-direction: column;
            gap: 1vmin;
            flex: 1;
            min-height: 0;
        }
        .btn-sys-row {
            display: flex;
            gap: 1vmin;
            flex: 1;
        }

        /* 客製化按鈕覆蓋 */
        .btn { 
            font-size: min(1.8vmax, 4vmin); 
            font-weight: 600; border-radius: 8px; 
            display: flex; align-items: center; justify-content: center; gap: 0.5vmin; 
            transition: transform 0.1s ease;
            padding: 0; width: 100%; height: 100%;
        }
        .btn:active { transform: scale(0.96); }
        .btn-score-home { background-color: #0d6efd; color: white; border: none; }
        .btn-score-home:hover { background-color: #0b5ed7; color: white; }
        .btn-score-guest { background-color: #dc3545; color: white; border: none; }
        .btn-score-guest:hover { background-color: #bb2d3b; color: white; }
        
        /* 系統區特殊按鈕 */
        .btn-timer-main { flex: 2 !important; font-size: min(2.5vmax, 5.5vmin) !important; }

        /* === 手機直向時強制旋轉佈局 === */
        @media screen and (orientation: portrait) {
            #app {
                position: absolute !important;
                top: 50% !important;
                left: 50% !important;
                width: 100dvh !important;
                height: 100dvw !important;
                transform: translate(-50%, -50%) rotate(90deg) !important;
            }
        }
    </style>
</head>
<body>

<div id="app">
    <div id="top-row" class="layout-row">
        <div class="panel panel-score">
            <div class="team-label mb-auto">主隊 HOME</div>
            <div class="digital-font score-text text-center" id="home-score">0</div>
            <div class="d-flex justify-content-between mt-auto px-2">
                <div class="text-center">
                    <div class="sub-label">犯規 FOULS</div>
                    <div class="digital-font sub-val-text" id="home-fouls">0</div>
                </div>
                <div class="text-center">
                    <div class="sub-label">暫停 T.O.</div>
                    <div class="digital-font sub-val-text" id="home-to">0</div>
                </div>
            </div>
        </div>

        <div class="panel panel-time">
            <div class="team-label">比賽時間 GAME CLOCK</div>
            <div class="digital-font timer-text" id="game-timer">12:00</div>
            <div class="mt-2 text-center">
                <div class="sub-label">節數 PERIOD</div>
                <div class="digital-font period-text" id="period">1</div>
            </div>
        </div>

        <div class="panel panel-score">
            <div class="team-label mb-auto">客隊 GUEST</div>
            <div class="digital-font score-text text-center" id="guest-score">0</div>
            <div class="d-flex justify-content-between mt-auto px-2">
                <div class="text-center">
                    <div class="sub-label">暫停 T.O.</div>
                    <div class="digital-font sub-val-text" id="guest-to">0</div>
                </div>
                <div class="text-center">
                    <div class="sub-label">犯規 FOULS</div>
                    <div class="digital-font sub-val-text" id="guest-fouls">0</div>
                </div>
            </div>
        </div>
    </div>

    <div id="bottom-row" class="layout-row">
        <div class="panel panel-ctrl">
            <div class="team-label text-primary border-bottom border-secondary pb-1 mb-2"><i class="bi bi-shield-fill"></i> 主隊控制</div>
            <div class="btn-grid">
                <button class="btn btn-score-home" onclick="updateScore('home', 1)">+1 分</button>
                <button class="btn btn-score-home" onclick="updateScore('home', 2)">+2 分</button>
                <button class="btn btn-score-home" onclick="updateScore('home', 3)">+3 分</button>
                <button class="btn btn-outline-secondary" onclick="updateScore('home', -1)">-1 分</button>
                <button class="btn btn-warning" onclick="updateFoul('home', 1)"><i class="bi bi-flag-fill"></i> 犯規 +1</button>
                <button class="btn btn-outline-warning" onclick="updateFoul('home', -1)">退 1</button>
                <button class="btn btn-info text-dark" onclick="updateTO('home', 1)"><i class="bi bi-pause-circle-fill"></i> 暫停 +1</button>
                <button class="btn btn-outline-info" onclick="updateTO('home', -1)">退 1</button>
            </div>
        </div>

        <div class="panel panel-sys">
            <div class="team-label text-light border-bottom border-secondary pb-1 mb-2"><i class="bi bi-cpu-fill"></i> 系統控制</div>
            <div class="btn-grid-sys">
                <button class="btn btn-success shadow-lg btn-timer-main" id="btn-timer" onclick="toggleTimer()">
                    <i class="bi bi-play-fill" id="timer-icon"></i> <span id="timer-text-label">開始計時</span>
                </button>
                <div class="btn-sys-row">
                    <button class="btn btn-outline-light" onclick="changePeriod(1)">下一節</button>
                    <button class="btn btn-outline-light" data-bs-toggle="modal" data-bs-target="#timerModal" onclick="syncModalTimer()"><i class="bi bi-clock-history"></i> 設時</button>
                </div>
                <div class="btn-sys-row">
                    <button class="btn btn-outline-danger" data-bs-toggle="modal" data-bs-target="#resetModal"><i class="bi bi-arrow-counterclockwise"></i> 重置</button>
                    <button class="btn btn-outline-warning" onclick="toggleFullscreen()"><i class="bi bi-arrows-fullscreen"></i> 全螢幕</button>
                </div>
            </div>
        </div>

        <div class="panel panel-ctrl">
            <div class="team-label text-danger border-bottom border-secondary pb-1 mb-2"><i class="bi bi-shield-fill"></i> 客隊控制</div>
            <div class="btn-grid">
                <button class="btn btn-score-guest" onclick="updateScore('guest', 1)">+1 分</button>
                <button class="btn btn-score-guest" onclick="updateScore('guest', 2)">+2 分</button>
                <button class="btn btn-score-guest" onclick="updateScore('guest', 3)">+3 分</button>
                <button class="btn btn-outline-secondary" onclick="updateScore('guest', -1)">-1 分</button>
                <button class="btn btn-warning" onclick="updateFoul('guest', 1)"><i class="bi bi-flag-fill"></i> 犯規 +1</button>
                <button class="btn btn-outline-warning" onclick="updateFoul('guest', -1)">退 1</button>
                <button class="btn btn-info text-dark" onclick="updateTO('guest', 1)"><i class="bi bi-pause-circle-fill"></i> 暫停 +1</button>
                <button class="btn btn-outline-info" onclick="updateTO('guest', -1)">退 1</button>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="timeUpModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content glass-panel border-warning text-light text-center">
      <div class="modal-body py-5">
        <i class="bi bi-bell-fill text-warning" style="font-size: 5rem;"></i>
        <h1 class="display-3 fw-bold text-danger mt-3 digital-font">00:00</h1>
        <h2 class="text-warning fw-bold mt-2">時間到！</h2>
      </div>
      <div class="modal-footer border-0 justify-content-center pb-4">
        <button type="button" class="btn btn-warning px-5 py-2 fs-3 text-dark fw-bold" data-bs-dismiss="modal" style="width: auto;">確認</button>
      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="timerModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content glass-panel border-secondary text-light">
      <div class="modal-header border-secondary">
        <h5 class="modal-title"><i class="bi bi-clock"></i> 設定比賽時間</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body text-center">
        <div class="digital-font text-warning mb-4" id="modal-timer-display" style="font-size: 10vmin; line-height: 1;">12:00</div>
        
        <div class="row g-2 px-4">
            <div class="col-6">
                <button class="btn btn-outline-light w-100 py-3 fs-5" onclick="adjustTime(60)">+1 分鐘</button>
            </div>
            <div class="col-6">
                <button class="btn btn-outline-light w-100 py-3 fs-5" onclick="adjustTime(-60)">-1 分鐘</button>
            </div>
            <div class="col-6">
                <button class="btn btn-outline-secondary w-100 py-3 fs-5" onclick="adjustTime(1)">+1 秒鐘</button>
            </div>
            <div class="col-6">
                <button class="btn btn-outline-secondary w-100 py-3 fs-5" onclick="adjustTime(-1)">-1 秒鐘</button>
            </div>
        </div>
        <div class="mt-3">
            <button class="btn btn-primary w-100 py-2 fs-5" onclick="adjustTime(12*60, true)">預設 12 分鐘</button>
        </div>
      </div>
      <div class="modal-footer border-secondary">
        <button type="button" class="btn btn-success w-100 fs-4" style="width: 100%;" data-bs-dismiss="modal">完成設定</button>
      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="resetModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content glass-panel border-secondary text-light">
      <div class="modal-header border-secondary">
        <h5 class="modal-title text-danger"><i class="bi bi-exclamation-triangle-fill"></i> 重置比賽</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body fs-5 text-center py-4">
        確定要將所有分數、犯規、暫停與時間<strong class="text-danger">歸零</strong>嗎？<br>此動作無法復原。
      </div>
      <div class="modal-footer border-secondary d-flex gap-2">
        <button type="button" class="btn btn-outline-secondary flex-fill" data-bs-dismiss="modal">取消</button>
        <button type="button" class="btn btn-danger flex-fill" data-bs-dismiss="modal" onclick="executeReset()">確定重置</button>
      </div>
    </div>
  </div>
</div>

<script>
    const DEFAULT_TIME = 12 * 60;
    let data = {
        home: { score: 0, fouls: 0, to: 0 },
        guest: { score: 0, fouls: 0, to: 0 },
        period: 1,
        timeRemaining: DEFAULT_TIME
    };
    
    let timerInterval = null;
    let isRunning = false;

    // --- 新增：使用 Web Audio API 產生蜂鳴器音效 ---
    function playBuzzer() {
        try {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            const ctx = new AudioContext();
            const osc = ctx.createOscillator();
            const gainNode = ctx.createGain();

            // 鋸齒波聽起來比較像比賽蜂鳴器
            osc.type = 'sawtooth'; 
            osc.frequency.setValueAtTime(350, ctx.currentTime);
            
            // 設定音量衰減，總長 1.5 秒
            gainNode.gain.setValueAtTime(1, ctx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 1.5);

            osc.connect(gainNode);
            gainNode.connect(ctx.destination);

            osc.start();
            osc.stop(ctx.currentTime + 1.5);
        } catch (e) {
            console.log("瀏覽器不支援音效或需要手動解鎖", e);
        }
    }

    function render() {
        document.getElementById('home-score').innerText = data.home.score;
        document.getElementById('home-fouls').innerText = data.home.fouls;
        document.getElementById('home-to').innerText = data.home.to;
        document.getElementById('guest-score').innerText = data.guest.score;
        document.getElementById('guest-fouls').innerText = data.guest.fouls;
        document.getElementById('guest-to').innerText = data.guest.to;
        document.getElementById('period').innerText = data.period;
        updateTimerDisplay();
    }

    function updateScore(team, points) {
        data[team].score += points;
        if (data[team].score < 0) data[team].score = 0; 
        render();
    }

    function updateFoul(team, val) {
        data[team].fouls += val;
        if (data[team].fouls < 0) data[team].fouls = 0;
        render();
    }

    function updateTO(team, val) {
        data[team].to += val;
        if (data[team].to < 0) data[team].to = 0;
        render();
    }

    function changePeriod(val) {
        if(data.period === 'OT') return;
        data.period += val;
        if (data.period > 4) data.period = 'OT'; 
        data.home.fouls = 0; 
        data.guest.fouls = 0;
        render();
    }

    function updateTimerDisplay() {
        let minutes = Math.floor(data.timeRemaining / 60);
        let seconds = data.timeRemaining % 60;
        
        let formattedTime = 
            (minutes < 10 ? "0" + minutes : minutes) + ":" + 
            (seconds < 10 ? "0" + seconds : seconds);
        document.getElementById('game-timer').innerText = formattedTime;

        if(data.timeRemaining <= 60 && data.timeRemaining > 0) {
            document.getElementById('game-timer').style.color = '#ff3333';
        } else {
            document.getElementById('game-timer').style.color = '#ffcc00';
        }
    }

    function toggleTimer() {
        let btn = document.getElementById('btn-timer');
        let icon = document.getElementById('timer-icon');
        let label = document.getElementById('timer-text-label');

        if (isRunning) {
            clearInterval(timerInterval);
            isRunning = false;
            btn.classList.remove('btn-danger');
            btn.classList.add('btn-success');
            icon.className = "bi bi-play-fill";
            label.innerText = "開始計時";
        } else {
            if (data.timeRemaining <= 0) return;
            isRunning = true;
            btn.classList.remove('btn-success');
            btn.classList.add('btn-danger');
            icon.className = "bi bi-pause-fill";
            label.innerText = "暫停計時";

            timerInterval = setInterval(() => {
                if (data.timeRemaining > 0) {
                    data.timeRemaining--;
                    updateTimerDisplay();
                    
                    // --- 新增：倒數到 0 時觸發提示 ---
                    if (data.timeRemaining === 0) {
                        clearInterval(timerInterval);
                        isRunning = false;
                        btn.classList.remove('btn-danger');
                        btn.classList.add('btn-success');
                        icon.className = "bi bi-play-fill";
                        label.innerText = "開始計時";
                        
                        // 播放蜂鳴器音效
                        playBuzzer();
                        
                        // 彈出時間到視窗
                        var timeUpModal = new bootstrap.Modal(document.getElementById('timeUpModal'));
                        timeUpModal.show();
                    }
                }
            }, 1000);
        }
    }

    function syncModalTimer() {
        if (isRunning) toggleTimer();
        updateModalDisplay();
    }

    function updateModalDisplay() {
        let minutes = Math.floor(data.timeRemaining / 60);
        let seconds = data.timeRemaining % 60;
        let formattedTime = (minutes < 10 ? "0" + minutes : minutes) + ":" + (seconds < 10 ? "0" + seconds : seconds);
        document.getElementById('modal-timer-display').innerText = formattedTime;
        updateTimerDisplay(); 
    }

    function adjustTime(seconds, isAbsolute = false) {
        if (isAbsolute) {
            data.timeRemaining = seconds;
        } else {
            data.timeRemaining += seconds;
        }
        if (data.timeRemaining < 0) data.timeRemaining = 0;
        if (data.timeRemaining > 3599) data.timeRemaining = 3599; 
        updateModalDisplay();
    }

    function executeReset() {
        if(isRunning) toggleTimer();
        data = {
            home: { score: 0, fouls: 0, to: 0 },
            guest: { score: 0, fouls: 0, to: 0 },
            period: 1,
            timeRemaining: DEFAULT_TIME
        };
        render();
    }

    function toggleFullscreen() {
        let elem = document.documentElement;
        if (!document.fullscreenElement) {
            if (elem.requestFullscreen) {
                elem.requestFullscreen().then(() => {
                    if (screen.orientation && screen.orientation.lock) {
                        if (!screen.orientation.type.startsWith('landscape')) {
                            screen.orientation.lock('landscape').catch(e => console.log(e));
                        }
                    }
                }).catch(e => console.log(e));
            }
        } else {
            if (document.exitFullscreen) {
                document.exitFullscreen();
            }
        }
    }

    window.onload = render;
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
