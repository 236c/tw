<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>籃球極限跑酷 - 互動神射手版 (含老師語錄)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,800;1,900&family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #0f172a; 
            user-select: none; 
            -webkit-user-select: none;
            touch-action: manipulation;
            min-height: 100vh; 
            margin: 0;
            font-family: 'Noto Sans TC', sans-serif;
            display: flex;
            align-items: center;
        }
        
        .card {
            border: none;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.7) !important;
        }

        .card-body {
            position: relative; 
            background-color: #1e293b !important;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
        }

        #gameCanvas {
            background-color: #1e293b; 
            display: block;
            margin: 0 auto;
            width: 100%; 
            max-width: 800px;
            height: auto; 
            cursor: crosshair; 
        }

        /* --- 起始選單 UI 樣式 --- */
        .menu-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.85); 
            backdrop-filter: blur(4px); 
            -webkit-backdrop-filter: blur(4px);
            z-index: 10; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.4s, transform 0.4s; 
            visibility: visible;
            opacity: 1;
            overflow: hidden;
            cursor: pointer;
        }
        
        .menu-overlay::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 200%; height: 200%;
            background: repeating-linear-gradient(
                45deg,
                transparent,
                transparent 4px,
                rgba(0, 242, 254, 0.03) 4px,
                rgba(0, 242, 254, 0.03) 8px
            );
            pointer-events: none;
            z-index: -1;
            animation: panBackground 20s linear infinite;
        }

        @keyframes panBackground {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-50px, -50px); }
        }

        .menu-overlay.hidden {
            visibility: hidden;
            opacity: 0;
            transform: scale(1.05); 
            pointer-events: none;
        }
        
        .game-title {
            font-family: 'Montserrat', 'Noto Sans TC', sans-serif;
            font-weight: 900;
            font-style: italic;
            font-size: 2.8rem; 
            margin-bottom: 0.5rem; 
            text-transform: uppercase;
            background: linear-gradient(45deg, #00f2fe, #4facfe, #00f2fe); 
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
            animation: floatTitle 3s ease-in-out infinite, gradientShine 3s linear infinite;
        }

        .game-subtitle {
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            font-size: 1.5rem;
            color: #e2e8f0;
            margin-bottom: 1rem;
            letter-spacing: 1px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        @keyframes floatTitle {
            0%, 100% { transform: translateY(0); filter: drop-shadow(0px 5px 15px rgba(0, 242, 254, 0.3)); }
            50% { transform: translateY(-8px); filter: drop-shadow(0px 10px 20px rgba(0, 242, 254, 0.7)); }
        }
        @keyframes gradientShine {
            to { background-position: 200% center; }
        }

        .instruction-box {
            background: rgba(255, 255, 255, 0.05);
            border-left: 4px solid #00f2fe;
            padding: 10px 20px;
            border-radius: 6px;
            color: #e2e8f0;
            margin-bottom: 1.5rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            position: relative;
            backdrop-filter: blur(10px);
            text-align: center;
        }

        /* 按鈕樣式整合微調 */
        .btn-play {
            position: relative;
            background: linear-gradient(135deg, #00f2fe, #4facfe);
            border: none;
            color: white;
            font-weight: 800;
            letter-spacing: 1.5px;
            border-radius: 50px;
            padding: 12px 45px; 
            box-shadow: 0 8px 25px rgba(0, 242, 254, 0.4);
            transition: all 0.3s ease;
            overflow: hidden;
            cursor: pointer;
        }
        
        .btn-play::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 50%; height: 100%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.4) 50%, rgba(255,255,255,0) 100%);
            transform: skewX(-25deg);
            animation: sweepLight 3s infinite;
        }

        @keyframes sweepLight {
            0% { left: -100%; }
            20% { left: 200%; }
            100% { left: 200%; }
        }

        .btn-play:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 12px 30px rgba(0, 242, 254, 0.6);
            color: white;
        }

        .hud-ui {
            z-index: 15;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        
        #fullscreenBtn {
            cursor: pointer;
            transition: transform 0.2s;
            pointer-events: auto; 
        }
        #fullscreenBtn:hover {
            transform: scale(1.1);
        }

        .pulse-text {
            animation: pulseOpacity 2s infinite;
        }
        @keyframes pulseOpacity {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        @media (max-width: 768px) and (orientation: portrait) {
            .card-body { min-height: 380px; }
            .game-title { font-size: 2.2rem; margin-bottom: 0.2rem; }
            .game-subtitle { font-size: 1.2rem; margin-bottom: 0.8rem; }
            .instruction-box { font-size: 0.85rem; padding: 8px 15px; margin-bottom: 1rem; }
            .btn-play { padding: 10px 30px; }
        }

        #gameWrapper:fullscreen, #gameWrapper:-webkit-full-screen {
            background-color: #0f172a !important;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100vw;
            height: 100vh;
        }
        
        #gameWrapper:fullscreen #gameCanvas, #gameWrapper:-webkit-full-screen #gameCanvas {
            width: 100vw;
            height: 100vh;
            max-width: none;
            border-radius: 0;
            object-fit: contain; 
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-10 text-center">
            <div class="card shadow-lg">
                <div class="card-body" id="gameWrapper">
                    
                    <div id="fullscreenBtn" class="position-absolute top-0 start-0 p-3 fs-4 text-info hud-ui" title="全螢幕">
                        ⛶
                    </div>

                    <div id="mainMenuOverlay" class="menu-overlay">
                        <div class="game-title">十興國小 籃球隊</div>
                        <div class="game-subtitle">SHES Basketball</div>
                        
                        <div class="instruction-box">
                            <div class="fs-6 mb-1">🏀 <strong>互動神射手模式</strong></div>
                            <div class="small">
                                <span class="text-warning fw-bold">點擊奔跑中的球員，讓他們超遠距出手！</span><br>
                                (老師隨時在場邊盯著你們 👀)
                            </div>
                        </div>
                        
                        <button id="startBtn" class="btn btn-play d-flex flex-column align-items-center">
                            <span style="font-size: 1.3rem; margin-bottom: 2px;">START PLAYING</span>
                            <span class="pulse-text" style="font-size: 0.85rem; font-weight: 400; letter-spacing: 2px;">- 點擊畫面任意處開始 -</span>
                        </button>
                    </div>
                    
                    <canvas id="gameCanvas" width="800" height="300"></canvas>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const mainMenuOverlay = document.getElementById('mainMenuOverlay');

    mainMenuOverlay.addEventListener('click', () => {
        mainMenuOverlay.classList.add('hidden');
    });

    const gameWrapper = document.getElementById('gameWrapper');
    const fullscreenBtn = document.getElementById('fullscreenBtn');

    fullscreenBtn.addEventListener('click', (e) => {
        e.stopPropagation(); 
        if (!document.fullscreenElement && !document.webkitFullscreenElement) {
            if (gameWrapper.requestFullscreen) {
                gameWrapper.requestFullscreen();
            } else if (gameWrapper.webkitRequestFullscreen) { 
                gameWrapper.webkitRequestFullscreen();
            }
        } else {
            if (document.exitFullscreen) {
                document.exitFullscreen();
            } else if (document.webkitExitFullscreen) { 
                document.webkitExitFullscreen();
            }
        }
    });

    function handleFullscreenChange() {
        if (document.fullscreenElement || document.webkitFullscreenElement) {
            fullscreenBtn.innerHTML = '✖'; 
            fullscreenBtn.style.color = '#ef4444'; 
        } else {
            fullscreenBtn.innerHTML = '⛶'; 
            fullscreenBtn.style.color = '#00f2fe'; 
        }
    }
    document.addEventListener('fullscreenchange', handleFullscreenChange);
    document.addEventListener('webkitfullscreenchange', handleFullscreenChange);

    // --- 十興國小籃球隊名單 ---
    const playerNames = [
        "六真 徐毅丞", "六真 董宥葳", "六樂 吳秉恩", "六良 劉軒禎",
        "六儉 蔡昕宏", "六儉 林稟硯", "六勤 范睿軒", "六勤 蘇靖翔",
        "六勤 張栩睿", "五真 黃御展", "五智 張煒誠", "五溫 張皓丞",
        "五善 蔡棏曜", "五智 范翔鈞", "五智 邱得洛", "五美 黃晟祐",
        "五溫 周楷杰", "五良 沈廷軒", "五良 鄭光熙", "五真 黃宇紘",
        "五美 張家閎", "五真 邱嚴平", "五溫 羅毅軒", "五樂 姜樂",
        "四良 郭曜丞", "四恭 古宇超", "四誠 陳品勳"
    ];

    // --- 老師語錄系統 ---
    const teacherQuotes = [
        "專心點！眼睛看哪裡啊！",
        "跑位！跑起來！不要站在那邊發呆！",
        "防守！手舉高！",
        "這球傳得太隨便了！",
        "呼吸！調整節奏！",
        "平常練習是這樣教的嗎？",
        "卡位！籃板球是誰的！",
        "好球！繼續保持！", 
        "節奏慢下來！不要急！"
    ];
    
    const missQuotes = [
        "這在投什麼東西？！",
        "手腕！用手腕的力量！",
        "用力過猛啦！",
        "沒進沒關係，趕快回防！",
        "專注力呢？"
    ];

    class QuoteManager {
        constructor() {
            this.quotes = [];
            this.lastRandomQuoteTime = 0;
            this.randomQuoteInterval = 4000; 
        }

        addQuote(text, color = '#facc15') {
            let x = 200 + Math.random() * 300;
            let y = 60 + Math.random() * 40;
            this.quotes.push({
                text: text,
                x: x,
                y: y,
                alpha: 1.0,
                color: color,
                life: 120 
            });
        }

        updateAndDraw(ctx) {
            let currentTime = Date.now();
            
            if (currentTime - this.lastRandomQuoteTime > this.randomQuoteInterval) {
                if (Math.random() > 0.6) { 
                    let q = teacherQuotes[Math.floor(Math.random() * teacherQuotes.length)];
                    this.addQuote(q);
                }
                this.lastRandomQuoteTime = currentTime;
                this.randomQuoteInterval = 3000 + Math.random() * 3000; 
            }

            for (let i = this.quotes.length - 1; i >= 0; i--) {
                let q = this.quotes[i];
                q.y -= 0.3; 
                q.life--;

                if (q.life < 30) {
                    q.alpha = q.life / 30;
                } else if (q.life > 105) {
                     q.alpha = (120 - q.life) / 15;
                } else {
                    q.alpha = 1.0;
                }

                if (q.life <= 0) {
                    this.quotes.splice(i, 1);
                    continue;
                }

                ctx.save();
                ctx.globalAlpha = q.alpha;
                ctx.font = 'bold 22px "Noto Sans TC", sans-serif';
                ctx.textAlign = 'center';
                
                ctx.shadowColor = q.color;
                ctx.shadowBlur = 10;
                ctx.fillStyle = q.color;
                
                ctx.fillText(`💬 老師：「${q.text}」`, q.x, q.y);
                ctx.restore();
            }
        }
    }

    const quoteManager = new QuoteManager();

    // --- 籃框與籃網物理系統 ---
    class BasketballHoop {
        constructor() {
            this.rimY = 85; 
            this.rimLeft = 722; 
            this.rimRight = 742; 
            
            this.netAnim = 0; 
            this.swishActive = false;
        }

        triggerSwish() {
            this.netAnim = 1.0; 
            this.swishActive = true;
        }

        update() {
            if (this.swishActive) {
                this.netAnim -= 0.035; 
                if (this.netAnim <= 0) {
                    this.netAnim = 0;
                    this.swishActive = false;
                }
            }
        }

        draw(ctx) {
            ctx.save();
            
            ctx.fillStyle = '#475569';
            ctx.fillRect(750, 40, 10, 260); 
            
            ctx.fillStyle = 'rgba(240, 248, 255, 0.85)';
            ctx.fillRect(742, 40, 8, 60); 

            ctx.strokeStyle = '#ef4444';
            ctx.lineWidth = 3;
            ctx.strokeRect(742, 55, 8, 25); 
            
            let sway = 0;   
            let stretch = 0; 
            
            if (this.swishActive) {
                sway = Math.sin((1 - this.netAnim) * Math.PI * 6) * (10 * this.netAnim);
                stretch = Math.sin((1 - this.netAnim) * Math.PI * 2) * (7 * this.netAnim);
            }

            ctx.strokeStyle = 'rgba(255, 255, 255, 0.7)';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            
            let netTopY = this.rimY;
            let netBotY = netTopY + 22 + stretch; 
            let netBotLeft = this.rimLeft + 3.5 + sway;
            let netBotRight = this.rimRight - 3.5 + sway;

            const verticalStrands = 6;
            for (let i = 0; i <= verticalStrands; i++) {
                let ratio = i / verticalStrands;
                let topX = (this.rimLeft + 1) + (this.rimRight - this.rimLeft - 2) * ratio; 
                let botX = netBotLeft + (netBotRight - netBotLeft) * ratio;
                
                ctx.moveTo(topX, netTopY);
                ctx.quadraticCurveTo(topX + sway * 0.5, netTopY + 11 + stretch * 0.5, botX, netBotY);
            }

            const horizontalStrands = 3;
            for (let j = 1; j <= horizontalStrands; j++) {
                let ratio = j / (horizontalStrands + 1);
                let y = netTopY + (netBotY - netTopY) * ratio;
                let topX_left = this.rimLeft + 1; let botX_left = netBotLeft;
                let currentLeft = topX_left + ratio * (botX_left - topX_left);
                let topX_right = this.rimRight - 1; let botX_right = netBotRight;
                let currentRight = topX_right + ratio * (botX_right - topX_right);
                
                ctx.moveTo(currentLeft, y);
                ctx.quadraticCurveTo(currentLeft + (currentRight - currentLeft) / 2, y + 4 * ratio + stretch * ratio, currentRight, y);
            }
            ctx.stroke();

            ctx.strokeStyle = '#ea580c';
            ctx.lineWidth = 4;
            ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(this.rimLeft, this.rimY); 
            ctx.lineTo(this.rimRight, this.rimY); 
            ctx.stroke();

            ctx.restore();
        }
    }

    const globalHoop = new BasketballHoop();

    // --- 畫布與動畫邏輯 ---
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    const stickmanColors = ['#38bdf8', '#10b981', '#facc15', '#ef4444', '#a855f7', '#f472b6', '#cbd5e1'];
    
    class Stickman {
        constructor() {
            this.init(true); 
        }

        init(randomStart = false) {
            this.baseY = 80 + Math.random() * 180; 
            this.y = this.baseY;
            this.scale = 0.4 + (this.baseY / 300) * 0.8; 
            this.speed = (1.5 + Math.random() * 2) * this.scale; 
            this.x = randomStart ? Math.random() * (canvas.width - 200) : -100;
            this.localFrames = Math.random() * 1000; 
            this.color = stickmanColors[Math.floor(Math.random() * stickmanColors.length)];
            this.ballColor = '#f97316';
            
            this.playerName = playerNames[Math.floor(Math.random() * playerNames.length)];

            this.state = 'run';
            this.jumpVy = 0;
            
            this.ballThrown = false;
            this.ballScored = false; 
            this.willScore = true; 
            this.missQuoteTriggered = false; 
            
            this.ballWorldX = 0;
            this.ballWorldY = 0;
            this.ballVx = 0;
            this.ballVy = 0;
            this.worldGravity = 0;
        }

        forceShoot() {
            if (this.state !== 'run') return; 
            this.state = 'jump';
            this.jumpVy = -8 * this.scale;
            this.willScore = Math.random() > 0.5;
        }

        update() {
            if (this.state === 'run') {
                this.x += this.speed;
                this.localFrames += this.speed * 0.2; 
                
                let jumpDistance = 120 * this.scale; 
                if (this.x > 720 - jumpDistance) {
                    this.forceShoot();
                    this.willScore = Math.random() > 0.15; 
                }
            } 
            else if (this.state === 'jump') {
                this.x += this.speed * 0.7; 
                this.y += this.jumpVy;
                this.jumpVy += 0.35 * this.scale; 

                if (this.jumpVy > -1 * this.scale && !this.ballThrown) {
                    this.ballThrown = true;
                    this.ballWorldX = this.x + 20 * this.scale;
                    this.ballWorldY = this.y - 5 * this.scale; 

                    let hoopTargetX = (globalHoop.rimLeft + globalHoop.rimRight) / 2; 
                    let hoopTargetY = globalHoop.rimY; 
                    
                    if (!this.willScore) {
                        let offset = Math.random() > 0.5 ? -18 : 15;
                        hoopTargetX += offset;
                        hoopTargetY -= Math.random() * 10; 
                    }

                    let dx = hoopTargetX - this.ballWorldX;
                    let flightFrames = Math.max(16, dx / 12); 
                    let gravity = 0.6;
                    
                    let rX = (Math.random() - 0.5) * 6;
                    let rY = (Math.random() - 0.5) * 6;
                    
                    this.ballVx = (hoopTargetX + rX - this.ballWorldX) / flightFrames;
                    this.ballVy = (hoopTargetY + rY - this.ballWorldY - 0.5 * gravity * flightFrames * flightFrames) / flightFrames;
                    this.worldGravity = gravity;
                }

                if (this.y >= this.baseY) {
                    this.y = this.baseY;
                    this.state = 'run_away';
                }
            }
            else if (this.state === 'run_away') {
                this.x += this.speed;
                this.localFrames += this.speed * 0.2; 
            }

            if (this.ballThrown) {
                let prevBallY = this.ballWorldY; 
                
                this.ballWorldX += this.ballVx;
                this.ballWorldY += this.ballVy;
                this.ballVy += this.worldGravity;

                if (!this.ballScored && prevBallY < globalHoop.rimY && this.ballWorldY >= globalHoop.rimY) {
                    
                    if (this.willScore && this.ballWorldX > globalHoop.rimLeft - 5 && this.ballWorldX < globalHoop.rimRight + 5) {
                        this.ballScored = true;
                        globalHoop.triggerSwish(); 
                    } 
                    else if (!this.willScore && this.ballWorldX > globalHoop.rimLeft - 20 && this.ballWorldX < globalHoop.rimRight + 20) {
                        this.ballVy = -this.ballVy * (0.4 + Math.random() * 0.3); 
                        this.ballVx = this.ballVx * 0.5 + (Math.random() - 0.5) * 6; 
                        this.ballWorldY = globalHoop.rimY - 2; 

                        if (!this.missQuoteTriggered && Math.random() > 0.5) {
                            this.missQuoteTriggered = true;
                            let q = missQuotes[Math.floor(Math.random() * missQuotes.length)];
                            quoteManager.addQuote(`${this.playerName.split(' ')[1]}，${q}`, '#ef4444');
                        }
                    }
                }
            }

            if (this.x > canvas.width + 100 && (!this.ballThrown || this.ballWorldY > canvas.height + 50)) {
                this.init();
            }
        }

        draw() {
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.scale(this.scale, this.scale);

            const cx = 0;
            const headY = 10;
            const neckY = 20;
            const hipY = 36;
            const footY = 50;
            
            ctx.save();
            ctx.shadowBlur = 4;
            ctx.shadowColor = this.color; 
            ctx.fillStyle = '#ffffff'; 
            ctx.font = 'bold 20px "Noto Sans TC", sans-serif'; 
            ctx.textAlign = 'center';
            ctx.fillText(this.playerName, cx, headY - 18);
            ctx.restore();

            ctx.strokeStyle = this.color; 
            ctx.lineWidth = 4;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.shadowColor = this.color; 
            ctx.shadowBlur = 4;

            ctx.beginPath(); ctx.arc(cx, headY, 7, 0, Math.PI * 2); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(cx, neckY); ctx.lineTo(cx, hipY); ctx.stroke();

            let ballX = 0, ballY = 0, drawLocalBall = false;

            if (this.state === 'run' || this.state === 'run_away') {
                const runCycle = Math.sin(this.localFrames); 
                let leftKneeX = cx - 12 * runCycle, leftKneeY = hipY + 6, leftFootX = cx - 18 * runCycle, leftFootY = footY;
                let rightKneeX = cx + 12 * runCycle, rightKneeY = hipY + 6, rightFootX = cx + 18 * runCycle, rightFootY = footY;
                
                ctx.beginPath(); ctx.moveTo(cx, hipY); ctx.lineTo(leftKneeX, leftKneeY); ctx.lineTo(leftFootX, leftFootY); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(cx, hipY); ctx.lineTo(rightKneeX, rightKneeY); ctx.lineTo(rightFootX, rightFootY); ctx.stroke();

                let leftElbowX = cx - 8, leftElbowY = neckY + 8, leftHandX = cx - 15 + 10 * runCycle, leftHandY = neckY + 15;
                ctx.beginPath(); ctx.moveTo(cx, neckY); ctx.lineTo(leftElbowX, leftElbowY); ctx.lineTo(leftHandX, leftHandY); ctx.stroke();

                if (this.state === 'run') {
                    ballX = cx + 25;
                    ballY = hipY + Math.sin(this.localFrames * 0.8) * 12; 
                    drawLocalBall = true;
                    let rightElbowX = cx + 12, rightElbowY = neckY + 5, rightHandX = ballX - 3, rightHandY = ballY - 6;
                    ctx.beginPath(); ctx.moveTo(cx, neckY); ctx.lineTo(rightElbowX, rightElbowY); ctx.lineTo(rightHandX, rightHandY); ctx.stroke();
                } else {
                    let rightElbowX = cx + 8, rightElbowY = neckY + 8, rightHandX = cx + 15 - 10 * runCycle, rightHandY = neckY + 15;
                    ctx.beginPath(); ctx.moveTo(cx, neckY); ctx.lineTo(rightElbowX, rightElbowY); ctx.lineTo(rightHandX, rightHandY); ctx.stroke();
                }
            } 
            else if (this.state === 'jump') {
                let leftKneeX = cx - 5, leftKneeY = hipY + 15, leftFootX = cx - 10, leftFootY = hipY + 30; 
                let rightKneeX = cx + 15, rightKneeY = hipY - 5, rightFootX = cx + 15, rightFootY = hipY + 15; 
                
                ctx.beginPath(); ctx.moveTo(cx, hipY); ctx.lineTo(leftKneeX, leftKneeY); ctx.lineTo(leftFootX, leftFootY); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(cx, hipY); ctx.lineTo(rightKneeX, rightKneeY); ctx.lineTo(rightFootX, rightFootY); ctx.stroke();

                let leftElbowX = cx - 15, leftElbowY = neckY + 5, leftHandX = cx - 20, leftHandY = neckY - 5;
                ctx.beginPath(); ctx.moveTo(cx, neckY); ctx.lineTo(leftElbowX, leftElbowY); ctx.lineTo(leftHandX, leftHandY); ctx.stroke();

                if (!this.ballThrown) {
                    let rightElbowX = cx + 10, rightElbowY = neckY - 5, rightHandX = cx + 20, rightHandY = headY - 15;
                    ctx.beginPath(); ctx.moveTo(cx, neckY); ctx.lineTo(rightElbowX, rightElbowY); ctx.lineTo(rightHandX, rightHandY); ctx.stroke();
                    ballX = rightHandX + 5;
                    ballY = rightHandY - 5;
                    drawLocalBall = true;
                } else {
                    let rightElbowX = cx + 15, rightElbowY = neckY - 10, rightHandX = cx + 25, rightHandY = headY - 25;
                    ctx.beginPath(); ctx.moveTo(cx, neckY); ctx.lineTo(rightElbowX, rightElbowY); ctx.lineTo(rightHandX, rightHandY); ctx.stroke();
                }
            }

            if (drawLocalBall) {
                ctx.shadowBlur = 0; 
                ctx.beginPath(); ctx.arc(ballX, ballY, 8, 0, Math.PI * 2); 
                ctx.fillStyle = this.ballColor; ctx.fill();
                ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 1.5; 
                ctx.beginPath(); ctx.moveTo(ballX - 8, ballY); ctx.lineTo(ballX + 8, ballY); ctx.stroke();
            }

            ctx.restore();

            if (this.ballThrown) {
                ctx.save();
                ctx.shadowBlur = 0; 
                let br = 8 * this.scale; 
                ctx.beginPath(); ctx.arc(this.ballWorldX, this.ballWorldY, br, 0, Math.PI * 2); 
                ctx.fillStyle = this.ballColor; ctx.fill();
                ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 1.5 * this.scale; 
                ctx.beginPath(); ctx.moveTo(this.ballWorldX - br, this.ballWorldY); ctx.lineTo(this.ballWorldX + br, this.ballWorldY); ctx.stroke();
                ctx.restore();
            }
        }
    }

    const stickmen = [];
    for (let i = 0; i < 8; i++) {
        stickmen.push(new Stickman());
    }

    const speedLines = [];
    for(let i = 0; i < 15; i++) {
        speedLines.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height, 
            length: Math.random() * 100 + 50,
            speed: Math.random() * 2 + 1, 
            alpha: Math.random() * 0.15 + 0.05  
        });
    }

    canvas.addEventListener('pointerdown', (e) => {
        if (!mainMenuOverlay.classList.contains('hidden')) return;

        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        const mouseX = (e.clientX - rect.left) * scaleX;
        const mouseY = (e.clientY - rect.top) * scaleY;

        for (let i = stickmen.length - 1; i >= 0; i--) {
            let man = stickmen[i];
            if (man.state === 'run') {
                let hitRadius = 60 * man.scale; 
                if (Math.hypot(mouseX - man.x, mouseY - (man.y + 20)) < hitRadius) {
                    man.forceShoot(); 
                    break; 
                }
            }
        }
    });

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        ctx.lineCap = 'round';
        for (let i = 0; i < speedLines.length; i++) {
            let line = speedLines[i];
            line.x -= line.speed;
            if (line.x + line.length < 0) {
                line.x = canvas.width + Math.random() * 100;
                line.y = Math.random() * canvas.height; 
            }
            ctx.beginPath();
            ctx.moveTo(line.x, line.y);
            ctx.lineTo(line.x + line.length, line.y);
            ctx.strokeStyle = `rgba(56, 189, 248, ${line.alpha})`;
            ctx.lineWidth = 1.5;
            ctx.stroke();
        }

        globalHoop.update();
        globalHoop.draw(ctx);

        stickmen.sort((a, b) => a.y - b.y);

        stickmen.forEach(man => {
            man.update();
            man.draw();
        });

        quoteManager.updateAndDraw(ctx);

        requestAnimationFrame(animate);
    }

    animate(); 
</script>
</body>
</html>
