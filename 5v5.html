<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>十興國小-籃球隊 (5V5 真實對戰版)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,800;1,900&family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #0f172a; 
            user-select: none; 
            -webkit-user-select: none;
            touch-action: manipulation;
            min-height: 100vh; 
            margin: 0;
            font-family: 'Noto Sans TC', sans-serif;
            display: flex;
            align-items: center; /* 垂直置中 */
        }
        
        .card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.7) !important;
            width: 100%;
            max-width: 1400px; /* 放寬最大限制，讓版面更大氣 */
            margin: 0 auto;
            background: transparent;
        }

        .card-body {
            position: relative; 
            background-color: #0f172a !important; /* 讓卡片背景與網頁融合 */
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            border-radius: 12px;
            overflow: hidden;
        }

        #canvasContainer {
            position: relative;
            width: 100%;
            height: 60vh; /* 使用視窗高度百分比，響應式更好 */
            min-height: 400px; 
            margin: 0 auto;
            background-color: #1e293b; /* 改用球場專屬深藍，消除黑塊感 */
        }

        #gameCanvas {
            background-color: #1e293b; 
            display: block;
            width: 100%; /* 強制填滿容器 */
            height: 100%;
            cursor: crosshair; 
            border-radius: 12px;
            box-shadow: 0 0 25px rgba(0,0,0,0.5);
        }

        #fullscreenBtn {
            position: fixed; 
            top: 15px;
            left: 65px; 
            right: auto;
            width: 40px;
            height: 40px;
            background: rgba(15, 23, 42, 0.6);
            border: 1.5px solid rgba(0, 242, 254, 0.4);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #00f2fe;
            font-size: 1.5rem;
            cursor: pointer;
            z-index: 9999; 
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            pointer-events: auto;
            opacity: 0;
            visibility: hidden;
        }

        #homeBtn {
            position: fixed; 
            top: 15px;
            left: 15px;
            width: 40px;
            height: 40px;
            background: rgba(15, 23, 42, 0.6);
            border: 1.5px solid rgba(0, 242, 254, 0.4);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #00f2fe;
            font-size: 1.3rem;
            cursor: pointer;
            z-index: 9999; 
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            pointer-events: auto;
            opacity: 0;
            visibility: hidden;
        }

        @media (hover: hover) {
            #fullscreenBtn:hover, #homeBtn:hover {
                transform: scale(1.1);
                background: rgba(15, 23, 42, 0.95);
                border-color: #00f2fe;
                box-shadow: 0 6px 15px rgba(0, 242, 254, 0.3);
            }
        }

        #fullscreenBtn:focus, #homeBtn:focus { outline: none; }
        #fullscreenBtn.show-btn, #homeBtn.show-btn { opacity: 1; visibility: visible; }

        #scoreboard {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            background: rgba(15, 23, 42, 0.85);
            border: 2px solid rgba(0, 242, 254, 0.3);
            border-radius: 12px;
            padding: 8px 25px;
            display: flex;
            gap: 20px;
            align-items: center;
            justify-content: center;
            z-index: 100;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            visibility: hidden;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(4px);
            white-space: nowrap; /* 新增：強制整個記分板內容不換行 */
        }

        #scoreboard.show-board {
            visibility: visible;
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .team-name { 
            font-size: 1rem; 
            font-weight: 800; 
            letter-spacing: 1px; 
            white-space: nowrap; /* 新增：防止隊名變垂直 */
        }
        
        .team-score {
            font-size: 2.2rem;
            font-weight: 900;
            font-family: 'Montserrat', sans-serif;
            color: #ffffff;
            min-width: 45px;
            text-align: center;
            text-shadow: 0 2px 5px rgba(0,0,0,0.5);
            white-space: nowrap; /* 新增：防止雙位數分數上下疊加 */
        }

        .team-home { color: #00f2fe; }
        .team-away { color: #ef4444; }

        #ballLayer {
            position: fixed; 
            top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none; z-index: 20; overflow: hidden; 
        }

        .dom-basketball {
            position: absolute;
            border-radius: 50%;
            background: linear-gradient(to bottom, rgba(255,255,255,0) 42%, #ffffff 42%, #ffffff 58%, rgba(255,255,255,0) 58%), #f97316;
            border-style: solid;
            border-color: #ffffff;
            pointer-events: none; 
            transform: translate(-50%, -50%);
            display: none;
            animation: spinBall 0.8s linear infinite;
            will-change: left, top, opacity;
        }

        @keyframes spinBall {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        .menu-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(4px); 
            z-index: 30; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            transition: opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.4s, transform 0.4s; 
            visibility: visible; opacity: 1; overflow: hidden; cursor: pointer; border-radius: 12px;
        }
        
        .menu-overlay::before {
            content: ""; position: absolute; top: 0; left: 0; width: 200%; height: 200%;
            background: repeating-linear-gradient(45deg, transparent, transparent 4px, rgba(0, 242, 254, 0.03) 4px, rgba(0, 242, 254, 0.03) 8px);
            pointer-events: none; z-index: -1; animation: panBackground 20s linear infinite;
        }

        @keyframes panBackground { 0% { transform: translate(0, 0); } 100% { transform: translate(-50px, -50px); } }

        .menu-overlay.hidden { visibility: hidden; opacity: 0; transform: scale(1.05); pointer-events: none; }
        
        .title-wrapper { position: relative; display: inline-block; text-align: center; margin-top: 15px; }

        .game-title {
            font-family: 'Montserrat', 'Noto Sans TC', sans-serif; font-weight: 900; font-style: italic; font-size: 2.8rem; 
            margin-bottom: 0.5rem; text-transform: uppercase; background: linear-gradient(45deg, #00f2fe, #4facfe, #00f2fe); 
            background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            letter-spacing: 2px; animation: floatTitle 3s ease-in-out infinite, gradientShine 3s linear infinite; padding-right: 0.2em;
        }

        .year-badge {
            position: absolute; top: -5px; left: -80px; font-family: 'Montserrat', sans-serif;
            font-weight: 900; font-size: 1.1rem; font-style: italic; color: #facc15;
            background: rgba(15, 23, 42, 0.85); border: 2px solid #facc15; border-radius: 8px;
            padding: 2px 10px; transform: rotate(-12deg); box-shadow: 0 4px 10px rgba(250, 204, 21, 0.4);
            letter-spacing: 1px; z-index: 10; animation: pulseBadge 2s infinite; pointer-events: none;
        }

        @keyframes pulseBadge {
            0%, 100% { transform: rotate(-12deg) scale(1); box-shadow: 0 4px 10px rgba(250, 204, 21, 0.4); }
            50% { transform: rotate(-12deg) scale(1.08); box-shadow: 0 6px 15px rgba(250, 204, 21, 0.7); }
        }

        @keyframes floatTitle {
            0%, 100% { transform: translateY(0); filter: drop-shadow(0px 5px 15px rgba(0, 242, 254, 0.3)); }
            50% { transform: translateY(-8px); filter: drop-shadow(0px 10px 20px rgba(0, 242, 254, 0.7)); }
        }
        @keyframes gradientShine { to { background-position: 200% center; } }

        .instruction-box {
            background: rgba(255, 255, 255, 0.05); border-left: 4px solid #00f2fe; padding: 10px 20px;
            border-radius: 6px; color: #e2e8f0; margin-bottom: 1rem; box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            position: relative; backdrop-filter: blur(10px); text-align: center; transition: opacity 0.5s ease-in-out; 
            min-height: 80px; display: flex; flex-direction: column; justify-content: center;
        }

        .btn-play {
            position: relative; background: linear-gradient(135deg, #00f2fe, #4facfe); border: none; color: white;
            font-weight: 800; letter-spacing: 1.5px; border-radius: 50px; padding: 12px 45px; 
            box-shadow: 0 8px 25px rgba(0, 242, 254, 0.4); transition: all 0.3s ease; overflow: hidden; cursor: pointer;
        }
        
        .btn-play::after {
            content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.4) 50%, rgba(255,255,255,0) 100%);
            transform: skewX(-25deg); animation: sweepLight 3s infinite;
        }

        @keyframes sweepLight { 0% { left: -100%; } 20% { left: 200%; } 100% { left: 200%; } }

        .btn-play:hover { transform: translateY(-3px) scale(1.05); box-shadow: 0 12px 30px rgba(0, 242, 254, 0.6); color: white; }
        .pulse-text { animation: pulseOpacity 2s infinite; }
        @keyframes pulseOpacity { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }

        .music-controls { z-index: 50; margin-bottom: 1.5rem; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .btn-music {
            background: rgba(15, 23, 42, 0.6); border: 1px solid #4facfe; color: #4facfe; border-radius: 8px;
            padding: 8px 16px; font-size: 0.9rem; font-weight: bold; cursor: pointer; transition: all 0.2s; box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        .btn-music:hover { background: #4facfe; color: #0f172a; }

        @media (max-width: 768px) and (orientation: portrait) {
            #canvasContainer { height: 60vh; }
            .game-title { font-size: 2.2rem; margin-bottom: 0.2rem; }
            .year-badge { top: -18px; left: -35px; font-size: 0.85rem; padding: 2px 8px; }
            
            .instruction-box { padding: 12px 20px; margin-bottom: 0.8rem; width: 95%; min-height: 85px; }
            .btn-play { padding: 10px 30px; }
            .music-controls { margin-bottom: 1rem; }
            
            #fullscreenBtn { top: 10px; left: 54px; right: auto; }
            #homeBtn { top: 10px; left: 10px; }
            
            /* 更新：手機直式記分板顯示與隱藏狀態的縮放 */
            #scoreboard { 
                transform: translateX(-50%) translateY(-10px) scale(0.65); 
                top: 10px; 
                padding: 5px 12px; 
                gap: 10px; 
            }
            #scoreboard.show-board { transform: translateX(-50%) translateY(0) scale(0.65); }
        }

        /* 新增：手機橫向模式的縮放保護 */
        @media (max-width: 900px) and (orientation: landscape) {
            #scoreboard { transform: translateX(-50%) translateY(-10px) scale(0.75); }
            #scoreboard.show-board { transform: translateX(-50%) translateY(0) scale(0.75); }
        }

        /* 完美無縫全螢幕設定 */
        #gameWrapper:fullscreen, #gameWrapper:-webkit-full-screen, #gameWrapper:-moz-full-screen, #gameWrapper:-ms-fullscreen {
            background-color: #1e293b !important; /* 與球場同色，消除外圍黑邊 */
            display: flex; align-items: center; justify-content: center;
            width: 100vw; height: 100vh; padding: 0; border-radius: 0;
        }
        
        #gameWrapper:fullscreen #canvasContainer, #gameWrapper:-webkit-full-screen #canvasContainer, #gameWrapper:-moz-full-screen #canvasContainer, #gameWrapper:-ms-fullscreen #canvasContainer {
            width: 100vw; height: 100vh; max-width: none; max-height: none; 
            background-color: #1e293b;
        }

        #gameWrapper:fullscreen #gameCanvas, #gameWrapper:-webkit-full-screen #gameCanvas, #gameWrapper:-moz-full-screen #gameCanvas, #gameWrapper:-ms-fullscreen #gameCanvas { 
            border-radius: 0; box-shadow: none; /* 全螢幕時移除畫布邊界陰影，視覺無限延伸 */
        }
    </style>
</head>
<body>

<div id="ballLayer">
    <div id="globalDOMBall" class="dom-basketball"></div>
</div>

<div class="container-fluid p-2 p-md-4">
    <div class="row justify-content-center m-0">
        <div class="col-12 text-center p-0">
            <div class="card shadow-lg">
                <div class="card-body" id="gameWrapper">
                    
                    <div id="mainMenuOverlay" class="menu-overlay">
                        <div class="title-wrapper">
                            <div id="yearBadge" class="year-badge"></div>
                            <div class="game-title">十興國小 籃球隊</div>
                        </div>
                  
                        <div class="instruction-box" id="instructionBox">
                            <div class="fs-4 mb-2" id="recruitTitle"></div>
                            <div class="fs-5">
                                <span class="text-warning fw-bold" id="recruitMain"></span><br>
                                <span class="fs-6" id="recruitSub"></span>
                            </div>
                        </div>

                        <div class="music-controls">
                            <div style="display: flex; gap: 10px;">
                                <button id="selectMusicBtn" class="btn-music">🎵 選擇背景音樂</button>
                                <button id="playSavedMusicBtn" class="btn-music" style="display: none;">▶️ 播放上次音樂</button>
                            </div>
                            <div id="musicStatus" style="font-size: 0.8rem; color: #cbd5e1;">系統尚未載入音樂檔案</div>
                        </div>
                        
                        <button id="startBtn" class="btn btn-play d-flex flex-column align-items-center">
                            <span class="pulse-text" style="font-size: 0.85rem; font-weight: 400; letter-spacing: 2px;">- 點擊畫面任意處開始 5V5 真實對戰 -</span>
                        </button>
                    </div>

                    <div id="canvasContainer">
                        <div id="fullscreenBtn" title="全螢幕">⛶</div>
                        <div id="homeBtn" title="回到起始頁面">🏀</div>
                        
                        <div id="scoreboard">
                            <div class="team-name team-home">十興主場</div>
                            <div id="scoreLeft" class="team-score">0</div>
                            <div style="color: #94a3b8; font-weight: bold; font-size: 1.5rem;">:</div>
                            <div id="scoreRight" class="team-score">0</div>
                            <div class="team-name team-away">挑戰客隊</div>
                        </div>
                        
                        <canvas id="gameCanvas"></canvas>
                    </div>
                    
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // ==========================================
    // 遊戲資料設定區
    // ==========================================
    const TITLE_BADGE_TEXT = "2026";

    const RECRUIT_CONFIG = {
        interval: 4000, fadeSpeed: 500, 
        messages: [
            { title: "🏀 十興國小籃球隊 招募中！", main: "喜歡打球嗎？加入我們一起在球場上熱血奮戰！", sub: "(歡迎五年級與各年級熱愛籃球的同學加入我們的行列 👀)" },
            { title: "🏆 挑戰自我，團隊合作", main: "跟著古教練一起扎實訓練，提升籃球技巧！", sub: "(無經驗可，只要有一顆肯學與堅持的心 💪)" },
            { title: "🎯 全新 5V5 爭奪戰", main: "場上只有一顆球！兩隊人馬全力爭奪！", sub: "(點擊持球的球員，可以指揮他立刻出手 👀)" }
        ]
    };

    const PLAYER_NAMES = [
        "徐毅丞", "董宥葳", "吳秉恩", "劉軒禎", "蔡昕宏", "林稟硯", "范睿軒", "蘇靖翔",
        "張栩睿", "黃御展", "張煒誠", "張皓丞", "蔡棏曜", "范翔鈞", "邱得洛", "黃晟祐",
        "周楷杰", "沈廷軒", "鄭光熙", "黃宇紘", "張家閎", "邱嚴平", "羅毅軒", "姜樂",
        "郭曜丞", "古宇超", "陳品勳"
    ];

    const TEACHER_QUOTES = [
        "專心點！眼睛看哪裡啊！ 👀", "跑位！跑起來！不要站在那邊發呆！ 🏃‍♂️💨",
        "防守！手舉高！ ✋🤚", "這球傳得太隨便了！ 🤦‍♂️", "呼吸！調整節奏！ 🧘‍♂️",
        "平常練習是這樣教的嗎？ 💢", "卡位！籃板球是誰的！ 🛡️🏀",
        "好球！繼續保持！ 🔥👏", "節奏慢下來！不要急！ 🐢",
        "不要一直運球，球傳出去！ 🏀", "快攻！快攻！不要拖時間！ ⚡",
        "喊聲啊！都不講話怎麼配合！ 🗣️", "盯人！你的防守者呢？ 👀"
    ];

    const MISS_QUOTES = [
        "這在投什麼東西？！ 🤷‍♂️", "手腕！用手腕的力量！ 💪",
        "用力過猛啦！ 💥", "沒進沒關係，趕快回防！ 🛡️🏃‍♂️", 
        "麵包球！這力道也差太多了吧！ 🍞", "打鐵啦！籃框都要被你敲壞了！ 🔨",
        "瞄準再投啊！閉著眼睛投是不是？ 🫣", "投籃弧度太低了！ 📉"
    ];

    document.getElementById('yearBadge').textContent = TITLE_BADGE_TEXT;

    const instructionBox = document.getElementById('instructionBox');
    const recruitTitle = document.getElementById('recruitTitle');
    const recruitMain = document.getElementById('recruitMain');
    const recruitSub = document.getElementById('recruitSub');
    let currentRecruitIdx = 0; let recruitTimer = null;

    function renderRecruitMessage() {
        const msg = RECRUIT_CONFIG.messages[currentRecruitIdx];
        recruitTitle.innerHTML = `<strong>${msg.title}</strong>`;
        recruitMain.textContent = msg.main; recruitSub.textContent = msg.sub;
        instructionBox.style.opacity = 1;
    }

    function cycleRecruitMessage() {
        instructionBox.style.opacity = 0; 
        setTimeout(() => {
            currentRecruitIdx = (currentRecruitIdx + 1) % RECRUIT_CONFIG.messages.length;
            renderRecruitMessage(); 
        }, RECRUIT_CONFIG.fadeSpeed);
    }
    renderRecruitMessage();
    recruitTimer = setInterval(cycleRecruitMessage, RECRUIT_CONFIG.interval);

    // ================== 音樂處理系統 ==================
    const bgmAudio = new Audio(); bgmAudio.loop = true; bgmAudio.volume = 0.4;
    let isMusicLoaded = false;
    const selectMusicBtn = document.getElementById('selectMusicBtn');
    const playSavedMusicBtn = document.getElementById('playSavedMusicBtn');
    const musicStatus = document.getElementById('musicStatus');
    [selectMusicBtn, playSavedMusicBtn].forEach(btn => btn.addEventListener('click', (e) => e.stopPropagation()));
    const DB_NAME = 'SHB_AudioDB'; const STORE_NAME = 'settings';

    function openDB() {
        return new Promise((resolve, reject) => {
            const request = indexedDB.open(DB_NAME, 1);
            request.onupgradeneeded = (e) => {
                if (!e.target.result.objectStoreNames.contains(STORE_NAME)) e.target.result.createObjectStore(STORE_NAME);
            };
            request.onsuccess = () => resolve(request.result); request.onerror = () => reject(request.error);
        });
    }
    async function saveFileHandle(handle) {
        const db = await openDB();
        return new Promise((resolve, reject) => {
            const tx = db.transaction(STORE_NAME, 'readwrite');
            const request = tx.objectStore(STORE_NAME).put(handle, 'bgmHandle');
            request.onsuccess = () => resolve(); request.onerror = () => reject(request.error);
        });
    }
    async function getFileHandle() {
        const db = await openDB();
        return new Promise((resolve, reject) => {
            const tx = db.transaction(STORE_NAME, 'readonly');
            const request = tx.objectStore(STORE_NAME).get('bgmHandle');
            request.onsuccess = () => resolve(request.result); request.onerror = () => reject(request.error);
        });
    }
    async function verifyPermission(fileHandle) {
        const options = { mode: 'read' };
        if ((await fileHandle.queryPermission(options)) === 'granted') return true;
        if ((await fileHandle.requestPermission(options)) === 'granted') return true;
        return false;
    }
    async function playFileFromHandle(fileHandle) {
        try {
            const file = await fileHandle.getFile();
            if (bgmAudio.src) URL.revokeObjectURL(bgmAudio.src);
            bgmAudio.src = URL.createObjectURL(file); await bgmAudio.play();
            isMusicLoaded = true; playSavedMusicBtn.style.display = 'inline-block';
            playSavedMusicBtn.textContent = '⏸️ 暫停音樂';
            musicStatus.textContent = `🎵 正在播放: ${file.name}`; musicStatus.style.color = '#10b981';
        } catch (error) {
            musicStatus.textContent = '❌ 播放失敗，可能檔案已移動或損毀'; musicStatus.style.color = '#ef4444';
        }
    }
    selectMusicBtn.addEventListener('click', async () => {
        try {
            if (!window.showOpenFilePicker) { alert("您的瀏覽器不支援 File System Access API。"); return; }
            const [fileHandle] = await window.showOpenFilePicker({ types: [{ description: 'Audio Files', accept: { 'audio/*': ['.mp3', '.wav', '.ogg', '.m4a'] } }], excludeAcceptAllOption: true, multiple: false });
            await saveFileHandle(fileHandle); await playFileFromHandle(fileHandle);
        } catch (error) { if (error.name !== 'AbortError') musicStatus.textContent = '讀取檔案失敗'; }
    });
    playSavedMusicBtn.addEventListener('click', async () => {
        if (isMusicLoaded) {

    // ================== 音效系統 ==================
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    let audioCtx;
    class SoundManager {
        constructor() { this.enabled = false; }
        init() { if (!audioCtx) audioCtx = new AudioContext(); if (audioCtx.state === 'suspended') audioCtx.resume(); this.enabled = true; }
        playShoot() {
            if (!this.enabled || !audioCtx) return; const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination); osc.type = 'sine';
            osc.frequency.setValueAtTime(300, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0, audioCtx.currentTime); gain.gain.linearRampToValueAtTime(0.1, audioCtx.currentTime + 0.02);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.start(audioCtx.currentTime); osc.stop(audioCtx.currentTime + 0.1);
        }
        playBounce() {
            if (!this.enabled || !audioCtx) return; const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination); osc.type = 'triangle';
            osc.frequency.setValueAtTime(150, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.4, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.start(audioCtx.currentTime); osc.stop(audioCtx.currentTime + 0.1);
        }
        playSwish() {
            if (!this.enabled || !audioCtx) return; const bufferSize = audioCtx.sampleRate * 0.35; 
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate); const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1; 
            const noise = audioCtx.createBufferSource(); noise.buffer = buffer;
            const filter = audioCtx.createBiquadFilter(); filter.type = 'highpass'; filter.frequency.value = 3000; 
            const gain = audioCtx.createGain(); gain.gain.setValueAtTime(0, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.25, audioCtx.currentTime + 0.05); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            noise.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination); noise.start(audioCtx.currentTime);
        }
        playWhistle() {
            if (!this.enabled || !audioCtx) return; const osc1 = audioCtx.createOscillator(); const osc2 = audioCtx.createOscillator();
            const gain = audioCtx.createGain(); osc1.connect(gain); osc2.connect(gain); gain.connect(audioCtx.destination);
            osc1.type = 'square'; osc2.type = 'square';
            osc1.frequency.setValueAtTime(2000, audioCtx.currentTime); osc2.frequency.setValueAtTime(2200, audioCtx.currentTime);
            gain.gain.setValueAtTime(0, audioCtx.currentTime); gain.gain.linearRampToValueAtTime(0.05, audioCtx.currentTime + 0.05);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc1.start(audioCtx.currentTime); osc2.start(audioCtx.currentTime);
            osc1.stop(audioCtx.currentTime + 0.3); osc2.stop(audioCtx.currentTime + 0.3);
        }
    }
    const soundManager = new SoundManager(); 

    // ================== 核心遊戲機制 ==================
    // 遊戲本體座標永遠鎖定 1000x300，保證球員跑動速度與物理機制不因螢幕改變而崩壞
    const GAME_WIDTH = 1000;
    const GAME_HEIGHT = 300;
    
    // 全局縮放與位移參數（讓畫布自動適應全螢幕）
    let globalScale = 1;
    let globalOffsetX = 0;
    let globalOffsetY = 0;

    // === 全場畫線方法 (支援自動向外延伸無限繪製) ===
    function drawCourtLines(ctx) {
        ctx.save();
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.25)'; ctx.lineWidth = 3;
        
        // 邊界無限延伸以填滿全螢幕左右黑邊
        let leftEdge = -globalOffsetX;
        let rightEdge = GAME_WIDTH + globalOffsetX;

        ctx.beginPath(); ctx.moveTo(leftEdge, 120); ctx.lineTo(rightEdge, 120); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(leftEdge, 280); ctx.lineTo(rightEdge, 280); ctx.stroke();
        
        // 球場標準框線
        ctx.beginPath(); ctx.moveTo(40, 120); ctx.lineTo(40, 280); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(GAME_WIDTH - 40, 120); ctx.lineTo(GAME_WIDTH - 40, 280); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(GAME_WIDTH/2, 120); ctx.lineTo(GAME_WIDTH/2, 280); ctx.stroke();
        ctx.beginPath(); ctx.ellipse(GAME_WIDTH/2, 200, 50, 25, 0, 0, Math.PI*2); ctx.stroke();
        
        // 禁區
        ctx.strokeRect(40, 165, 120, 70); 
        ctx.beginPath(); ctx.ellipse(40, 200, 200, 72, 0, -Math.PI/2, Math.PI/2); ctx.stroke();
        ctx.strokeRect(GAME_WIDTH - 160, 165, 120, 70);
        ctx.beginPath(); ctx.ellipse(GAME_WIDTH - 40, 200, 200, 72, 0, Math.PI/2, Math.PI*1.5); ctx.stroke();
        ctx.restore();
    }

    // === 雙籃框 ===
    class BasketballHoop {
        constructor(side) {
            this.side = side; this.rimY = 85; this.netAnim = 0; this.swishActive = false; this.baseY = 160; 
        }
        get poleX() { return this.side === 'right' ? GAME_WIDTH - 50 : 40; }
        get backboardX() { return this.side === 'right' ? GAME_WIDTH - 58 : 50; }
        get rimLeft() { return this.side === 'right' ? GAME_WIDTH - 78 : 58; }
        get rimRight() { return this.side === 'right' ? GAME_WIDTH - 58 : 78; }
        get centerX() { return (this.rimLeft + this.rimRight) / 2; }

        triggerSwish() { this.netAnim = 1.0; this.swishActive = true; }
        update() { if (this.swishActive) { this.netAnim -= 0.035; if (this.netAnim <= 0) { this.netAnim = 0; this.swishActive = false; } } }
        draw(ctx) {
            ctx.save();
            ctx.fillStyle = 'rgba(0, 0, 0, 0.4)'; ctx.beginPath(); ctx.ellipse(this.poleX + 5, this.baseY + 45, 18, 6, 0, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#475569'; ctx.fillRect(this.poleX, 40, 10, this.baseY); 
            ctx.fillStyle = 'rgba(240, 248, 255, 0.85)'; ctx.fillRect(this.backboardX, 40, 8, 60); 
            ctx.strokeStyle = '#ef4444'; ctx.lineWidth = 3; ctx.strokeRect(this.backboardX, 55, 8, 25); 

            let sway = 0, stretch = 0; 
            if (this.swishActive) { sway = Math.sin((1 - this.netAnim) * Math.PI * 6) * (10 * this.netAnim); stretch = Math.sin((1 - this.netAnim) * Math.PI * 2) * (7 * this.netAnim); }
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.7)'; ctx.lineWidth = 1.5; ctx.beginPath();
            let netTopY = this.rimY, netBotY = netTopY + 22 + stretch, netBotLeft = this.rimLeft + 3.5 + sway, netBotRight = this.rimRight - 3.5 + sway;

            for (let i = 0; i <= 6; i++) {
                let ratio = i / 6; let topX = (this.rimLeft + 1) + (this.rimRight - this.rimLeft - 2) * ratio; let botX = netBotLeft + (netBotRight - netBotLeft) * ratio;
                ctx.moveTo(topX, netTopY); ctx.quadraticCurveTo(topX + sway * 0.5, netTopY + 11 + stretch * 0.5, botX, netBotY);
            }
            for (let j = 1; j <= 3; j++) {
                let ratio = j / 4; let y = netTopY + (netBotY - netTopY) * ratio;
                let currentLeft = (this.rimLeft + 1) + ratio * (netBotLeft - (this.rimLeft + 1)); let currentRight = (this.rimRight - 1) + ratio * (netBotRight - (this.rimRight - 1));
                ctx.moveTo(currentLeft, y); ctx.quadraticCurveTo(currentLeft + (currentRight - currentLeft) / 2, y + 4 * ratio + stretch * ratio, currentRight, y);
            }
            ctx.stroke();
            ctx.strokeStyle = '#ea580c'; ctx.lineWidth = 4; ctx.lineCap = 'round';
            ctx.beginPath(); ctx.moveTo(this.rimLeft, this.rimY); ctx.lineTo(this.rimRight, this.rimY); ctx.stroke();
            ctx.restore();
        }
    }
    
    const gameHoops = { left: new BasketballHoop('left'), right: new BasketballHoop('right') };

    // === 全局單顆籃球物件 ===
    class GlobalBall {
        constructor() {
            this.domElement = document.getElementById('globalDOMBall');
            this.reset();
        }

        reset() {
            this.x = GAME_WIDTH / 2;
            this.y = 50; 
            this.vx = (Math.random() - 0.5) * 4;
            this.vy = 0;
            this.gravity = 0.6;
            this.state = 'loose'; 
            this.holder = null;
            this.lastHolder = null;
            this.scored = false;
            this.missQuoteTriggered = false;
            this.scale = 1; 
            this.possessionLock = null; 
            this.isPass = false;
            this.targetPlayer = null;
            this.isDunkShot = false; 
            this.blockAttemptedBy = new Set(); 
        }

        shoot(shooter, targetHoop, willScore, isDunk = false) {
            this.state = 'flying';
            this.holder = null;
            this.lastHolder = shooter;
            this.scored = false;
            this.missQuoteTriggered = false;
            this.targetHoop = targetHoop;
            this.willScore = willScore;
            this.isPass = false; 
            this.targetPlayer = null;
            
            this.isDunkShot = isDunk;
            this.blockAttemptedBy.clear(); 

            // --- 新增：判斷是否為三分球 ---
            this.isThreePointer = false;
            if (!isDunk) {
                // 左隊投右框(960)，右隊投左框(40)，籃框 Y 軸中心點大約落在 200
                let hoopCenterX = shooter.team === 'left' ? GAME_WIDTH - 40 : 40;
                let hoopCenterY = 200;
                
                // 利用橢圓方程式 (x-h)²/a² + (y-k)²/b² > 1 判斷是否在三分線外
                let distanceValue = Math.pow(shooter.x - hoopCenterX, 2) / Math.pow(200, 2) + Math.pow(shooter.y - hoopCenterY, 2) / Math.pow(72, 2);
                if (distanceValue > 1) {
                    this.isThreePointer = true;
                }
            }

            soundManager.playShoot();

            if (isDunk) {
                this.vx = (targetHoop.centerX - this.x) * 0.1;
                this.vy = 8; 
                soundManager.playBounce(); 
            } else {
                let hoopTargetX = targetHoop.centerX;
                let hoopTargetY = targetHoop.rimY;
                
                if (!willScore) {
                    hoopTargetX += (Math.random() > 0.5 ? -20 : 20);
                    hoopTargetY -= Math.random() * 15; 
                }

                let dx = hoopTargetX - this.x;
                let flightFrames = Math.max(16, Math.abs(dx) / 12); 
                
                this.vx = (hoopTargetX - this.x) / flightFrames;
                this.vy = (hoopTargetY - this.y - 0.5 * this.gravity * flightFrames * flightFrames) / flightFrames;
            }
        }

        pass(shooter, targetPlayer) {
            this.state = 'flying';
            this.holder = null;
            this.lastHolder = shooter;
            this.targetPlayer = targetPlayer;
            this.isPass = true;
            this.scored = false;
            
            soundManager.playShoot(); 

            let targetX = targetPlayer.x + targetPlayer.maxSpeed * targetPlayer.dir * 8; 
            let targetY = targetPlayer.y - 20;

            let dx = targetX - this.x;
            let dy = targetY - this.y;
            
            let dist = Math.hypot(dx, dy);
            let flightFrames = Math.max(10, dist / 15); 
            
            this.vx = dx / flightFrames;
            this.vy = (dy - 0.5 * this.gravity * flightFrames * flightFrames) / flightFrames;
        }

        update() {
            if (this.state === 'held' && this.holder) {
                this.x = this.holder.handWorldX;
                this.y = this.holder.handWorldY;
                this.scale = this.holder.scale;
                return;
            }

            // loose or flying
            let prevY = this.y;
            this.x += this.vx;
            this.y += this.vy;
            this.vy += this.gravity;

            if (this.state === 'flying') {
                if (this.isPass) {
                    let caught = false;
                    for (let man of stickmen) {
                        let dist = Math.hypot(this.x - man.x, this.y - (man.y - 20));
                        if (dist < 40 * man.scale) {
                            if (man.team !== this.lastHolder.team) {
                                if (Math.random() < 0.2) {
                                    this.state = 'held';
                                    this.holder = man;
                                    this.isPass = false;
                                    man.dribbleTimer = 0;
                                    caught = true;
                                    quoteManager.addQuote(`被 ${man.playerName} 抄截了！ 😱`, '#ef4444');
                                    soundManager.playWhistle();
                                    break;
                                }
                            } else if (man === this.targetPlayer) {
                                this.state = 'held';
                                this.holder = man;
                                this.isPass = false;
                                man.dribbleTimer = 0;
                                caught = true;
                                break;
                            }
                        }
                    }
                } 
                else {
                    if (this.vy < 0 || this.isDunkShot) {
                        let blockExecuted = false;
                        for (let man of stickmen) {
                            if (man.team !== this.lastHolder.team && man.state === 'jump' && man.isBlocking) {
                                let handDist = Math.hypot(this.x - man.handWorldX, this.y - man.handWorldY);
                                if (handDist < 30 * man.scale) {
                                    if (!this.blockAttemptedBy.has(man)) {
                                        this.blockAttemptedBy.add(man);
                                        
                                        let isGoldenShooter = this.lastHolder.isGolden;
                                        let successRate = isGoldenShooter ? 0.05 : 1.0; 
                                        
                                        if (Math.random() < successRate) {
                                            this.vx = (Math.random() - 0.5) * 6; 
                                            this.vy = Math.abs(this.vy) * 0.5 + 3; 
                                            this.state = 'loose'; 
                                            this.possessionLock = null; 
                                            soundManager.playBounce(); 
                                            
                                            let blockQuotes = ["請你吃麻辣鍋啦！ 🍲💥", "蒼蠅拍！ 🪰💥", "想投？沒那麼容易！ 🖐️", "Not in my house! 🚫"];
                                            if (isGoldenShooter) {
                                                blockQuotes = ["竟然把 ZONE 給擋下來了！？ 😱", "奇蹟的火鍋！！ 🛑💥"];
                                            }
                                            quoteManager.addQuote(`${man.playerName}：${blockQuotes[Math.floor(Math.random() * blockQuotes.length)]}`, '#ef4444');
                                            blockExecuted = true;
                                            break; 
                                        } else if (isGoldenShooter) {
                                            quoteManager.addQuote(`${man.playerName}：力量太大了...擋不住！ 😭`, '#cbd5e1');
                                        }
                                    }
                                }
                            }
                        }
                        if (blockExecuted) return;
                    }

                    if (this.targetHoop) {
                        if (!this.scored && prevY < this.targetHoop.rimY && this.y >= this.targetHoop.rimY) {
                            if (this.willScore && this.x > this.targetHoop.rimLeft - 5 && this.x < this.targetHoop.rimRight + 5) {
                                this.scored = true; 
                                this.targetHoop.triggerSwish(); 
                                soundManager.playSwish(); 
                                
                                // --- 修改：根據剛才記錄的三分球標記給予分數 ---
                                let points = this.isThreePointer ? 3 : 2;
                                updateScoreDisplay(this.lastHolder.team, points); 

                                // --- 新增：三分球專屬文字播報 ---
                                if (this.isThreePointer) {
                                    quoteManager.addQuote(`${this.lastHolder.playerName} 飆進了一記漂亮的三分球！ 💦👌`, '#38bdf8');
                                }

                                this.possessionLock = this.lastHolder.team === 'left' ? 'right' : 'left';

                            } else if (!this.willScore && this.x > this.targetHoop.rimLeft - 20 && this.x < this.targetHoop.rimRight + 20) {
                                this.vy = -this.vy * (0.4 + Math.random() * 0.3); 
                                this.vx = this.vx * 0.5 + (Math.random() - 0.5) * 6; 
                                this.y = this.targetHoop.rimY - 2; 
                                soundManager.playBounce(); 

                                if (!this.missQuoteTriggered && Math.random() > 0.5) {
                                    this.missQuoteTriggered = true;
                                    quoteManager.addQuote(`${this.lastHolder.playerName}，${MISS_QUOTES[Math.floor(Math.random() * MISS_QUOTES.length)]}`, '#ef4444');
                                    soundManager.playWhistle(); 
                                }
                            }
                        }
                    }
                }
            }

            // 地板反彈邏輯
            const groundY = GAME_HEIGHT - 8; 
            if (this.y >= groundY) {
                this.y = groundY; 
                this.vy = -this.vy * 0.6; 
                this.vx = this.vx * 0.8;  

                if (Math.abs(this.vy) > 3) {
                    soundManager.playBounce(); 
                } else {
                    this.vy = 0;
                    if (Math.abs(this.vx) < 0.2) this.vx = 0; 
                }
                
                if (this.state === 'flying') {
                    this.state = 'loose';
                    this.isPass = false;
                }
            }

            if (this.x < 10) { this.x = 10; this.vx = Math.abs(this.vx); }
            if (this.x > GAME_WIDTH - 10) { this.x = GAME_WIDTH - 10; this.vx = -Math.abs(this.vx); }
        }

        draw(ctx, renderParams) {
            // 讓籃球隨時保持顯示
            this.domElement.style.display = 'block';
            
            // 計算真實螢幕投影位置 (加入偏移量，對應 Canvas Translation)
            let screenX = renderParams.canvasRect.left + (this.x + renderParams.offsetX) * renderParams.scale;
            let screenY = renderParams.canvasRect.top + (this.y + renderParams.offsetY) * renderParams.scale;

            let r = 8 * this.scale * renderParams.scale;
            let bw = 1.5 * this.scale * renderParams.scale;

            this.domElement.style.width = `${r * 2}px`;
            this.domElement.style.height = `${r * 2}px`;
            this.domElement.style.left = `${screenX}px`;
            this.domElement.style.top = `${screenY}px`;
            this.domElement.style.borderWidth = `${bw}px`;
        }
    }

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const globalBall = new GlobalBall();
    let availableNames = [...PLAYER_NAMES];

    class QuoteManager {
        constructor() { 
            this.quotes = []; 
            this.lastRandomQuoteTime = 0; 
            this.randomQuoteInterval = 6000; 
        }

        addQuote(text, color = '#facc15') {
            if (this.quotes.length >= 2) {
                this.quotes.shift(); 
            }

            let isTeacherQuote = TEACHER_QUOTES.includes(text);
            let displayText = isTeacherQuote ? `💬 老師：「${text}」` : `🏀 ${text}`;

            this.quotes.push({ 
                text: displayText, 
                targetY: GAME_HEIGHT - 20,
                y: GAME_HEIGHT + 30,
                alpha: 1.0, 
                color: color, 
                life: 100 
            });
        }

        updateAndDraw(ctx) {
            let currentTime = Date.now();
            
            if (currentTime - this.lastRandomQuoteTime > this.randomQuoteInterval) {
                if (Math.random() > 0.75) { 
                    this.addQuote(TEACHER_QUOTES[Math.floor(Math.random() * TEACHER_QUOTES.length)]); 
                    soundManager.playWhistle(); 
                }
                this.lastRandomQuoteTime = currentTime; 
                this.randomQuoteInterval = 5000 + Math.random() * 5000; 
            }
            
            let dynamicFontSize = Math.max(12, Math.min(16, GAME_WIDTH * 0.03));
            let lineSpacing = dynamicFontSize + 14;
            
            for (let i = 0; i < this.quotes.length; i++) {
                this.quotes[i].targetY = GAME_HEIGHT - 25 - ((this.quotes.length - 1 - i) * lineSpacing);
            }
            
            for (let i = this.quotes.length - 1; i >= 0; i--) {
                let q = this.quotes[i]; 
                
                q.y += (q.targetY - q.y) * 0.2; 
                q.life--;
                
                if (q.life < 20) q.alpha = q.life / 20; 
                else q.alpha = 0.95;
                
                if (q.life <= 0) { 
                    this.quotes.splice(i, 1); 
                    continue; 
                }
                
                ctx.save(); 
                ctx.globalAlpha = q.alpha; 
                ctx.font = `bold ${dynamicFontSize}px "Noto Sans TC", sans-serif`;
                ctx.textAlign = 'center'; 
                ctx.textBaseline = 'middle';
                
                let textWidth = ctx.measureText(q.text).width;
                
                let bgX = GAME_WIDTH / 2 - textWidth / 2 - 15;
                let bgY = q.y - dynamicFontSize / 2 - 6;
                let bgW = textWidth + 30;
                let bgH = dynamicFontSize + 12;
                let radius = 10;
                
                ctx.fillStyle = 'rgba(15, 23, 42, 0.75)';
                ctx.beginPath();
                ctx.moveTo(bgX + radius, bgY);
                ctx.lineTo(bgX + bgW - radius, bgY);
                ctx.quadraticCurveTo(bgX + bgW, bgY, bgX + bgW, bgY + radius);
                ctx.lineTo(bgX + bgW, bgY + bgH - radius);
                ctx.quadraticCurveTo(bgX + bgW, bgY + bgH, bgX + bgW - radius, bgY + bgH);
                ctx.lineTo(bgX + radius, bgY + bgH);
                ctx.quadraticCurveTo(bgX, bgY + bgH, bgX, bgY + bgH - radius);
                ctx.lineTo(bgX, bgY + radius);
                ctx.quadraticCurveTo(bgX, bgY, bgX + radius, bgY);
                ctx.fill();
                
                ctx.fillStyle = q.color;
                ctx.fillText(q.text, GAME_WIDTH / 2, q.y); 
                ctx.restore();
            }
        }
    }
    const quoteManager = new QuoteManager();

    class Stickman {
        constructor(teamMode, index) { 
            this.initTeam(teamMode, index); 
        }

        initTeam(teamMode, index) {
            if (this.playerName && !availableNames.includes(this.playerName)) availableNames.push(this.playerName);
            if (availableNames.length === 0) availableNames = [...PLAYER_NAMES];
            this.playerName = availableNames.splice(Math.floor(Math.random() * availableNames.length), 1)[0];

            this.team = teamMode; 
            this.index = index;
            this.dir = this.team === 'left' ? 1 : -1;
            
            this.baseY = 95 + Math.random() * 125; 
            this.y = this.baseY;
            this.scale = 0.4 + (this.baseY / 300) * 0.8; 
            this.maxSpeed = (1.8 + Math.random() * 1.5) * this.scale; 
            
            this.x = this.team === 'left' ? 100 + Math.random() * 100 : GAME_WIDTH - (100 + Math.random() * 100);

            this.localFrames = Math.random() * 1000; 
            this.color = this.team === 'left' ? '#00f2fe' : '#ef4444';
            
            this.state = 'run'; 
            this.jumpVy = 0;
            this.jumpStartY = this.y; 
            this.isBlocking = false; 
            this.targetHoop = this.team === 'left' ? gameHoops.right : gameHoops.left;

            this.isGolden = false;
            this.goldenTimer = 0;

            this.dribbleTimer = 0;

            this.handWorldX = 0;
            this.handWorldY = 0;
        }

        forceShoot() {
            if (this.state !== 'run' || globalBall.holder !== this) return; 
            this.state = 'jump'; 
            this.jumpVy = -8 * this.scale;
            this.jumpStartY = this.y; 
            this.willScore = Math.random() > 0.3; 
        }

        forceDunk() {
            if (this.state !== 'run' || globalBall.holder !== this) return;
            this.state = 'dunk';
            this.jumpVy = -9.5 * this.scale; 
            this.jumpStartY = this.y;
            this.willScore = true; 
            this.dunkPeakReached = false;

            let framesToPeak = Math.abs(this.jumpVy) / (0.35 * this.scale);
            let targetRimX = this.targetHoop.centerX + (this.team === 'left' ? -15 : 15);
            this.dunkVx = (targetRimX - this.x) / framesToPeak;
        }

        forcePass(targetPlayer) {
            if (this.state !== 'run' || globalBall.holder !== this) return;
            globalBall.pass(this, targetPlayer);
        }

        update() {
            let currentSpeed = this.maxSpeed;
            if (this.isGolden) {
                this.goldenTimer--;
                currentSpeed = this.maxSpeed * 1.6; 
                if (this.goldenTimer <= 0 && globalBall.holder !== this) {
                    this.isGolden = false;
                }
            } else if (Math.random() < 0.00015) { 
                this.isGolden = true;
                this.goldenTimer = 300; 
                quoteManager.addQuote(`${this.playerName} 進入了 ZONE 的境界！ ⚡`, '#facc15');
            }

            if (this.state === 'run') {
                this.localFrames += currentSpeed * 0.2; 
                let distToBallX = globalBall.x - this.x;
                let distToBallY = globalBall.y - this.y; 

                if (globalBall.state === 'loose') {
                    
                    if (globalBall.possessionLock && globalBall.possessionLock !== this.team) {
                        let myHoopX = this.team === 'left' ? gameHoops.left.centerX : gameHoops.right.centerX;
                        let myTargetX = myHoopX + (this.team === 'left' ? 80 : -80);
                        if (Math.abs(myTargetX - this.x) > 10) {
                            this.dir = myTargetX > this.x ? 1 : -1;
                            this.x += (currentSpeed * 0.9) * this.dir;
                        }
                        let distY = 160 - this.y;
                        if (Math.abs(distY) > 5) {
                            this.y += (currentSpeed * 0.6) * (distY > 0 ? 1 : -1);
                        }
                    } else {
                        this.dir = distToBallX > 0 ? 1 : -1;
                        this.x += currentSpeed * this.dir;
                        
                        if (Math.abs(distToBallY) > 5) {
                            this.y += (currentSpeed * 0.7) * (distToBallY > 0 ? 1 : -1);
                        }

                        if (Math.abs(distToBallX) < 20 && Math.abs((this.y + 20) - globalBall.y) < 60) {
                            globalBall.state = 'held';
                            globalBall.holder = this;
                            globalBall.possessionLock = null; 
                            this.dribbleTimer = 0; 
                        }
                    }
                } 
                else if (globalBall.state === 'held') {
                    if (globalBall.holder === this) {
                        if (!this.isGolden) {
                            this.dribbleTimer++;
                            let enemiesNearby = stickmen.filter(m => m.team !== this.team && Math.hypot(m.x - this.x, m.y - this.y) < 60).length;
                            
                            if ((enemiesNearby >= 1 && Math.random() < 0.05) || (this.dribbleTimer > 60 && Math.random() < 0.02)) {
                                let allies = stickmen.filter(m => m.team === this.team && m !== this);
                                if (allies.length > 0) {
                                    let targetAlly = allies[Math.floor(Math.random() * allies.length)];
                                    
                                    let myDistToHoop = Math.abs(this.targetHoop.centerX - this.x);
                                    let betterAllies = allies.filter(m => Math.abs(this.targetHoop.centerX - m.x) < myDistToHoop);
                                    
                                    if (betterAllies.length > 0 && Math.random() > 0.4) {
                                        targetAlly = betterAllies[Math.floor(Math.random() * betterAllies.length)];
                                    }
                                    
                                    this.forcePass(targetAlly);
                                    return; 
                                }
                            }
                        }

                        let distToHoop = this.targetHoop.centerX - this.x;
                        this.dir = distToHoop > 0 ? 1 : -1;
                        this.x += currentSpeed * this.dir;
                        
                        let distYToCenter = 160 - this.y;
                        if (Math.abs(distYToCenter) > 10) {
                            this.y += (currentSpeed * 0.5) * (distYToCenter > 0 ? 1 : -1);
                        }
                        
                        if (this.isGolden) {
                            if (Math.abs(distToHoop) < 70 * this.scale) {
                                this.forceDunk();
                            }
                        } else {
                            if (Math.abs(distToHoop) < 150 * this.scale + Math.random() * 50) {
                                this.forceShoot();
                            }
                        }
                    } 
                    else if (globalBall.holder.team === this.team) {
                        let allyX = globalBall.holder.x;
                        let offset = (this.index % 2 === 0 ? 60 : -60) * this.dir;
                        let targetX = allyX + offset;
                        
                        if (Math.abs(targetX - this.x) > 10) {
                            this.dir = targetX > this.x ? 1 : -1;
                            this.x += (currentSpeed * 0.8) * this.dir; 
                        } else {
                            this.dir = globalBall.holder.dir; 
                        }

                        let distY = this.baseY - this.y;
                        if (Math.abs(distY) > 5) {
                            this.y += (currentSpeed * 0.6) * (distY > 0 ? 1 : -1);
                        }
                    } 
                    else {
                        let enemyX = globalBall.holder.x;
                        let enemyY = globalBall.holder.y;
                        
                        let didBlockJump = false;

                        if (globalBall.holder.state === 'jump' || globalBall.holder.state === 'dunk') {
                            let distX = Math.abs(enemyX - this.x);
                            let distY = Math.abs(enemyY - this.y);
                            
                            let activeBlockers = stickmen.filter(m => m.team === this.team && m.isBlocking).length;

                            if (activeBlockers < 2 && distX < 80 && distY < 40 && Math.random() < 0.25) {
                                this.state = 'jump';
                                this.jumpVy = -8.5 * this.scale; 
                                this.jumpStartY = this.y;
                                this.isBlocking = true;
                                this.dir = enemyX > this.x ? 1 : -1; 
                                didBlockJump = true;
                            }
                        }

                        if (!didBlockJump) {
                            if (this.index % 2 === 0) {
                                let targetX = enemyX + (this.team === 'left' ? -30 : 30);
                                if (Math.abs(targetX - this.x) > 5) {
                                    this.dir = targetX > this.x ? 1 : -1;
                                    this.x += currentSpeed * this.dir;
                                }
                                let targetY = enemyY + (this.index === 0 ? 15 : -15); 
                                let distY = targetY - this.y;
                                if (Math.abs(distY) > 5) {
                                    this.y += (currentSpeed * 0.7) * (distY > 0 ? 1 : -1);
                                }
                            } else {
                                let myHoopX = this.team === 'left' ? gameHoops.left.centerX : gameHoops.right.centerX;
                                let myTargetX = myHoopX + (this.team === 'left' ? 80 : -80);
                                if (Math.abs(myTargetX - this.x) > 10) {
                                    this.dir = myTargetX > this.x ? 1 : -1;
                                    this.x += (currentSpeed * 1.1) * this.dir; 
                                } else {
                                    this.dir = enemyX > this.x ? 1 : -1; 
                                }
                                let distY = 160 - this.y;
                                if (Math.abs(distY) > 5) {
                                    this.y += (currentSpeed * 0.8) * (distY > 0 ? 1 : -1);
                                }
                            }
                        }
                    }
                }
                else if (globalBall.state === 'flying') {
                    if (globalBall.possessionLock && globalBall.possessionLock !== this.team) {
                        let myHoopX = this.team === 'left' ? gameHoops.left.centerX : gameHoops.right.centerX;
                        let myTargetX = myHoopX + (this.team === 'left' ? 80 : -80);
                        if (Math.abs(myTargetX - this.x) > 10) {
                            this.dir = myTargetX > this.x ? 1 : -1;
                            this.x += (currentSpeed * 0.9) * this.dir;
                        }
                    } else {
                        let targetX = globalBall.targetHoop ? globalBall.targetHoop.centerX : globalBall.x;
                        if (globalBall.isPass && globalBall.targetPlayer === this) {
                             targetX = globalBall.x; 
                        }
                        
                        if (Math.abs(targetX - this.x) > 30) {
                            this.dir = targetX > this.x ? 1 : -1;
                            this.x += (currentSpeed * 0.6) * this.dir;
                        }
                        let distY = 160 - this.y;
                        if (Math.abs(distY) > 5) {
                            this.y += (currentSpeed * 0.5) * (distY > 0 ? 1 : -1);
                        }
                    }
                }

                if (this.x < 20) this.x = 20;
                if (this.x > GAME_WIDTH - 20) this.x = GAME_WIDTH - 20;
                
                if (this.y < 80) this.y = 80;
                if (this.y > 280) this.y = 280;

                this.scale = 0.4 + (this.y / 300) * 0.8;

            } else if (this.state === 'jump') {
                this.x += currentSpeed * 0.5 * this.dir; 
                this.y += this.jumpVy;
                this.jumpVy += 0.35 * this.scale; 

                if (!this.isBlocking && this.jumpVy > -1 * this.scale && globalBall.holder === this) {
                    globalBall.shoot(this, this.targetHoop, this.willScore);
                }

                if (this.y >= this.jumpStartY) {
                    this.y = this.jumpStartY; 
                    this.state = 'run';
                    this.isBlocking = false; 
                }

            } else if (this.state === 'dunk') {
                this.x += this.dunkVx; 
                this.y += this.jumpVy;
                this.jumpVy += 0.35 * this.scale;

                if (this.jumpVy > 0 && !this.dunkPeakReached && globalBall.holder === this) {
                    this.dunkPeakReached = true;
                    globalBall.shoot(this, this.targetHoop, true, true); 
                    quoteManager.addQuote(`${this.playerName} 轟炸籃框！！ 🔥🔥🔥`, '#f97316');
                }

                if (this.y >= this.jumpStartY) {
                    this.y = this.jumpStartY;
                    this.state = 'run';
                    this.isGolden = false; 
                    this.goldenTimer = 0;
                }
            }
        }

        draw(ctx) {
            ctx.save();
            ctx.translate(this.x, this.y); 
            ctx.scale(this.scale * this.dir, this.scale);
            const cx = 0, headY = 10, neckY = 20, hipY = 36, footY = 50;
            
            let dynamicNameSize = Math.max(9, Math.min(13, GAME_WIDTH * 0.02));
            ctx.save(); 
            ctx.scale(this.dir, 1);
            
            let fontWeight = 'normal';
            if (this.isGolden) {
                ctx.fillStyle = '#facc15';
                ctx.shadowColor = '#facc15'; ctx.shadowBlur = 10;
                fontWeight = 'bold';
            } else if (globalBall.holder === this) {
                ctx.fillStyle = '#facc15';
                ctx.shadowColor = '#000'; ctx.shadowBlur = 4;
                fontWeight = 'bold';
            } else {
                ctx.fillStyle = 'rgba(255, 255, 255, 0.6)'; 
                ctx.shadowColor = 'transparent'; 
                ctx.shadowBlur = 0;
            }

            ctx.font = `${fontWeight} ${dynamicNameSize}px "Noto Sans TC", sans-serif`; 
            ctx.textAlign = 'center'; 
            ctx.fillText(this.playerName, cx, headY - 14, 80); 
            ctx.restore();

            if (this.isGolden) {
                ctx.strokeStyle = '#facc15'; 
                ctx.shadowColor = '#facc15'; 
                ctx.shadowBlur = 15 + Math.sin(this.localFrames * 0.5) * 5; 
            } else {
                ctx.strokeStyle = this.color; 
                ctx.shadowColor = this.color; 
                ctx.shadowBlur = 4;
            }

            ctx.lineWidth = 4; ctx.lineCap = 'round'; ctx.lineJoin = 'round';

            ctx.beginPath(); ctx.arc(cx, headY, 7, 0, Math.PI * 2); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(cx, neckY); ctx.lineTo(cx, hipY); ctx.stroke();

            let localHandX = cx, localHandY = neckY;

            if (this.state === 'run') {
                let movement = 1; 
                const runCycle = Math.sin(this.localFrames) * movement; 
                let leftKneeX = cx - 12 * runCycle, leftKneeY = hipY + 6, leftFootX = cx - 18 * runCycle, leftFootY = footY;
                let rightKneeX = cx + 12 * runCycle, rightKneeY = hipY + 6, rightFootX = cx + 18 * runCycle, rightFootY = footY;
                ctx.beginPath(); ctx.moveTo(cx, hipY); ctx.lineTo(leftKneeX, leftKneeY); ctx.lineTo(leftFootX, leftFootY); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(cx, hipY); ctx.lineTo(rightKneeX, rightKneeY); ctx.lineTo(rightFootX, rightFootY); ctx.stroke();

                let leftElbowX = cx - 8, leftElbowY = neckY + 8, leftHandX = cx - 15 + 10 * runCycle, leftHandY = neckY + 15;
                ctx.beginPath(); ctx.moveTo(cx, neckY); ctx.lineTo(leftElbowX, leftElbowY); ctx.lineTo(leftHandX, leftHandY); ctx.stroke();

                if (globalBall.holder === this) {
                    localHandX = cx + 20; 
                    localHandY = hipY + Math.sin(this.localFrames * 0.8) * 12;
                    let rightElbowX = cx + 12, rightElbowY = neckY + 5;
                    ctx.beginPath(); ctx.moveTo(cx, neckY); ctx.lineTo(rightElbowX, rightElbowY); ctx.lineTo(localHandX, localHandY); ctx.stroke();
                } else {
                    let rightElbowX = cx + 8, rightElbowY = neckY + 8, rightHandX = cx + 15 - 10 * runCycle, rightHandY = neckY + 15;
                    ctx.beginPath(); ctx.moveTo(cx, neckY); ctx.lineTo(rightElbowX, rightElbowY); ctx.lineTo(rightHandX, rightHandY); ctx.stroke();
                }
            } else if (this.state === 'jump' || this.state === 'dunk') {
                let leftKneeX = cx - 5, leftKneeY = hipY + 15, leftFootX = cx - 10, leftFootY = hipY + 30; 
                let rightKneeX = cx + 15, rightKneeY = hipY - 5, rightFootX = cx + 15, rightFootY = hipY + 15; 
                ctx.beginPath(); ctx.moveTo(cx, hipY); ctx.lineTo(leftKneeX, leftKneeY); ctx.lineTo(leftFootX, leftFootY); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(cx, hipY); ctx.lineTo(rightKneeX, rightKneeY); ctx.lineTo(rightFootX, rightFootY); ctx.stroke();

                if (this.isBlocking) {
                    let leftElbowX = cx - 10, leftElbowY = neckY - 10, leftHandX = cx - 15, leftHandY = headY - 25;
                    ctx.beginPath(); ctx.moveTo(cx, neckY); ctx.lineTo(leftElbowX, leftElbowY); ctx.lineTo(leftHandX, leftHandY); ctx.stroke();

                    localHandX = cx + 15; localHandY = headY - 25;
                    let rightElbowX = cx + 10, rightElbowY = neckY - 10;
                    ctx.beginPath(); ctx.moveTo(cx, neckY); ctx.lineTo(rightElbowX, rightElbowY); ctx.lineTo(localHandX, localHandY); ctx.stroke();

                } else if (this.state === 'dunk' && globalBall.holder === this) {
                    localHandX = cx + 15; localHandY = headY - 25; 
                    ctx.beginPath(); ctx.moveTo(cx, neckY); ctx.lineTo(cx + 5, neckY - 15); ctx.lineTo(localHandX, localHandY); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(cx, neckY); ctx.lineTo(cx + 10, neckY - 15); ctx.lineTo(localHandX, localHandY); ctx.stroke();

                } else {
                    let leftElbowX = cx - 15, leftElbowY = neckY + 5, leftHandX = cx - 20, leftHandY = neckY - 5;
                    ctx.beginPath(); ctx.moveTo(cx, neckY); ctx.lineTo(leftElbowX, leftElbowY); ctx.lineTo(leftHandX, leftHandY); ctx.stroke();

                    if (globalBall.holder === this) {
                        localHandX = cx + 20; localHandY = headY - 15;
                        let rightElbowX = cx + 10, rightElbowY = neckY - 5;
                        ctx.beginPath(); ctx.moveTo(cx, neckY); ctx.lineTo(rightElbowX, rightElbowY); ctx.lineTo(localHandX, localHandY); ctx.stroke();
                    } else {
                        let rightElbowX = cx + 15, rightElbowY = neckY - 10, rightHandX = cx + 25, rightHandY = headY - 25;
                        ctx.beginPath(); ctx.moveTo(cx, neckY); ctx.lineTo(rightElbowX, rightElbowY); ctx.lineTo(rightHandX, rightHandY); ctx.stroke();
                    }
                }
            }
            
            ctx.restore();

            this.handWorldX = this.x + (localHandX * this.scale * this.dir);
            this.handWorldY = this.y + (localHandY * this.scale);
        }
    }

    const stickmen = [];
    for (let i = 0; i < 5; i++) {
        stickmen.push(new Stickman('left', i));
        stickmen.push(new Stickman('right', i));
    }

    const speedLines = [];
    for(let i = 0; i < 15; i++) {
        speedLines.push({
            x: Math.random() * 2000, y: Math.random() * GAME_HEIGHT, 
            length: Math.random() * 100 + 50, speed: Math.random() * 2 + 1, alpha: Math.random() * 0.15 + 0.05  
        });
    }

    canvas.addEventListener('pointerdown', (e) => {
        if (!mainMenuOverlay.classList.contains('hidden')) return;
        fullscreenBtn.classList.add('show-btn'); homeBtn.classList.add('show-btn');

        const rect = canvas.getBoundingClientRect();
        // 加入對全局偏移量的補償，確保即使置中也能正確偵測點擊
        const mouseX = ((e.clientX - rect.left) / globalScale) - globalOffsetX; 
        const mouseY = ((e.clientY - rect.top) / globalScale) - globalOffsetY; 

        if (globalBall.state === 'held' && globalBall.holder) {
            let man = globalBall.holder;
            if (Math.hypot(mouseX - man.x, mouseY - (man.y + 20)) < 80 * man.scale) {
                if (man.isGolden && Math.abs(man.targetHoop.centerX - man.x) < 90 * man.scale) {
                    man.forceDunk();
                } else {
                    man.forceShoot();
                }
            }
        }
    });

    function animate() {
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        
        // --- 全新無限延伸 Canvas 計算邏輯 ---
        const container = document.getElementById('canvasContainer');
        const displayWidth = container.clientWidth; 
        const displayHeight = container.clientHeight;
        
        // 畫布強制 100% 填滿整個框，不要讓 CSS 留下黑邊
        if (canvas.style.width !== '100%') {
            canvas.style.width = '100%';
            canvas.style.height = '100%';
        }

        const targetWidth = Math.round(displayWidth * dpr);
        const targetHeight = Math.round(displayHeight * dpr);
        
        if (canvas.width !== targetWidth || canvas.height !== targetHeight) { 
            canvas.width = targetWidth; 
            canvas.height = targetHeight; 
        }

        ctx.setTransform(1, 0, 0, 1, 0, 0); 
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 動態計算放大倍率，確保 1000x300 的遊戲畫面絕對能在中心完整呈現
        let scaleFactor = displayWidth / GAME_WIDTH;
        let logicalHeight = displayHeight / scaleFactor;

        if (logicalHeight < GAME_HEIGHT) {
            // 如果畫面太寬，改以高度為基準
            scaleFactor = displayHeight / GAME_HEIGHT;
            let logicalWidth = displayWidth / scaleFactor;
            globalOffsetX = (logicalWidth - GAME_WIDTH) / 2; // 將多出來的寬度平均分配給左右 (置中)
            globalOffsetY = 0;
        } else {
            // 如果畫面太高，改以寬度為基準
            globalOffsetX = 0;
            globalOffsetY = (logicalHeight - GAME_HEIGHT) / 2; // 將多出來的高度平均分配給上下 (置中)
        }
        
        globalScale = scaleFactor;

        ctx.scale(scaleFactor * dpr, scaleFactor * dpr);
        ctx.translate(globalOffsetX, globalOffsetY); // 移動繪製原點，完美置中

        ctx.lineCap = 'round';
        
        // 讓速度線可以跑進擴展出來的空白區域
        let expandedWidth = GAME_WIDTH + globalOffsetX * 2;
        let expandedHeight = GAME_HEIGHT + globalOffsetY * 2;

        for (let i = 0; i < speedLines.length; i++) {
            let line = speedLines[i]; line.x -= line.speed;
            if (line.x + line.length < -globalOffsetX) { 
                line.x = GAME_WIDTH + globalOffsetX + Math.random() * 100; 
                line.y = -globalOffsetY + Math.random() * expandedHeight; 
            }
            ctx.beginPath(); ctx.moveTo(line.x, line.y); ctx.lineTo(line.x + line.length, line.y);
            ctx.strokeStyle = `rgba(56, 189, 248, ${line.alpha})`; ctx.lineWidth = 1.5; ctx.stroke();
        }

        drawCourtLines(ctx);
        gameHoops.left.update(); gameHoops.left.draw(ctx);
        gameHoops.right.update(); gameHoops.right.draw(ctx);

        const canvasRect = canvas.getBoundingClientRect();
        // 傳遞全局偏移與縮放給 HTML DOM 元素，讓籃球位置能精準疊加在 Canvas 上
        const renderParams = { 
            canvasRect, 
            scale: globalScale, 
            offsetX: globalOffsetX,
            offsetY: globalOffsetY 
        };

        stickmen.sort((a, b) => a.y - b.y);
        
        // 移除 if 判斷，讓背景在未點擊開始前也能自動跑動對戰
        stickmen.forEach(man => man.update());
        globalBall.update();

        stickmen.forEach(man => man.draw(ctx));
        quoteManager.updateAndDraw(ctx);

        globalBall.draw(ctx, renderParams);

        requestAnimationFrame(animate);
    }

    animate(); 
</script>
</body>
