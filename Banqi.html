<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ultra Premium Banqi | 典藏暗棋</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+TC:wght@700;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent; 
            -webkit-touch-callout: none; 
            -webkit-user-select: none;   
            -moz-user-select: none;      
            -ms-user-select: none;       
            user-select: none;           
        }

        :root {
            --gold: #dfb15b;
            --dark-gold: #9e7a33;
            --red-piece: #9b111e;
            --black-piece: #0a0a0a;
            --highlight-glow: #ffea00;
        }

        html {
            background-color: #111 !important;
            width: 100%; height: 100%;
        }

        body {
            background-color: #111 !important;
            background-image: radial-gradient(circle at center, #2c2c2c 0%, #111 100%) !important;
            background-size: cover !important; 
            color: #f1f1f1;
            font-family: 'Noto Serif TC', serif;
            margin: 0; padding: 0;
            position: fixed; 
            top: 0; left: 0; right: 0; bottom: 0;
            width: 100%; height: 100%; 
            overflow: hidden;
            touch-action: none; 
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* =========================================
           🌟 遊戲開場 & 結算畫面
           ========================================= */
        #start-menu {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 5000; transition: opacity 0.8s ease; cursor: pointer;
        }
        .start-title { font-family: 'Ma Shan Zheng', cursive; font-size: clamp(3rem, 12vmin, 7rem); color: var(--gold); margin-bottom: 10px; text-shadow: 0 0 20px rgba(223, 177, 91, 0.5); }
        .start-subtitle { font-size: clamp(1rem, 3vmin, 1.5rem); letter-spacing: 8px; color: var(--dark-gold); margin-bottom: 60px; font-weight: 700; }
        .tap-prompt { font-family: 'Ma Shan Zheng', cursive; font-size: clamp(1.2rem, 4vmin, 2rem); color: #fff; letter-spacing: 4px; animation: blink 1.2s infinite alternate; }
        @keyframes blink { 0% { opacity: 0.1; } 100% { opacity: 0.9; } }

        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(8px);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 6000; opacity: 0; visibility: hidden; transition: all 0.4s;
        }
        .modal-overlay.show { opacity: 1; visibility: visible; }
        .modal-content {
            background: linear-gradient(145deg, #2a2a2a, #151515);
            border: 2px solid var(--gold); border-radius: 16px;
            padding: 2rem 3rem; text-align: center;
            transform: scale(0.8); transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .modal-overlay.show .modal-content { transform: scale(1); }
        .modal-title { font-family: 'Ma Shan Zheng'; color: var(--gold); font-size: 3.5rem; margin-bottom: 1rem; }
        .winner-red { color: #ff5252; text-shadow: 0 0 15px rgba(255, 82, 82, 0.6); }
        .winner-black { color: #e0e0e0; text-shadow: 0 0 15px rgba(255, 255, 255, 0.5); }

        /* =========================================
           🌟 遊戲主佈局與 UI 面板
           ========================================= */
        .container {
            width: 98%; max-width: 1200px;
            height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .status-panel {
            width: 100%; max-width: 800px;
            background: linear-gradient(145deg, #2a2a2a, #1a1a1a);
            padding: 10px 20px;
            border-radius: 12px; border: 1px solid #444;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            margin-bottom: 15px; flex-shrink: 0; 
        }

        .turn-indicator { font-family: 'Ma Shan Zheng', cursive; padding: 5px 20px; border-radius: 6px; font-size: 1.4rem; letter-spacing: 2px; }
        .turn-red { background: linear-gradient(135deg, #b71c1c, #7f0000); color: #ffd54f; }
        .turn-black { background: linear-gradient(135deg, #424242, #111); color: #fff; }
        .turn-wait { background: #333; color: #888; }
        
        .controls { display: flex; gap: 10px; }
        .btn-custom { 
            background: transparent; border: 1px solid var(--dark-gold); color: var(--gold); 
            padding: 5px 15px; border-radius: 6px; transition: all 0.2s; font-weight: 700; 
            cursor: pointer; white-space: nowrap; 
        }
        .btn-custom:hover { background: var(--dark-gold); color: #111; box-shadow: 0 0 15px var(--dark-gold); }
        .btn-custom:active { transform: scale(0.9); background: var(--dark-gold); color: #111; }

        /* =========================================
           🌟 棋盤自適應核心
           ========================================= */
        .board-wrapper {
            position: relative; width: 100%; margin: 0 auto;
            max-width: calc((100vh - 160px) * 2); 
            padding: 1.5%; 
            background: linear-gradient(135deg, #4e2f1d, #27140a); 
            border: 2px solid #1a0d06; border-radius: 16px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
        }

        #board {
            width: 100%; aspect-ratio: 2 / 1; 
            display: grid;
            grid-template-columns: repeat(8, minmax(0, 1fr));
            grid-template-rows: repeat(4, minmax(0, 1fr));
            gap: 2px; 
            background: #d4b581; padding: 4px; border-radius: 8px;
            box-shadow: inset 0 0 15px rgba(105, 66, 26, 0.8);
            container-type: inline-size; 
        }

        .cell {
            min-width: 0; min-height: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(255,255,255,0.4), rgba(255,255,255,0.1));
            border: 1px solid rgba(139, 90, 43, 0.3);
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .piece {
            width: 86%; height: 86%; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 7.5cqi; font-weight: 900;
            transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275), border 0.1s ease;
            position: relative; 
            pointer-events: none; 
        }

        .piece.covered { 
            background: radial-gradient(circle at 30% 30%, #573924, #2a180e); 
            border: 1px solid #140b06; 
            box-shadow: inset 2px 2px 4px rgba(255,255,255,0.15), inset -4px -4px 8px rgba(0,0,0,0.6), 0 8px 12px rgba(0,0,0,0.6); 
        }
        .piece.covered::after { content: "㊞"; color: rgba(223, 177, 91, 0.6); font-family: 'Ma Shan Zheng'; }
        
        .piece.revealed { 
            background: radial-gradient(circle at 35% 25%, #e0b471 0%, #b88645 60%, #7a4f1c 100%); 
            box-shadow: inset 2px 2px 5px rgba(255,255,255,0.3), 0 5px 10px rgba(0,0,0,0.5); 
            border: 1px solid #5a3a15;
        }
        .piece.red { color: #8b0000; text-shadow: 1px 1px 1px rgba(255,255,255,0.3); }
        .piece.black { color: #111; text-shadow: 1px 1px 1px rgba(255,255,255,0.3); }

        .cell:active .piece { transform: scale(0.92); }

        .cell.selected {
            background: radial-gradient(circle, rgba(255, 234, 0, 0.4) 0%, rgba(255, 255, 255, 0.1) 80%);
            box-shadow: inset 0 0 15px rgba(255, 234, 0, 0.5);
            border: 1px solid rgba(255, 234, 0, 0.8);
            border-radius: 4px;
        }

        .cell.selected .piece { 
            border: 3px solid var(--highlight-glow);
            z-index: 20; 
            box-shadow: 0 15px 25px rgba(255, 234, 0, 0.4), inset 2px 2px 5px rgba(255,255,255,0.8);
            animation: pieceFloat 0.6s infinite alternate ease-in-out;
        }

        @keyframes pieceFloat {
            0% { transform: scale(1.12) translateY(-2px); }
            100% { transform: scale(1.18) translateY(-8px); }
        }

        /* =========================================
           🌟 響應式：手機直式自動轉橫向
           ========================================= */
        @media screen and (orientation: portrait) {
            .container, #start-menu, .modal-overlay {
                position: fixed !important;
                top: 50% !important; left: 50% !important;
                width: 100vh !important; height: 100vw !important; 
                transform: translate(-50%, -50%) rotate(90deg) !important;
                flex-direction: column; 
            }

            .status-panel { padding: 4px 10px; margin-bottom: 8px; max-width: 98%; }
            .turn-indicator { font-size: 0.95rem; padding: 4px 12px; }
            .btn-custom { font-size: 0.85rem; padding: 4px 10px; }
            .board-wrapper { max-width: calc((100vw - 80px) * 2); }
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="start-menu" onclick="handleStartGame()">
        <div class="start-title">典藏 ‧ 暗棋</div>
        <div class="start-subtitle">ULTRA PREMIUM BANQI</div>
        <div class="tap-prompt">點 擊 啟 動 戰 局</div>
    </div>

    <div class="container">
        <div class="status-panel">
            <div id="player-status" class="turn-indicator turn-wait">等待首翻</div>
            <div class="controls">
                <button onclick="toggleFullScreen()" class="btn-custom">全螢幕</button>
                <button onclick="initGame()" class="btn-custom">重新洗牌</button>
            </div>
        </div>

        <div class="board-wrapper">
            <div id="board"></div>
        </div>
    </div>

    <div id="gameOverModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-title">對局結束</div>
            <div id="modal-message" style="font-size: 2rem; margin-bottom: 2rem;"></div>
            <button onclick="closeModalAndRestart()" class="btn-custom" style="font-size: 1.2rem; padding: 10px 30px;">再玩一局</button>
        </div>
    </div>

<script>
    let isFirstLoad = true;
    let audioCtx = null;

    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
    }

    function playSound(type) {
        if (!audioCtx) return;
        if (audioCtx.state === 'suspended') audioCtx.resume();

        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        const now = audioCtx.currentTime;

        switch (type) {
            case 'start': 
                osc.type = 'sine'; osc.frequency.setValueAtTime(440, now); osc.frequency.exponentialRampToValueAtTime(880, now + 0.5);
                gain.gain.setValueAtTime(0.3, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
                osc.start(now); osc.stop(now + 0.5); break;
            case 'flip':
                osc.type = 'sine'; osc.frequency.setValueAtTime(500, now); gain.gain.setValueAtTime(0.2, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1); osc.start(now); osc.stop(now + 0.1); break;
            case 'capture':
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(300, now); gain.gain.setValueAtTime(0.3, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2); osc.start(now); osc.stop(now + 0.2); break;
            case 'win':
                osc.type = 'sine'; gain.gain.setValueAtTime(0.4, now);
                [523, 659, 783, 1046].forEach((f, i) => { osc.frequency.setValueAtTime(f, now + i * 0.15); });
                gain.gain.linearRampToValueAtTime(0, now + 0.8); osc.start(now); osc.stop(now + 0.8); break;
        }
    }

    function requestLandscapeFullscreen() {
        const docEl = document.documentElement;
        const requestFullscreen = docEl.requestFullscreen || docEl.webkitRequestFullscreen || docEl.msRequestFullscreen;

        if (requestFullscreen) {
            requestFullscreen.call(docEl).then(() => {
                if (screen.orientation && screen.orientation.lock) {
                    screen.orientation.lock('landscape').catch(err => { console.log("此設備不支援原生的方向鎖定:", err); });
                }
            }).catch(err => { console.log("無法自動進入全螢幕:", err); });
        }
    }

    function handleStartGame() {
        if (!isFirstLoad) return;
        initAudio();
        playSound('start');
        
        const menu = document.getElementById('start-menu');
        menu.style.opacity = '0';
        setTimeout(() => {
            menu.style.display = 'none';
            isFirstLoad = false;
            initGame();
        }, 800);
    }

    const config = [
        { name: '帥', color: 'red', rank: 7 }, { name: '將', color: 'black', rank: 7 },
        { name: '仕', color: 'red', rank: 6 }, { name: '仕', color: 'red', rank: 6 },
        { name: '士', color: 'black', rank: 6 }, { name: '士', color: 'black', rank: 6 },
        { name: '相', color: 'red', rank: 5 }, { name: '相', color: 'red', rank: 5 },
        { name: '象', color: 'black', rank: 5 }, { name: '象', color: 'black', rank: 5 },
        { name: '俥', color: 'red', rank: 4 }, { name: '俥', color: 'red', rank: 4 },
        { name: '車', color: 'black', rank: 4 }, { name: '車', color: 'black', rank: 4 },
        { name: '傌', color: 'red', rank: 3 }, { name: '傌', color: 'red', rank: 3 },
        { name: '馬', color: 'black', rank: 3 }, { name: '馬', color: 'black', rank: 3 },
        { name: '炮', color: 'red', rank: 2, isCannon: true }, { name: '炮', color: 'red', rank: 2, isCannon: true },
        { name: '包', color: 'black', rank: 2, isCannon: true }, { name: '包', color: 'black', rank: 2, isCannon: true },
        { name: '兵', color: 'red', rank: 1 }, { name: '兵', color: 'red', rank: 1 }, { name: '兵', color: 'red', rank: 1 }, { name: '兵', color: 'red', rank: 1 }, { name: '兵', color: 'red', rank: 1 },
        { name: '卒', color: 'black', rank: 1 }, { name: '卒', color: 'black', rank: 1 }, { name: '卒', color: 'black', rank: 1 }, { name: '卒', color: 'black', rank: 1 }, { name: '卒', color: 'black', rank: 1 }
    ];

    let board = [];
    let currentPlayer = null;
    let selectedIdx = null;
    let gameActive = false;

    function initGame() {
        document.getElementById('gameOverModal').classList.remove('show');
        let shuffled = [...config].sort(() => Math.random() - 0.5);
        board = shuffled.map(p => ({ ...p, isCovered: true, isEmpty: false }));
        currentPlayer = null;
        selectedIdx = null;
        gameActive = true;
        render();
        updateStatus();
    }

    function render() {
        const boardEl = document.getElementById('board');
        boardEl.innerHTML = '';
        board.forEach((cell, i) => {
            const div = document.createElement('div');
            div.className = `cell ${selectedIdx === i ? 'selected' : ''}`;
            if (!cell.isEmpty) {
                const p = document.createElement('div');
                p.className = `piece ${cell.isCovered ? 'covered' : 'revealed ' + cell.color}`;
                p.textContent = cell.isCovered ? '' : cell.name;
                div.appendChild(p);
            }
            
            div.onclick = () => {
                handleMove(i);
            };
            
            boardEl.appendChild(div);
        });
    }

    function handleMove(i) {
        if (!gameActive) return;
        const cell = board[i];

        // 翻開棋子
        if (!cell.isEmpty && cell.isCovered) {
            playSound('flip');
            cell.isCovered = false;
            
            // 🔥 核心修復：強制清除剛剛可能誤選取的棋子，防止狀態機錯亂
            selectedIdx = null; 

            if (currentPlayer === null) currentPlayer = cell.color;
            else currentPlayer = (currentPlayer === 'red' ? 'black' : 'red');
            render(); updateStatus(); checkWin(); return;
        }

        // 選取與移動邏輯
        if (selectedIdx === null) {
            if (!cell.isEmpty && !cell.isCovered && cell.color === currentPlayer) {
                selectedIdx = i; render();
            }
        } else {
            // 如果點選同一顆，取消選取
            if (i === selectedIdx) { selectedIdx = null; render(); return; }
            
            if (canMove(selectedIdx, i)) {
                playSound(board[i].isEmpty ? 'flip' : 'capture');
                board[i] = { ...board[selectedIdx] };
                board[selectedIdx] = { isEmpty: true };
                selectedIdx = null;
                currentPlayer = (currentPlayer === 'red' ? 'black' : 'red');
                render(); updateStatus(); checkWin();
            } else if (!cell.isEmpty && cell.color === currentPlayer && !cell.isCovered) {
                // 如果點選自己的其他棋子，直接切換選取對象
                selectedIdx = i; render();
            }
        }
    }

    function canMove(from, to) {
        const fR = Math.floor(from / 8), fC = from % 8;
        const tR = Math.floor(to / 8), tC = to % 8;
        const dist = Math.abs(fR - tR) + Math.abs(fC - tC);
        const attacker = board[from];
        const target = board[to];

        if (attacker.isCannon && !target.isEmpty && !target.isCovered) {
            if (fR !== tR && fC !== tC) return false;
            let count = 0;
            if (fR === tR) {
                for (let c = Math.min(fC, tC) + 1; c < Math.max(fC, tC); c++) if (!board[fR * 8 + c].isEmpty) count++;
            } else {
                for (let r = Math.min(fR, tR) + 1; r < Math.max(fR, tR); r++) if (!board[r * 8 + fC].isEmpty) count++;
            }
            return count === 1 && attacker.color !== target.color;
        }
        if (dist !== 1) return false;
        if (target.isEmpty) return true;
        if (target.isCovered || target.color === attacker.color) return false;
        if (attacker.rank === 1 && target.rank === 7) return true;
        if (attacker.rank === 7 && target.rank === 1) return false;
        return attacker.rank >= target.rank;
    }

    function updateStatus() {
        const el = document.getElementById('player-status');
        if (!currentPlayer) { el.textContent = "等待首翻"; el.className = "turn-indicator turn-wait"; }
        else { el.textContent = currentPlayer === 'red' ? "紅方回合" : "黑方回合"; el.className = `turn-indicator turn-${currentPlayer}`; }
    }

    function checkWin() {
        const pieces = board.filter(p => !p.isEmpty);
        const red = pieces.filter(p => p.color === 'red').length;
        const black = pieces.filter(p => p.color === 'black').length;
        if (currentPlayer && (red === 0 || black === 0)) {
            gameActive = false; playSound('win');
            setTimeout(() => {
                const msg = document.getElementById('modal-message');
                msg.innerHTML = red === 0 ? '恭喜 <span class="winner-black">黑方</span> 獲勝！' : '恭喜 <span class="winner-red">紅方</span> 獲勝！';
                document.getElementById('gameOverModal').classList.add('show');
            }, 500);
        }
    }

    function closeModalAndRestart() { initGame(); }

    function toggleFullScreen() {
        if (!document.fullscreenElement) document.documentElement.requestFullscreen();
        else document.exitFullscreen();
    }
</script>
</body>
</html>
