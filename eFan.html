<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>極致冷卻 - 商業級物理模擬風扇</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-base: #04070a;
            --panel-bg: rgba(12, 18, 28, 0.85);
            --accent-blue: #00e5ff;
            --accent-glow: rgba(0, 229, 255, 0.6);
            --accent-ice: #81d4fa;
            --accent-red: #ff3366;
            --text-main: #e0e6ed;
            --text-muted: #6c7d93;
        }

        body, html {
            background-color: var(--bg-base);
            height: 100dvh;
            margin: 0;
            padding: 0;
            color: var(--text-main);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            user-select: none; 
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }

        /* 背景冷霜層 */
        #frostOverlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at center, rgba(0, 180, 255, 0.15) 0%, rgba(0, 25, 50, 0.7) 100%);
            opacity: 0; 
            pointer-events: none;
            z-index: 1;
            transition: opacity 0.5s linear;
        }

        /* 重要：Canvas 層級提升到風扇 (z-index: 5) 之前 */
        #windCanvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none; /* 確保不阻擋點擊事件 */
            z-index: 5; 
        }

        .app-container {
            position: relative;
            z-index: 2; /* 基礎層級 */
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            height: 100%;
            padding: clamp(10px, 2vh, 20px);
            box-sizing: border-box;
            max-width: 900px;
            margin: 0 auto;
        }

        /* 風扇區 (z-index 較低，讓雪花能飄在它前面) */
        .fan-section {
            flex: 1 1 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            min-height: 0; 
            z-index: 2; 
            padding-bottom: clamp(10px, 2vh, 20px);
        }

        .fan-showcase {
            position: relative;
            height: 100%; 
            max-width: 100%;
            aspect-ratio: 1 / 1; 
            border-radius: 50%;
            background: radial-gradient(circle, #252525, #030303);
            box-shadow: 
                inset 0 0 clamp(30px, 6vw, 60px) rgba(0,0,0,0.95), 
                0 clamp(15px, 4vw, 40px) clamp(30px, 8vw, 80px) rgba(0,0,0,0.9),
                0 0 0 clamp(8px, 2vw, 16px) rgba(35, 40, 50, 0.6),
                0 0 0 clamp(10px, 2.5vw, 18px) rgba(0, 0, 0, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            will-change: transform;
        }

        .fan-grill {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: 
                repeating-radial-gradient(rgba(255,255,255,0.02) 0, transparent 4px, transparent 24px),
                repeating-linear-gradient(0deg, transparent, transparent 18px, rgba(255,255,255,0.05) 18px, rgba(255,255,255,0.05) 21px),
                repeating-linear-gradient(90deg, transparent, transparent 18px, rgba(255,255,255,0.05) 18px, rgba(255,255,255,0.05) 21px);
            z-index: 3;
            pointer-events: none;
            box-shadow: inset 0 0 40px rgba(0,0,0,1);
        }

        .blades-svg {
            width: 88%;
            height: 88%;
            transform-origin: center;
            will-change: transform; 
            filter: drop-shadow(0px 15px 15px rgba(0,0,0,0.95));
        }

        /* 控制面板區 (最高 z-index) */
        .panel-section {
            flex: 0 0 auto;
            width: 100%;
            max-width: 450px; 
            z-index: 10; 
        }

        .control-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 20px 28px; 
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.9);
        }

        .dashboard-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }

        .status-value {
            font-size: 1.1rem;
            font-weight: 600;
            font-family: 'Courier New', Courier, monospace;
        }

        .temp-value {
            font-size: 2.6rem; 
            font-weight: 700;
            color: var(--accent-ice);
            font-family: 'Courier New', Courier, monospace;
            text-shadow: 0 0 15px var(--accent-glow);
        }

        .led-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background-color: var(--accent-red);
            box-shadow: 0 0 10px var(--accent-red);
            display: inline-block; margin-right: 6px;
        }
        .led-dot.active {
            background-color: var(--accent-blue);
            box-shadow: 0 0 15px var(--accent-blue), 0 0 25px var(--accent-blue);
        }

        /* 按鍵與標籤 */
        .custom-badge {
            font-size: 0.6rem;
            background: rgba(255,255,255,0.1);
            padding: 3px 8px; border-radius: 12px;
            color: #aaa; transition: all 0.3s; cursor: pointer;
        }
        .custom-badge.active {
            background: rgba(0, 229, 255, 0.3);
            color: #fff; box-shadow: 0 0 10px var(--accent-blue);
        }
        .needs-unlock { background: rgba(0, 229, 255, 0.5); color: #fff; }

        /* 滑動條 */
        .track-wrapper {
            position: relative; width: 100%; height: 12px;
            background: #090e15; border-radius: 10px;
            box-shadow: inset 0 3px 6px rgba(0,0,0,0.8);
        }
        .track-fill {
            position: absolute; top: 0; left: 0; height: 100%; width: 0%; 
            background: linear-gradient(90deg, #005c7a 0%, var(--accent-blue) 100%);
            border-radius: 10px; box-shadow: 0 0 15px var(--accent-glow);
        }
        input[type=range] {
            -webkit-appearance: none; appearance: none;
            position: absolute; top: 50%; left: 0; transform: translateY(-50%);
            width: 100%; height: 40px; background: transparent; outline: none; cursor: pointer; z-index: 10;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 32px; height: 32px; border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #5a6673, #242b33);
            border: 2px solid #1a2026; box-shadow: 0 4px 10px rgba(0,0,0,0.8);
            transition: transform 0.1s;
        }
    </style>
</head>
<body>

    <div id="frostOverlay"></div>
    <canvas id="windCanvas"></canvas>

    <div class="app-container">
        <div class="fan-section">
            <div class="fan-showcase" id="fanShowcase">
                <div class="fan-grill"></div>
                <svg viewBox="0 0 100 100" class="blades-svg" id="fanBlades">
                    <circle cx="50" cy="50" r="14" fill="#050505" />
                    <g fill="url(#metalGradient)">
                        <path d="M50,50 C30,12 68,2 50,2 C35,5 25,25 50,50" />
                        <path d="M50,50 C88,30 98,68 98,50 C95,35 75,25 50,50" />
                        <path d="M50,50 C70,88 32,98 50,98 C65,95 75,75 50,50" />
                        <path d="M50,50 C12,70 2,32 2,50 C5,65 25,75 50,50" />
                    </g>
                    <defs>
                        <linearGradient id="metalGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#999;" />
                            <stop offset="35%" style="stop-color:#fff;" />
                            <stop offset="100%" style="stop-color:#444;" />
                        </linearGradient>
                    </defs>
                </svg>
            </div>
        </div>

        <div class="panel-section">
            <div class="control-panel">
                <div class="dashboard-top">
                    <div class="status-group">
                        <span class="status-title"><div class="led-dot" id="powerLed"></div> MOTOR PWR</span>
                        <span class="status-value" id="statusText" style="color: var(--text-muted);">0000 RPM</span>
                    </div>
                    <div class="temp-display">
                        <span class="temp-value" id="tempText">28.0</span><span class="temp-unit">°C</span>
                    </div>
                </div>
                <div class="slider-container">
                    <div class="slider-header d-flex justify-content-between mb-3">
                        <div class="d-flex gap-2">
                            <span class="custom-badge needs-unlock" id="audioBadge">點擊解鎖音效</span>
                            <span class="custom-badge" id="snowBadge">SNOW FX: OFF</span>
                        </div>
                        <span class="slider-percentage" id="percentLabel">0.0%</span>
                    </div>
                    <div class="track-wrapper">
                        <div class="track-fill" id="trackFill"></div>
                        <input type="range" id="speedSlider" min="0" max="100" value="0" step="0.1">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentRotation = 0, actualSpeed = 0, targetSpeed = 0;
        const ACCELERATION = 0.025, FRICTION = 0.008, MAX_SPEED = 45;
        let currentTemp = 28.0, targetTemp = 28.0;

        const blades = document.getElementById('fanBlades'), showcase = document.getElementById('fanShowcase');
        const statusText = document.getElementById('statusText'), tempText = document.getElementById('tempText');
        const led = document.getElementById('powerLed'), frostOverlay = document.getElementById('frostOverlay');
        const speedSlider = document.getElementById('speedSlider'), percentLabel = document.getElementById('percentLabel');
        const trackFill = document.getElementById('trackFill'), audioBadge = document.getElementById('audioBadge'), snowBadge = document.getElementById('snowBadge');

        // --- 音效引擎 ---
        let audioCtx, motorOsc, motorGain, windFilter, windGain, isAudioUnlocked = false;
        function unlockAudio() {
            if (isAudioUnlocked) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            motorOsc = audioCtx.createOscillator(); motorOsc.type = 'sawtooth';
            const motorFilter = audioCtx.createBiquadFilter(); motorFilter.type = 'lowpass'; motorFilter.frequency.value = 300;
            motorGain = audioCtx.createGain(); motorGain.gain.value = 0;
            motorOsc.connect(motorFilter); motorFilter.connect(motorGain); motorGain.connect(audioCtx.destination);
            motorOsc.start();

            const noiseBuffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 2, audioCtx.sampleRate);
            const output = noiseBuffer.getChannelData(0);
            for (let i = 0; i < output.length; i++) output[i] = Math.random() * 2 - 1;
            const windNoise = audioCtx.createBufferSource(); windNoise.buffer = noiseBuffer; windNoise.loop = true;
            windFilter = audioCtx.createBiquadFilter(); windFilter.type = 'lowpass';
            windGain = audioCtx.createGain(); windGain.gain.value = 0;
            windNoise.connect(windFilter); windFilter.connect(windGain); windGain.connect(audioCtx.destination);
            windNoise.start();

            isAudioUnlocked = true; audioBadge.innerText = "AUDIO: ON"; audioBadge.classList.remove('needs-unlock'); audioBadge.classList.add('active');
        }
        document.addEventListener('click', unlockAudio, { once: true });

        // --- 雪花與氣流系統 ---
        const canvas = document.getElementById('windCanvas'), ctx = canvas.getContext('2d');
        let windLines = [], snowflakes = [], isSnowEnabled = false;
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();

        for (let i = 0; i < 80; i++) windLines.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, length: Math.random() * 200 + 100, baseSpeed: Math.random() * 5 + 3, thickness: Math.random() * 2 });

        snowBadge.addEventListener('click', () => { isSnowEnabled = !isSnowEnabled; snowBadge.innerText = isSnowEnabled ? "SNOW FX: ON" : "SNOW FX: OFF"; snowBadge.classList.toggle('active'); });

        function physicsLoop() {
            if (targetSpeed > actualSpeed) actualSpeed += (targetSpeed - actualSpeed) * ACCELERATION;
            else if (targetSpeed < actualSpeed) actualSpeed -= (actualSpeed - targetSpeed) * FRICTION;
            if (targetSpeed === 0 && actualSpeed < 0.05) actualSpeed = 0;
            const ratio = actualSpeed / MAX_SPEED;

            currentRotation += actualSpeed;
            blades.style.transform = `rotate(${currentRotation}deg)`;

            // 震動
            if (ratio > 0.8) showcase.style.transform = `translate(${(Math.random()-0.5)*ratio*2}px, ${(Math.random()-0.5)*ratio*2}px)`;
            
            // 溫度
            if (currentTemp > targetTemp) currentTemp -= 0.012; else if (currentTemp < targetTemp) currentTemp += 0.005;
            tempText.innerText = currentTemp.toFixed(1);
            frostOverlay.style.opacity = Math.max(0, (28 - currentTemp) / 8) * 0.8;

            // 音效與 UI
            if (isAudioUnlocked) {
                motorOsc.frequency.setTargetAtTime(40 + (ratio * 140), audioCtx.currentTime, 0.1);
                motorGain.gain.setTargetAtTime(ratio > 0 ? 0.3 : 0, audioCtx.currentTime, 0.1);
                windFilter.frequency.setTargetAtTime(300 + (Math.pow(ratio, 1.5) * 1700), audioCtx.currentTime, 0.1);
                windGain.gain.setTargetAtTime(Math.pow(ratio, 2) * 1.2, audioCtx.currentTime, 0.1);
            }
            statusText.innerText = `${(ratio * 1500).toFixed(0).padStart(4, '0')} RPM`;

            renderCanvas(ratio);
            requestAnimationFrame(physicsLoop);
        }

        function renderCanvas(ratio) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // 氣流
            if (actualSpeed > 1) {
                ctx.fillStyle = `rgba(129, 212, 250, ${0.4 * ratio})`;
                windLines.forEach(p => {
                    p.x -= p.baseSpeed * actualSpeed * 0.5;
                    if (p.x < -p.length) { p.x = canvas.width + 100; p.y = Math.random() * canvas.height; }
                    ctx.fillRect(p.x, p.y, p.length * ratio, p.thickness);
                });
            }
            // 雪花
            if (isSnowEnabled && Math.random() < 0.15) snowflakes.push({ x: Math.random() * canvas.width, y: -20, r: Math.random() * 2 + 1, vx: (Math.random()-0.5)*2, vy: Math.random()*2+1, scale: 1, op: 1, state: 'fall' });
            
            const rect = showcase.getBoundingClientRect();
            const cx = rect.left + rect.width / 2, cy = rect.top + rect.height / 2;

            for (let i = snowflakes.length - 1; i >= 0; i--) {
                let s = snowflakes[i];
                if (s.state === 'fall') {
                    s.x += s.vx; s.y += s.vy;
                    let dist = Math.sqrt((s.x-cx)**2 + (s.y-cy)**2);
                    if (actualSpeed > 10 && dist < 300) {
                        if (Math.random() > 0.4) { s.state = 'fly'; s.vx = (s.x-cx)/dist*actualSpeed; s.vy = (s.y-cy)/dist*actualSpeed; }
                        else { s.state = 'forward'; s.vx = (s.x-cx)/dist*10; s.vy = (s.y-cy)/dist*10; }
                    }
                } else if (s.state === 'fly') { s.x += s.vx; s.y += s.vy; s.op -= 0.02; }
                else { s.x += s.vx; s.y += s.vy; s.scale += actualSpeed * 0.01; s.op -= 0.04; }

                ctx.save();
                ctx.beginPath(); ctx.arc(s.x, s.y, s.r * s.scale, 0, Math.PI*2);
                ctx.fillStyle = `rgba(255,255,255,${s.op})`;
                ctx.shadowColor = "white"; ctx.shadowBlur = 10 * s.scale;
                ctx.fill(); ctx.restore();

                if (s.op <= 0 || s.y > canvas.height + 50) snowflakes.splice(i, 1);
            }
        }

        speedSlider.addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            percentLabel.innerText = `${val.toFixed(1)}%`;
            trackFill.style.width = `${val}%`;
            targetSpeed = (val / 100) * MAX_SPEED;
            targetTemp = 28 - (val / 100) * 8;
            led.classList.toggle('active', val > 0);
        });

        physicsLoop();
    </script>
</body>
</html>
