<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>極致冷卻 - 商業級物理模擬風扇</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-base: #04070a;
            --panel-bg: rgba(12, 18, 28, 0.85);
            --accent-blue: #00e5ff;
            --accent-glow: rgba(0, 229, 255, 0.6);
            --accent-ice: #81d4fa;
            --accent-red: #ff3366;
            --text-main: #e0e6ed;
            --text-muted: #6c7d93;
        }

        body, html {
            background-color: var(--bg-base);
            height: 100dvh;
            margin: 0;
            padding: 0;
            color: var(--text-main);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            user-select: none; 
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }

        #frostOverlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at center, rgba(0, 180, 255, 0.15) 0%, rgba(0, 25, 50, 0.7) 100%);
            opacity: 0; 
            pointer-events: none;
            z-index: 1;
            transition: opacity 0.5s linear;
        }

        #windCanvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 5; 
        }

        .app-container {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            height: 100%;
            padding: 10px; 
            box-sizing: border-box;
            max-width: 900px;
            margin: 0 auto;
        }

        .info-overlay {
            position: absolute;
            top: 25px;
            right: 25px;
            text-align: right;
            z-index: 100;
            pointer-events: none;
            text-shadow: 0 0 10px rgba(0,0,0,0.8);
        }

        .overlay-status {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 8px;
            font-family: 'Courier New', monospace;
            margin-bottom: 5px;
        }

        .overlay-temp {
            font-size: 2.8rem;
            font-weight: 700;
            color: var(--accent-ice);
            font-family: 'Courier New', monospace;
            text-shadow: 0 0 20px var(--accent-glow);
            line-height: 1;
        }

        .fan-section {
            flex: 1; 
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            min-height: 0; 
            z-index: 2; 
            padding: 20px 0;
        }

        .fan-showcase {
            position: relative;
            height: 98%; 
            max-width: 100%;
            aspect-ratio: 1 / 1; 
            border-radius: 50%;
            background: radial-gradient(circle, #252525, #030303);
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 
                inset 0 0 60px rgba(0,0,0,0.95), 
                0 20px 60px rgba(0,0,0,0.9),
                0 0 0 6px #151a22,
                0 0 0 10px #3a4759,
                0 0 0 14px #080b0f,
                0 0 30px rgba(0, 229, 255, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            will-change: transform;
        }

        .fan-grill {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: 
                repeating-radial-gradient(rgba(255,255,255,0.02) 0, transparent 4px, transparent 24px),
                repeating-linear-gradient(0deg, transparent, transparent 18px, rgba(255,255,255,0.05) 18px, rgba(255,255,255,0.05) 21px),
                repeating-linear-gradient(90deg, transparent, transparent 18px, rgba(255,255,255,0.05) 18px, rgba(255,255,255,0.05) 21px);
            z-index: 3;
            pointer-events: none;
            box-shadow: inset 0 0 40px rgba(0,0,0,1), inset 0 0 0 2px rgba(255,255,255,0.03);
        }

        .blades-svg {
            width: 88%;
            height: 88%;
            transform-origin: center;
            will-change: transform; 
            filter: drop-shadow(0px 15px 15px rgba(0,0,0,0.95));
        }

        .panel-section {
            flex: 0 0 auto;
            width: 100%;
            max-width: 420px; 
            z-index: 10; 
            padding-bottom: 25px;
        }

        .control-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 24px;
            padding: 18px 28px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.9);
        }

        .led-dot {
            width: 7px; height: 7px; border-radius: 50%;
            background-color: var(--accent-red);
            box-shadow: 0 0 10px var(--accent-red);
            display: inline-block; margin-right: 4px;
        }
        .led-dot.active {
            background-color: var(--accent-blue);
            box-shadow: 0 0 15px var(--accent-blue);
        }

        .custom-badge {
            font-size: 0.65rem;
            background: rgba(255,255,255,0.08);
            padding: 5px 12px; 
            border-radius: 12px;
            color: #aaa; 
            transition: all 0.3s; 
            cursor: pointer;
        }
        .custom-badge.active {
            background: rgba(0, 229, 255, 0.3);
            color: #fff; box-shadow: 0 0 10px var(--accent-blue);
        }
        .needs-unlock { background: rgba(0, 229, 255, 0.5); color: #fff; }

        .track-wrapper {
            position: relative; width: 100%; height: 10px;
            background: #090e15; border-radius: 10px;
            box-shadow: inset 0 3px 6px rgba(0,0,0,0.8);
        }
        .track-fill {
            position: absolute; top: 0; left: 0; height: 100%; width: 0%; 
            background: linear-gradient(90deg, #005c7a 0%, var(--accent-blue) 100%);
            border-radius: 10px; box-shadow: 0 0 15px var(--accent-glow);
        }
        input[type=range] {
            -webkit-appearance: none; appearance: none;
            position: absolute; top: 50%; left: 0; transform: translateY(-50%);
            width: 100%; height: 40px; background: transparent; outline: none; cursor: pointer; z-index: 10;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 30px; height: 30px; border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #5a6673, #242b33);
            border: 2px solid #1a2026; box-shadow: 0 4px 8px rgba(0,0,0,0.8);
        }

        /* 隱藏觸控/點擊時產生的預設高光 */
        * {
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>
<body>

    <div id="frostOverlay"></div>
    <canvas id="windCanvas"></canvas>

    <div class="info-overlay">
        <div class="overlay-status">
            <div class="led-dot" id="powerLed"></div>
            <span style="font-size: 0.8rem; color: #888;">MOTOR:</span>
            <span id="statusText" style="color: var(--text-main); font-weight: bold;">0000 RPM</span>
        </div>
        <div class="overlay-temp">
            <span id="tempText">28.0</span><span style="font-size: 1rem; color: #888; margin-left: 5px;">°C</span>
        </div>
    </div>

    <div class="app-container">
        <div class="fan-section">
            <div class="fan-showcase" id="fanShowcase">
                <div class="fan-grill"></div>
                <svg viewBox="0 0 100 100" class="blades-svg" id="fanBlades">
                    <circle cx="50" cy="50" r="14" fill="#050505" />
                    <g fill="url(#metalGradient)">
                        <path d="M50,50 C30,12 68,2 50,2 C35,5 25,25 50,50" />
                        <path d="M50,50 C88,30 98,68 98,50 C95,35 75,25 50,50" />
                        <path d="M50,50 C70,88 32,98 50,98 C65,95 75,75 50,50" />
                        <path d="M50,50 C12,70 2,32 2,50 C5,65 25,75 50,50" />
                    </g>
                    <defs>
                        <linearGradient id="metalGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#999;" />
                            <stop offset="35%" style="stop-color:#fff;" />
                            <stop offset="100%" style="stop-color:#444;" />
                        </linearGradient>
                    </defs>
                </svg>
            </div>
        </div>

        <div class="panel-section">
            <div class="control-panel">
                <div class="slider-container">
                    <div class="slider-header d-flex justify-content-between mb-3 align-items-center">
                        <div class="d-flex gap-2">
                            <span class="custom-badge needs-unlock" id="audioBadge">解鎖音效</span>
                            <span class="custom-badge" id="snowBadge">SNOW: OFF</span>
                        </div>
                        <span class="slider-percentage" id="percentLabel" style="font-family: monospace; color: var(--accent-blue);">0.0%</span>
                    </div>
                    <div class="track-wrapper">
                        <div class="track-fill" id="trackFill"></div>
                        <input type="range" id="speedSlider" min="0" max="100" value="0" step="0.1">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentRotation = 0, actualSpeed = 0, targetSpeed = 0;
        const ACCELERATION = 0.025, FRICTION = 0.008, MAX_SPEED = 45;
        let currentTemp = 28.0, targetTemp = 28.0;

        const blades = document.getElementById('fanBlades'), showcase = document.getElementById('fanShowcase');
        const statusText = document.getElementById('statusText'), tempText = document.getElementById('tempText');
        const led = document.getElementById('powerLed'), frostOverlay = document.getElementById('frostOverlay');
        const speedSlider = document.getElementById('speedSlider'), percentLabel = document.getElementById('percentLabel');
        const trackFill = document.getElementById('trackFill'), audioBadge = document.getElementById('audioBadge'), snowBadge = document.getElementById('snowBadge');

        // --- 音效系統 ---
        let audioCtx, motorOsc, motorGain, windFilter, windGain;
        let hasUnlockedAudio = false; 
        let isAudioEnabled = false;   

        function initAudio() {
            if (hasUnlockedAudio) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            motorOsc = audioCtx.createOscillator(); motorOsc.type = 'sawtooth';
            const motorFilter = audioCtx.createBiquadFilter(); motorFilter.type = 'lowpass'; motorFilter.frequency.value = 300;
            motorGain = audioCtx.createGain(); motorGain.gain.value = 0;
            motorOsc.connect(motorFilter); motorFilter.connect(motorGain); motorGain.connect(audioCtx.destination);
            motorOsc.start();

            const noiseBuffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 2, audioCtx.sampleRate);
            const output = noiseBuffer.getChannelData(0);
            for (let i = 0; i < output.length; i++) output[i] = Math.random() * 2 - 1;
            const windNoise = audioCtx.createBufferSource(); windNoise.buffer = noiseBuffer; windNoise.loop = true;
            windFilter = audioCtx.createBiquadFilter(); windFilter.type = 'lowpass';
            windGain = audioCtx.createGain(); windGain.gain.value = 0;
            windNoise.connect(windFilter); windFilter.connect(windGain); windGain.connect(audioCtx.destination);
            windNoise.start();

            hasUnlockedAudio = true;
            isAudioEnabled = true;
            updateAudioUI();
        }

        function updateAudioUI() {
            if (isAudioEnabled) {
                audioBadge.innerText = "AUDIO: ON";
                audioBadge.classList.remove('needs-unlock');
                audioBadge.classList.add('active');
            } else {
                audioBadge.innerText = "AUDIO: OFF";
                audioBadge.classList.remove('active', 'needs-unlock');
            }
        }

        audioBadge.addEventListener('click', (e) => {
            e.stopPropagation(); 
            if (!hasUnlockedAudio) {
                initAudio();
            } else {
                isAudioEnabled = !isAudioEnabled;
                updateAudioUI();
            }
        });

        // 背景暫停邏輯
        document.addEventListener('visibilitychange', () => {
            if (audioCtx) {
                if (document.hidden) audioCtx.suspend();
                else audioCtx.resume();
            }
        });
        window.addEventListener('pagehide', () => {
            if (audioCtx && audioCtx.state === 'running') audioCtx.suspend();
        });

        // --- 雪花與互動系統 ---
        const canvas = document.getElementById('windCanvas'), ctx = canvas.getContext('2d');
        let windLines = [], snowflakes = [], isSnowEnabled = false;
        
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();

        for (let i = 0; i < 80; i++) windLines.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, length: Math.random() * 200 + 100, baseSpeed: Math.random() * 5 + 3, thickness: Math.random() * 2 });

        snowBadge.addEventListener('click', (e) => { 
            e.stopPropagation(); // 避免點擊按鈕時觸發背景的雪花
            isSnowEnabled = !isSnowEnabled; 
            snowBadge.innerText = isSnowEnabled ? "SNOW: ON" : "SNOW: OFF"; 
            snowBadge.classList.toggle('active'); 
        });

        // --- 新增：點擊/觸控螢幕產生雪花 ---
        function createInteractionSnowflakes(x, y) {
            if (!isSnowEnabled) return;
            
            // 每次點擊產生 5-10 片雪花
            const numFlakes = Math.floor(Math.random() * 6) + 5;
            for (let i = 0; i < numFlakes; i++) {
                snowflakes.push({
                    x: x + (Math.random() - 0.5) * 40, // 在點擊位置附近稍微散開
                    y: y + (Math.random() - 0.5) * 40,
                    r: Math.random() * 2.5 + 1.5,      // 互動產生的雪花稍微大一點
                    vx: (Math.random() - 0.5) * 4,     // 給予一個初始的爆發速度 (x軸)
                    vy: (Math.random() - 0.5) * 4,     // 給予一個初始的爆發速度 (y軸)
                    scale: 1, 
                    op: 1, 
                    state: 'interactive' // 新增一個狀態來處理剛點擊出來的雪花
                });
            }
        }

        // 監聽滑鼠點擊
        document.addEventListener('mousedown', (e) => {
            if (!hasUnlockedAudio) initAudio(); // 確保首次點擊能解鎖音效
            
            // 避免點擊控制面板時產生雪花 (提升體驗)
            if (e.target.closest('.control-panel')) return;
            createInteractionSnowflakes(e.clientX, e.clientY);
        });

        // 監聽觸控 (針對手機/平板)
        document.addEventListener('touchstart', (e) => {
            if (!hasUnlockedAudio) initAudio();
            
            if (e.target.closest('.control-panel')) return;
            
            // 處理多點觸控
            for(let i = 0; i < e.touches.length; i++) {
                createInteractionSnowflakes(e.touches[i].clientX, e.touches[i].clientY);
            }
        }, { passive: true }); // passive: true 有助於提升滾動效能


        function physicsLoop() {
            if (targetSpeed > actualSpeed) actualSpeed += (targetSpeed - actualSpeed) * ACCELERATION;
            else if (targetSpeed < actualSpeed) actualSpeed -= (actualSpeed - targetSpeed) * FRICTION;
            if (targetSpeed === 0 && actualSpeed < 0.05) actualSpeed = 0;
            const ratio = actualSpeed / MAX_SPEED;

            currentRotation += actualSpeed;
            blades.style.transform = `rotate(${currentRotation}deg)`;

            if (ratio > 0.8) showcase.style.transform = `translate(${(Math.random()-0.5)*ratio*2}px, ${(Math.random()-0.5)*ratio*2}px)`;
            
            if (currentTemp > targetTemp) currentTemp -= 0.012; else if (currentTemp < targetTemp) currentTemp += 0.005;
            tempText.innerText = currentTemp.toFixed(1);
            frostOverlay.style.opacity = Math.max(0, (28 - currentTemp) / 8) * 0.8;

            if (hasUnlockedAudio) {
                if (isAudioEnabled) {
                    motorOsc.frequency.setTargetAtTime(40 + (ratio * 140), audioCtx.currentTime, 0.1);
                    motorGain.gain.setTargetAtTime(ratio > 0 ? 0.3 : 0, audioCtx.currentTime, 0.1);
                    windFilter.frequency.setTargetAtTime(300 + (Math.pow(ratio, 1.5) * 1700), audioCtx.currentTime, 0.1);
                    windGain.gain.setTargetAtTime(Math.pow(ratio, 2) * 1.2, audioCtx.currentTime, 0.1);
                } else {
                    motorGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1);
                    windGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1);
                }
            }

            statusText.innerText = `${(ratio * 1500).toFixed(0).padStart(4, '0')} RPM`;

            renderCanvas(ratio);
            requestAnimationFrame(physicsLoop);
        }

        function renderCanvas(ratio) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 氣流渲染
            if (actualSpeed > 1) {
                ctx.fillStyle = `rgba(129, 212, 250, ${0.4 * ratio})`;
                windLines.forEach(p => {
                    p.x -= p.baseSpeed * actualSpeed * 0.5;
                    if (p.x < -p.length) { p.x = canvas.width + 100; p.y = Math.random() * canvas.height; }
                    ctx.fillRect(p.x, p.y, p.length * ratio, p.thickness);
                });
            }
            
            // 自然落下的雪花
            if (isSnowEnabled && Math.random() < 0.15) {
                snowflakes.push({ 
                    x: Math.random() * canvas.width, 
                    y: -20, 
                    r: Math.random() * 2 + 1, 
                    vx: (Math.random()-0.5)*2, 
                    vy: Math.random()*2+1, 
                    scale: 1, 
                    op: 1, 
                    state: 'fall' 
                });
            }
            
            const rect = showcase.getBoundingClientRect();
            const cx = rect.left + rect.width / 2, cy = rect.top + rect.height / 2;

            for (let i = snowflakes.length - 1; i >= 0; i--) {
                let s = snowflakes[i];
                
                // 狀態機處理雪花物理
                if (s.state === 'fall') {
                    s.x += s.vx; s.y += s.vy;
                    let dist = Math.sqrt((s.x-cx)**2 + (s.y-cy)**2);
                    if (actualSpeed > 10 && dist < 300) {
                        if (Math.random() > 0.4) { s.state = 'fly'; s.vx = (s.x-cx)/dist*actualSpeed; s.vy = (s.y-cy)/dist*actualSpeed; }
                        else { s.state = 'forward'; s.vx = (s.x-cx)/dist*10; s.vy = (s.y-cy)/dist*10; }
                    }
                } 
                else if (s.state === 'fly') { 
                    s.x += s.vx; s.y += s.vy; s.op -= 0.02; 
                }
                else if (s.state === 'forward') { 
                    s.x += s.vx; s.y += s.vy; s.scale += actualSpeed * 0.01; s.op -= 0.04; 
                }
                else if (s.state === 'interactive') {
                    // 互動產生的雪花：先稍微向外擴散，然後受到重力或風力影響
                    s.x += s.vx; 
                    s.y += s.vy;
                    // 模擬空氣阻力，讓初始速度慢下來
                    s.vx *= 0.95; 
                    s.vy *= 0.95; 
                    
                    if (actualSpeed > 10) {
                        // 根據風扇中心點 (cx, cy) 計算向量，產生向外的輻射風力
                        let dx = s.x - cx;
                        let dy = s.y - cy;
                        let dist = Math.sqrt(dx * dx + dy * dy) || 1; // 避免除以零
                        s.vx += (dx / dist) * actualSpeed * 0.05;
                        s.vy += (dy / dist) * actualSpeed * 0.05;
                    } else {
                        s.vy += 0.2; // 簡單重力
                    }
                    
                    s.op -= 0.015; // 逐漸消失
                }

                ctx.save();
                ctx.beginPath(); ctx.arc(s.x, s.y, s.r * s.scale, 0, Math.PI*2);
                ctx.fillStyle = `rgba(255,255,255,${s.op})`;
                ctx.shadowColor = "white"; ctx.shadowBlur = 10 * s.scale;
                ctx.fill(); ctx.restore();
                
                // 清理越界或透明的雪花
                if (s.op <= 0 || s.y > canvas.height + 50 || s.x < -50 || s.x > canvas.width + 50) {
                    snowflakes.splice(i, 1);
                }
            }
        }

        speedSlider.addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            percentLabel.innerText = `${val.toFixed(1)}%`;
            trackFill.style.width = `${val}%`;
            targetSpeed = (val / 100) * MAX_SPEED;
            targetTemp = 28 - (val / 100) * 8;
            led.classList.toggle('active', val > 0);
        });

        physicsLoop();
    </script>
</body>
</html>
