<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>專業籃球戰術板 (行動端按鈕完美修復版)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        html, body {
            height: 100dvh; 
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #212529; 
            user-select: none; 
            -webkit-touch-callout: none;
        }

        .app-container {
            display: flex;
            flex-direction: row; 
            height: 100dvh;
            width: 100vw;
        }

        /* --- 左側控制欄 --- */
        .sidebar {
            background-color: #ffffff;
            box-shadow: 2px 0 15px rgba(0,0,0,0.5);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            width: 240px; 
            flex-shrink: 0;
            height: 100%;
            overflow-y: auto; 
            -webkit-overflow-scrolling: touch; 
            padding: 15px;
        }

        .sidebar-group {
            border-bottom: 1px solid #dee2e6;
            padding-bottom: 15px;
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            flex-shrink: 0; 
        }
        .sidebar-group:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }

        @media (max-width: 768px) {
            .sidebar { width: 130px; padding: 10px; }
            .sidebar-group { padding-bottom: 10px; margin-bottom: 10px; }
            .sidebar h4 { font-size: 1.1rem !important; }
            .sidebar label, .sidebar small { font-size: 0.75rem !important; }
            .btn { font-size: 0.8rem; padding: 0.25rem 0.5rem; }
        }

        /* --- 【終極修復】徹底消滅手機上 Bootstrap 按鈕的殘留顏色 --- */
        @media (hover: none) {
            /* 針對清除畫布按鈕 (紅) */
            .btn-outline-danger:hover, 
            .btn-outline-danger:focus, 
            .btn-outline-danger:focus-visible {
                color: #dc3545 !important;
                background-color: transparent !important;
                border-color: #dc3545 !important;
                box-shadow: none !important;
            }
            .btn-outline-danger:active {
                color: #fff !important;
                background-color: #dc3545 !important;
            }

            /* 針對全部重置按鈕 (黑) */
            .btn-outline-dark:hover, 
            .btn-outline-dark:focus, 
            .btn-outline-dark:focus-visible {
                color: #212529 !important;
                background-color: transparent !important;
                border-color: #212529 !important;
                box-shadow: none !important;
            }
            .btn-outline-dark:active {
                color: #fff !important;
                background-color: #212529 !important;
            }
        }

        /* --- 右側戰術板容納區 --- */
        .board-wrapper {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            touch-action: none; 
        }

        #tactics-board {
            position: relative;
            width: 900px;
            height: 550px;
            background-color: #e0ac69;
            border: 10px solid #333;
            border-radius: 8px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
            transform-origin: center center;
            flex-shrink: 0;
            transition: background-color 0.3s, border-color 0.3s;
        }

        .court-lines {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none; 
            opacity: 0.8;
        }
        .court-lines * { transition: stroke 0.3s; }

        #drawCanvas { position: absolute; top: 0; left: 0; z-index: 1; }

        /* --- 旗幟設定 --- */
        .flag {
            position: absolute;
            width: 35px; height: 35px;
            border-radius: 50%;
            background-color: #fff;
            border: 3px solid #000;
            color: #000;
            font-weight: bold; font-size: 18px;
            display: flex; align-items: center; justify-content: center;
            cursor: grab; 
            z-index: 10;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.5);
            transition: transform 0.05s ease;
            will-change: left, top, transform;
            touch-action: none; 
        }
        
        .flag::after {
            content: '';
            position: absolute;
            top: -20px; left: -20px; right: -20px; bottom: -20px;
            border-radius: 50%;
        }

        .flag:active { cursor: grabbing !important; transform: scale(1.15); }
        .flag.offense { background-color: #ff4d4d; color: white; border-color: #b30000; } 
        .flag.defense { background-color: #4da6ff; color: white; border-color: #0059b3; } 
        .flag.ball { background-color: #ff9900; border-color: #cc7a00; width: 25px; height: 25px; z-index: 11;} 

        /* 畫筆顏色選擇器美化 */
        .color-picker-wrapper { cursor: pointer; }
        #penColorPicker { 
            width: 25px; height: 25px; padding: 0; border: none; background: transparent; cursor: pointer;
        }
        #penColorPicker::-webkit-color-swatch-wrapper { padding: 0; }
        #penColorPicker::-webkit-color-swatch { border: 2px solid #ccc; border-radius: 4px; }
    </style>
</head>
<body>

<div class="app-container">
    
    <aside class="sidebar">
        <div class="text-center mt-2 mb-2">
            <h4 class="fw-bold mb-0">🏀 戰術板</h4>
            <small id="status-bar" class="text-muted d-block mt-1">就緒</small>
        </div>

        <div class="sidebar-group">
            <select id="themeSelector" class="form-select form-select-sm mb-3" onchange="changeTheme(this.value)">
                <option value="classic">🌲 經典木紋</option>
                <option value="blue">🟦 現代藍色</option>
                <option value="dark">🟫 深色硬木</option>
                <option value="street">⬛ 街頭黑灰</option>
            </select>
            
            <label class="btn btn-outline-secondary btn-sm w-100 d-flex align-items-center justify-content-center gap-2 mb-0 color-picker-wrapper" for="penColorPicker">
                <span>畫筆顏色</span>
                <input type="color" id="penColorPicker" value="#333333">
            </label>
        </div>

        <div class="sidebar-group border-bottom-0 pb-0">
            <div class="btn-group-vertical w-100 mb-3" role="group">
                <input type="radio" class="btn-check" name="mode" id="modeMove" checked onclick="setMode('move')">
                <label class="btn btn-outline-primary" for="modeMove">✋ 移動</label>
                
                <input type="radio" class="btn-check" name="mode" id="modeDraw" onclick="setMode('draw')">
                <label class="btn btn-outline-secondary" for="modeDraw">✏️ 畫線</label>
            </div>
            
            <button class="btn btn-sm btn-outline-danger w-100 mb-2" onclick="clearLines(this)">🧹 清除畫布</button>
            <button class="btn btn-sm btn-outline-dark w-100 mb-2" onclick="resetBoard(this)">🔄 全部重置</button>
        </div>
    </aside>

    <main class="board-wrapper" id="board-wrapper">
        <div id="tactics-board">
            <svg class="court-lines" viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
                <rect class="court-svg-elem" x="0" y="0" width="900" height="550" fill="none" stroke="white" stroke-width="2"/>
                <line class="court-svg-elem" x1="450" y1="0" x2="450" y2="550" stroke="white" stroke-width="2"/>
                <circle class="court-svg-elem" cx="450" cy="275" r="60" fill="none" stroke="white" stroke-width="2"/>
                <rect class="court-svg-elem" x="0" y="185" width="170" height="180" fill="none" stroke="white" stroke-width="2"/>
                <path class="court-svg-elem" d="M 170 185 A 60 60 0 0 1 170 365" fill="none" stroke="white" stroke-width="2" stroke-dasharray="5,5"/> 
                <path class="court-svg-elem" d="M 0 40 L 140 40 A 250 250 0 0 1 140 510 L 0 510" fill="none" stroke="white" stroke-width="2"/> 
                <rect class="court-svg-elem" x="730" y="185" width="170" height="180" fill="none" stroke="white" stroke-width="2"/>
                <path class="court-svg-elem" d="M 730 185 A 60 60 0 0 0 730 365" fill="none" stroke="white" stroke-width="2" stroke-dasharray="5,5"/>
                <path class="court-svg-elem" d="M 900 40 L 760 40 A 250 250 0 0 0 760 510 L 900 510" fill="none" stroke="white" stroke-width="2"/>
            </svg>

            <canvas id="drawCanvas" width="900" height="550"></canvas>
        </div>
    </main>
</div>

<script>
    const boardWrapper = document.getElementById('board-wrapper');
    const board = document.getElementById('tactics-board');
    const canvas = document.getElementById('drawCanvas');
    const ctx = canvas.getContext('2d');
    const statusBar = document.getElementById('status-bar');
    const penColorPicker = document.getElementById('penColorPicker');

    let currentMode = 'move'; 
    let isDrawing = false;
    let activeFlag = null; 
    let initialPositions = []; 
    let scaleFactor = 1;

    let dragTargetX = 0;
    let dragTargetY = 0;
    let isDragPending = false; 

    const penCursor = `url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24'><text y='20' font-size='20'>✏️</text></svg>") 0 20, crosshair`;

    const courtThemes = {
        classic: { bg: '#e0ac69', line: '#ffffff', border: '#333333' },
        blue:    { bg: '#2b5e9c', line: '#ffffff', border: '#1a3b63' },
        dark:    { bg: '#6b4226', line: '#f0d9b5', border: '#382212' },
        street:  { bg: '#555555', line: '#ffffff', border: '#222222' }
    };

    const flagConfigs = [
        { id: 'off1', class: 'flag offense', text: '1' }, { id: 'off2', class: 'flag offense', text: '2' },
        { id: 'off3', class: 'flag offense', text: '3' }, { id: 'off4', class: 'flag offense', text: '4' },
        { id: 'off5', class: 'flag offense', text: '5' },
        { id: 'def1', class: 'flag defense', text: '1' }, { id: 'def2', class: 'flag defense', text: '2' },
        { id: 'def3', class: 'flag defense', text: '3' }, { id: 'def4', class: 'flag defense', text: '4' },
        { id: 'def5', class: 'flag defense', text: '5' },
        { id: 'ball', class: 'flag ball', text: '🏀' }
    ];
    const flags = []; 

    function init() {
        createFlags();
        initCanvas();
        setupGlobalEvents();
        setMode('move'); 
        changeTheme('classic'); 
        
        resizeBoard();
        window.addEventListener('resize', resizeBoard);
    }

    function resizeBoard() {
        const availableWidth = boardWrapper.clientWidth;
        const availableHeight = boardWrapper.clientHeight;
        const targetW = availableWidth - 20;
        const targetH = availableHeight - 20;
        
        const scaleX = targetW / 900;
        const scaleY = targetH / 550;
        
        scaleFactor = Math.min(scaleX, scaleY); 
        board.style.transform = `scale(${scaleFactor})`;
    }

    function getPointerPos(e) {
        if (e.touches && e.touches.length > 0) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
        else if (e.changedTouches && e.changedTouches.length > 0) return { x: e.changedTouches[0].clientX, y: e.changedTouches[0].clientY };
        return { x: e.clientX, y: e.clientY };
    }

    function changeTheme(themeKey) {
        const theme = courtThemes[themeKey];
        if(!theme) return;
        board.style.backgroundColor = theme.bg;
        board.style.borderColor = theme.border;
        document.querySelectorAll('.court-svg-elem').forEach(el => el.setAttribute('stroke', theme.line));
        penColorPicker.value = (themeKey === 'street' || themeKey === 'dark') ? '#ffffff' : '#333333';
    }

    function setMode(mode) {
        currentMode = mode;
        if (mode === 'draw') {
            statusBar.textContent = "✏️ 畫筆";
            canvas.style.cursor = penCursor;
            flags.forEach(f => { f.style.pointerEvents = 'none'; });
        } else {
            statusBar.textContent = "✋ 移位";
            canvas.style.cursor = 'grab';
            flags.forEach(f => { f.style.pointerEvents = 'auto'; });
        }
    }

    function createFlags() {
        flagConfigs.forEach((config) => {
            const el = document.createElement('div');
            el.id = config.id;
            el.className = config.class;
            el.innerHTML = config.text;
            
            let top, left;
            if (config.id.includes('off')) { left = 50; top = 60 + (parseInt(config.text) - 1) * 90; } 
            else if (config.id.includes('def')) { left = 815; top = 60 + (parseInt(config.text) - 1) * 90; } 
            else { left = 437; top = 262; }
            
            el.style.left = left + 'px';
            el.style.top = top + 'px';
            
            initialPositions.push({ id: config.id, left: left, top: top });
            
            el.addEventListener('mousedown', onPointerDown);
            el.addEventListener('touchstart', onPointerDown, { passive: false });
            
            board.appendChild(el);
            flags.push(el);
        });
    }

    function setupGlobalEvents() {
        document.addEventListener('mousemove', onPointerMove, { passive: false });
        document.addEventListener('touchmove', onPointerMove, { passive: false });
        
        document.addEventListener('mouseup', onPointerUp);
        document.addEventListener('touchend', onPointerUp);

        canvas.addEventListener('mousedown', onCanvasPointerDown);
        canvas.addEventListener('touchstart', onCanvasPointerDown, { passive: false });
    }

    function onPointerDown(e) {
        if (currentMode !== 'move') return;
        e.preventDefault(); 
        
        let pos = getPointerPos(e);
        activeFlag = e.target;
        activeFlag.style.zIndex = 100; 
        
        activeFlag.startX = pos.x;
        activeFlag.startY = pos.y;
        activeFlag.startLeft = activeFlag.offsetLeft;
        activeFlag.startTop = activeFlag.offsetTop;
    }

    function onCanvasPointerDown(e) {
        if (currentMode !== 'draw') return;
        e.preventDefault();
        
        isDrawing = true;
        let pos = getPointerPos(e);
        const rect = canvas.getBoundingClientRect();
        
        let x = (pos.x - rect.left) / scaleFactor;
        let y = (pos.y - rect.top) / scaleFactor;
        
        ctx.beginPath();
        ctx.moveTo(x, y);
    }

    function renderDragPosition() {
        if (activeFlag) {
            activeFlag.style.left = dragTargetX + 'px';
            activeFlag.style.top = dragTargetY + 'px';
        }
        isDragPending = false;
    }

    function onPointerMove(e) {
        if (activeFlag && currentMode === 'move') {
            e.preventDefault();
            let pos = getPointerPos(e);
            
            let dx = (pos.x - activeFlag.startX) / scaleFactor;
            let dy = (pos.y - activeFlag.startY) / scaleFactor;
            
            let x = activeFlag.startLeft + dx;
            let y = activeFlag.startTop + dy;
            
            const flagSize = activeFlag.offsetWidth;
            const boardWidth = 900; 
            const boardHeight = 550;

            if (x < 0) x = 0;
            if (x > boardWidth - flagSize) x = boardWidth - flagSize;
            if (y < 0) y = 0;
            if (y > boardHeight - flagSize) y = boardHeight - flagSize;

            dragTargetX = x;
            dragTargetY = y;
            if (!isDragPending) {
                isDragPending = true;
                requestAnimationFrame(renderDragPosition);
            }
        }

        if (isDrawing && currentMode === 'draw') {
            e.preventDefault();
            let pos = getPointerPos(e);
            ctx.strokeStyle = penColorPicker.value; 
            
            const rect = canvas.getBoundingClientRect();
            let x = (pos.x - rect.left) / scaleFactor;
            let y = (pos.y - rect.top) / scaleFactor;
            
            ctx.lineTo(x, y);
            ctx.stroke();
        }
    }

    function onPointerUp(e) {
        if (activeFlag) { 
            activeFlag.style.zIndex = (activeFlag.id === 'ball') ? 11 : 10; 
            activeFlag = null; 
            isDragPending = false;
        }
        if (isDrawing) { ctx.closePath(); isDrawing = false; }
    }

    function initCanvas() {
        ctx.lineWidth = 3;         
        ctx.lineCap = 'round';     
        ctx.lineJoin = 'round';
    }

    // --- 接收 btn 參數，確保精準消除焦點 ---
    function clearLines(btn = null) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (btn) {
            setTimeout(() => btn.blur(), 50); // 延遲釋放焦點，避免被系統再蓋過
        }
    }

    function resetBoard(btn = null) {
        initialPositions.forEach(pos => {
            const el = document.getElementById(pos.id);
            if (el) { el.style.left = pos.left + 'px'; el.style.top = pos.top + 'px'; }
        });
        clearLines(btn);
    }

    window.onload = init;

</script>
</body>
</html>
