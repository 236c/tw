<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>專業籃球戰術板</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        html, body {
            height: 100dvh; margin: 0; padding: 0; overflow: hidden;
            background-color: #212529; user-select: none; touch-action: none; -webkit-touch-callout: none;
        }
        .app-container { display: flex; flex-direction: row; height: 100dvh; width: 100vw; }
        .sidebar {
            background-color: #ffffff; box-shadow: 2px 0 15px rgba(0,0,0,0.5); z-index: 1000;
            display: flex; flex-direction: column; width: 240px; flex-shrink: 0; height: 100%;
            overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 15px;
        }
        .sidebar-group { border-bottom: 1px solid #dee2e6; padding-bottom: 15px; margin-bottom: 15px; display: flex; flex-direction: column; flex-shrink: 0; }
        .sidebar-group:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }

        @media (max-width: 768px) {
            .sidebar { width: 140px; padding: 10px; }
            .sidebar-group { padding-bottom: 10px; margin-bottom: 10px; }
            .btn { font-size: 0.9rem; }
        }

        .board-wrapper { flex-grow: 1; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; touch-action: none; }
        #tactics-board {
            position: relative; width: 900px; height: 550px; background-color: #e0ac69; border: 10px solid #333;
            border-radius: 8px; box-shadow: 0 15px 30px rgba(0,0,0,0.4); transform-origin: center center;
            flex-shrink: 0; transition: background-color 0.3s, border-color 0.3s;
        }
        .court-lines { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; opacity: 0.8; }
        .court-lines * { transition: stroke 0.3s; }
        #drawCanvas { position: absolute; top: 0; left: 0; z-index: 1; }

        .flag {
            position: absolute; width: 45px; height: 45px; border-radius: 50%;
            background-color: #fff; border: 3px solid #000; color: #000;
            font-weight: bold; font-size: 22px; display: flex; align-items: center; justify-content: center;
            cursor: grab; z-index: 10; box-shadow: 3px 3px 8px rgba(0,0,0,0.5);
            transition: transform 0.05s ease; will-change: left, top, transform; touch-action: none; 
        }
        .flag::after { content: ''; position: absolute; top: -10px; left: -10px; right: -10px; bottom: -10px; border-radius: 50%; }
        .flag:active { cursor: grabbing !important; transform: scale(1.1); }
        .flag.offense { background-color: #ff4d4d; color: white; border-color: #b30000; } 
        .flag.defense { background-color: #4da6ff; color: white; border-color: #0059b3; } 
        .flag.ball { background-color: #ff9900; border-color: #cc7a00; width: 32px; height: 32px; font-size: 18px; z-index: 20; } 

        .color-picker-wrapper { cursor: pointer; }
        #penColorPicker { width: 25px; height: 25px; padding: 0; border: none; background: transparent; cursor: pointer; }
        #penColorPicker::-webkit-color-swatch { border: 2px solid #ccc; border-radius: 4px; }
    </style>
</head>
<body>

<div class="app-container">
    <aside class="sidebar">
        <div class="sidebar-group mt-2">
            <select id="themeSelector" class="form-select mb-3" onchange="changeTheme(this.value)">
                <option value="classic">🏀 經典木紋</option>
                <option value="blue">🧊 現代藍色</option>
                <option value="dark">🌲 深色硬木</option>
                <option value="street">⬛ 街頭黑灰</option>
            </select>
            <div class="d-flex flex-column gap-2 mb-3">
                <input type="radio" class="btn-check" name="mode" id="modeMove" checked onclick="setMode('move')">
                <label class="btn btn-outline-primary py-2 m-0" for="modeMove">✋ 移動</label>
                <input type="radio" class="btn-check" name="mode" id="modeDraw" onclick="setMode('draw')">
                <label class="btn btn-outline-secondary py-2 m-0" for="modeDraw">✏️ 畫線</label>
            </div>
            <label class="btn btn-outline-secondary w-100 d-flex align-items-center justify-content-center gap-2 mb-0 py-2 color-picker-wrapper" for="penColorPicker">
                <span>畫筆顏色</span>
                <input type="color" id="penColorPicker" value="#333333">
            </label>
        </div>
        <div class="sidebar-group border-bottom-0 pb-0">
            <button class="btn btn-danger w-100 mb-2 py-2" onclick="clearLines(this)">🧹 清除畫布</button>
            <button class="btn btn-dark w-100 mb-2 py-2" onclick="resetBoard(this)">🔄 全部重置</button>
        </div>
    </aside>

    <main class="board-wrapper" id="board-wrapper">
        <div id="tactics-board">
            <svg class="court-lines" viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
                <rect class="court-svg-elem" x="0" y="0" width="900" height="550" fill="none" stroke="white" stroke-width="2"/>
                <line class="court-svg-elem" x1="450" y1="0" x2="450" y2="550" stroke="white" stroke-width="2"/>
                <circle class="court-svg-elem" cx="450" cy="275" r="60" fill="none" stroke="white" stroke-width="2"/>
                <rect class="court-svg-elem" x="0" y="185" width="170" height="180" fill="none" stroke="white" stroke-width="2"/>
                <path class="court-svg-elem" d="M 170 185 A 60 60 0 0 1 170 365" fill="none" stroke="white" stroke-width="2" stroke-dasharray="5,5"/> 
                <path class="court-svg-elem" d="M 0 40 L 140 40 A 250 250 0 0 1 140 510 L 0 510" fill="none" stroke="white" stroke-width="2"/> 
                <rect class="court-svg-elem" x="730" y="185" width="170" height="180" fill="none" stroke="white" stroke-width="2"/>
                <path class="court-svg-elem" d="M 730 185 A 60 60 0 0 0 730 365" fill="none" stroke="white" stroke-width="2" stroke-dasharray="5,5"/>
                <path class="court-svg-elem" d="M 900 40 L 760 40 A 250 250 0 0 0 760 510 L 900 510" fill="none" stroke="white" stroke-width="2"/>
            </svg>
            <canvas id="drawCanvas" width="900" height="550"></canvas>
        </div>
    </main>
</div>

<script>
    const boardWrapper = document.getElementById('board-wrapper');
    const board = document.getElementById('tactics-board');
    const canvas = document.getElementById('drawCanvas');
    const ctx = canvas.getContext('2d');
    const penColorPicker = document.getElementById('penColorPicker');

    let currentMode = 'move', isDrawing = false, initialPositions = [], scaleFactor = 1;

    // --- 【全新】多點觸控追蹤 Map ---
    const activeTouches = {}; // { touchId: { element, startX, startY, startLeft, startTop, isCarryingBall, carryOffsetX, carryOffsetY } }

    function init() {
        createFlags();
        initCanvas();
        setupGlobalEvents();
        setMode('move'); 
        changeTheme('classic'); 
        resizeBoard();
        window.addEventListener('resize', resizeBoard);
    }

    function resizeBoard() {
        scaleFactor = Math.min((boardWrapper.clientWidth - 20) / 900, (boardWrapper.clientHeight - 20) / 550); 
        board.style.transform = `scale(${scaleFactor})`;
    }

    function changeTheme(themeKey) {
        const themes = { classic: { bg: '#e0ac69', border: '#333', line: '#fff' }, blue: { bg: '#2b5e9c', border: '#1a3b63', line: '#fff' }, dark: { bg: '#6b4226', border: '#382212', line: '#f0d9b5' }, street: { bg: '#555', border: '#222', line: '#fff' } };
        const t = themes[themeKey];
        board.style.backgroundColor = t.bg; board.style.borderColor = t.border;
        document.querySelectorAll('.court-svg-elem').forEach(el => el.setAttribute('stroke', t.line));
        penColorPicker.value = (themeKey === 'street' || themeKey === 'dark') ? '#ffffff' : '#333333';
    }

    function setMode(mode) {
        currentMode = mode;
        canvas.style.cursor = mode === 'draw' ? 'crosshair' : 'grab';
        flags.forEach(f => f.style.pointerEvents = mode === 'draw' ? 'none' : 'auto');
    }

    function createFlags() {
        flagConfigs.forEach((config) => {
            const el = document.createElement('div');
            el.id = config.id; el.className = config.class; el.innerHTML = config.text;
            let top, left;
            if (config.id.includes('off')) { left = 50; top = 60 + (parseInt(config.text) - 1) * 90; } 
            else if (config.id.includes('def')) { left = 815; top = 60 + (parseInt(config.text) - 1) * 90; } 
            else { left = 437; top = 262; }
            el.style.left = left + 'px'; el.style.top = top + 'px';
            initialPositions.push({ id: config.id, left: left, top: top });
            
            // 多點觸控監聽
            el.addEventListener('touchstart', (e) => onPointerDown(e, true), { passive: false });
            el.addEventListener('mousedown', (e) => onPointerDown(e, false));
            board.appendChild(el);
            flags.push(el);
        });
    }

    function setupGlobalEvents() {
        document.addEventListener('touchmove', (e) => onPointerMove(e, true), { passive: false });
        document.addEventListener('mousemove', (e) => onPointerMove(e, false), { passive: false });
        document.addEventListener('touchend', (e) => onPointerUp(e, true));
        document.addEventListener('mouseup', (e) => onPointerUp(e, false));
        canvas.addEventListener('touchstart', onCanvasDown, { passive: false });
        canvas.addEventListener('mousedown', onCanvasDown);
    }

    // --- 核心：多點觸控開始 ---
    function onPointerDown(e, isTouch) {
        if (currentMode !== 'move') return;
        e.preventDefault();

        const touches = isTouch ? e.changedTouches : [e];
        for (const t of touches) {
            const id = isTouch ? t.identifier : "mouse";
            const target = e.target.closest('.flag');
            if (!target) continue;

            target.style.zIndex = 100;
            const state = {
                element: target,
                startX: t.clientX,
                startY: t.clientY,
                startLeft: target.offsetLeft,
                startTop: target.offsetTop,
                isCarryingBall: false
            };

            // 持球判定 (球優先，只有點擊球員時才檢查球是否在旁邊)
            if (target.id !== 'ball') {
                const ballEl = document.getElementById('ball');
                const dist = Math.hypot((target.offsetLeft + 22.5) - (ballEl.offsetLeft + 16), (target.offsetTop + 22.5) - (ballEl.offsetTop + 16));
                if (dist < 55) { // 加大感應半徑，讓多點觸控更寬容
                    state.isCarryingBall = true;
                    state.carryOffsetX = ballEl.offsetLeft - target.offsetLeft;
                    state.carryOffsetY = ballEl.offsetTop - target.offsetTop;
                }
            }
            activeTouches[id] = state;
        }
    }

    function onCanvasDown(e) {
        if (currentMode !== 'draw') return;
        e.preventDefault();
        isDrawing = true;
        const t = e.touches ? e.touches[0] : e;
        const rect = canvas.getBoundingClientRect();
        ctx.beginPath();
        ctx.moveTo((t.clientX - rect.left) / scaleFactor, (t.clientY - rect.top) / scaleFactor);
    }

    // --- 核心：多點觸控移動 ---
    function onPointerMove(e, isTouch) {
        const touches = isTouch ? e.changedTouches : [e];
        for (const t of touches) {
            const id = isTouch ? t.identifier : "mouse";
            const state = activeTouches[id];

            if (state && currentMode === 'move') {
                e.preventDefault();
                const dx = (t.clientX - state.startX) / scaleFactor;
                const dy = (t.clientY - state.startY) / scaleFactor;
                
                let newX = state.startLeft + dx;
                let newY = state.startTop + dy;

                // 邊界檢查
                const fw = state.element.offsetWidth;
                newX = Math.max(0, Math.min(newX, 900 - fw));
                newY = Math.max(0, Math.min(newY, 550 - fw));

                // 更新位置
                state.element.style.left = newX + 'px';
                state.element.style.top = newY + 'px';

                // 連動球
                if (state.isCarryingBall) {
                    const ballEl = document.getElementById('ball');
                    let bx = newX + state.carryOffsetX;
                    let by = newY + state.carryOffsetY;
                    ballEl.style.left = Math.max(0, Math.min(bx, 900 - 32)) + 'px';
                    ballEl.style.top = Math.max(0, Math.min(by, 550 - 32)) + 'px';
                }
            }
        }

        // 畫線邏輯 (僅支援單點畫線，避免多指亂畫)
        if (isDrawing && currentMode === 'draw') {
            e.preventDefault();
            const t = e.touches ? e.touches[0] : e;
            ctx.strokeStyle = penColorPicker.value; 
            const rect = canvas.getBoundingClientRect();
            ctx.lineTo((t.clientX - rect.left) / scaleFactor, (t.clientY - rect.top) / scaleFactor);
            ctx.stroke();
        }
    }

    // --- 核心：多點觸控放開 ---
    function onPointerUp(e, isTouch) {
        const touches = isTouch ? e.changedTouches : [e];
        for (const t of touches) {
            const id = isTouch ? t.identifier : "mouse";
            const state = activeTouches[id];
            if (state) {
                state.element.style.zIndex = state.element.id === 'ball' ? 20 : 10;
                delete activeTouches[id];
            }
        }
        if (!isTouch || e.touches.length === 0) isDrawing = false;
    }

    const flagConfigs = [
        { id: 'off1', class: 'flag offense', text: '1' }, { id: 'off2', class: 'flag offense', text: '2' }, { id: 'off3', class: 'flag offense', text: '3' }, { id: 'off4', class: 'flag offense', text: '4' }, { id: 'off5', class: 'flag offense', text: '5' },
        { id: 'def1', class: 'flag defense', text: '1' }, { id: 'def2', class: 'flag defense', text: '2' }, { id: 'def3', class: 'flag defense', text: '3' }, { id: 'def4', class: 'flag defense', text: '4' }, { id: 'def5', class: 'flag defense', text: '5' },
        { id: 'ball', class: 'flag ball', text: '🏀' }
    ];
    const flags = []; 
    function initCanvas() { ctx.lineWidth = 3; ctx.lineCap = 'round'; ctx.lineJoin = 'round'; }
    function clearLines(btn = null) { ctx.clearRect(0, 0, canvas.width, canvas.height); if (btn) setTimeout(() => btn.blur(), 50); }
    function resetBoard(btn = null) { initialPositions.forEach(p => { let el = document.getElementById(p.id); el.style.left = p.left + 'px'; el.style.top = p.top + 'px'; }); clearLines(btn); }
    window.onload = init;
</script>
</body>
</html>
