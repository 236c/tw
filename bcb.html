<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>專業籃球戰術板</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        html, body {
            height: 100dvh; 
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #212529; 
            user-select: none; 
            -webkit-touch-callout: none;
        }

        .app-container {
            display: flex;
            flex-direction: row; 
            height: 100dvh;
            width: 100vw;
        }

        .sidebar {
            background-color: #ffffff;
            box-shadow: 2px 0 15px rgba(0,0,0,0.5);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            width: 240px; 
            flex-shrink: 0;
            height: 100%;
            overflow-y: auto; 
            -webkit-overflow-scrolling: touch; 
            padding: 15px;
        }

        .sidebar-group {
            border-bottom: 1px solid #dee2e6;
            padding-bottom: 15px;
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            flex-shrink: 0; 
        }
        .sidebar-group:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }

        @media (max-width: 768px) {
            .sidebar { width: 140px; padding: 10px; }
            .sidebar-group { padding-bottom: 10px; margin-bottom: 10px; }
            .btn { font-size: 0.9rem; }
        }

        /* 按鈕防卡色修復 */
        @media (hover: none) {
            .btn-danger:hover, .btn-danger:focus { background-color: #dc3545 !important; }
            .btn-dark:hover, .btn-dark:focus { background-color: #212529 !important; }
        }

        .board-wrapper {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            touch-action: none; 
        }

        #tactics-board {
            position: relative;
            width: 900px;
            height: 550px;
            box-sizing: content-box; 
            background-color: #2b5e9c; 
            border: 10px solid #1a3b63; 
            border-radius: 8px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
            transform-origin: center center;
            flex-shrink: 0;
            transition: background-color 0.3s, border-color 0.3s;
        }

        .court-lines {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none; 
            opacity: 0.8;
        }
        .court-lines * { transition: stroke 0.3s; }

        #drawCanvas { position: absolute; top: 0; left: 0; z-index: 1; }

        /* 棋幟與球 */
        .flag {
            position: absolute;
            width: 55px;
            height: 55px; 
            box-sizing: border-box; 
            border-radius: 50%;
            background-color: #fff;
            border: 3px solid #000;
            color: #000;
            font-weight: bold; 
            font-size: 26px; 
            display: flex; align-items: center; justify-content: center;
            cursor: grab; 
            z-index: 10;
            box-shadow: 3px 3px 8px rgba(0,0,0,0.5);
            transition: transform 0.05s ease;
            will-change: left, top, transform;
            touch-action: none; 
        }
        
        /* 增加觸控感應區，但「球」不需要太大以免蓋過球員 */
        .flag::after {
            content: '';
            position: absolute;
            top: -10px; left: -10px; right: -10px; bottom: -10px;
            border-radius: 50%;
        }

        .flag:active { cursor: grabbing !important; transform: scale(1.1); }
        .flag.offense { background-color: #ff4d4d; color: white; border-color: #b30000; } 
        .flag.defense { background-color: #4da6ff; color: white; border-color: #0059b3; } 
        
        /* 籃球：z-index 高於球員，確保在上方且優先被點擊 */
        .flag.ball { 
            background-color: #ff9900; 
            border-color: #cc7a00; 
            width: 47px; 
            height: 47px; 
            font-size: 37px; 
            z-index: 20; 
        } 

        .color-picker-wrapper { cursor: pointer; }
        #penColorPicker { width: 25px; height: 25px; padding: 0; border: none; background: transparent; cursor: pointer; }
        #penColorPicker::-webkit-color-swatch { border: 2px solid #ccc; border-radius: 4px; }
    </style>
</head>
<body>

<div class="app-container">
    <aside class="sidebar">
        <div class="sidebar-group mt-2">
            <select id="themeSelector" class="form-select mb-3" onchange="changeTheme(this.value)">
                <option value="blue">🧊 現代藍色</option>
                <option value="classic">🏀 經典木紋</option>
                <option value="dark">🌲 深色硬木</option>
                <option value="street">⬛ 街頭黑灰</option>
                <option value="lioneers">🦁 攻城獅紫</option>
            </select>
            
            <div class="d-flex flex-column gap-2 mb-3">
                <input type="radio" class="btn-check" name="mode" id="modeMove" checked onclick="setMode('move')">
                <label class="btn btn-outline-primary py-2 m-0" for="modeMove">✋ 移動</label>
                
                <input type="radio" class="btn-check" name="mode" id="modeDraw" onclick="setMode('draw')">
                <label class="btn btn-outline-secondary py-2 m-0" for="modeDraw">✏️ 畫線</label>
            </div>

            <label class="btn btn-outline-secondary w-100 d-flex align-items-center justify-content-center gap-2 mb-0 py-2 color-picker-wrapper" for="penColorPicker">
                <span>畫筆顏色</span>
                <input type="color" id="penColorPicker" value="#afff00">
            </label>
        </div>

        <div class="sidebar-group border-bottom-0 pb-0">
            <button class="btn btn-danger w-100 mb-2 py-2" onclick="clearLines(this)">🧹 清除畫布</button>
            <button class="btn btn-dark w-100 mb-2 py-2" onclick="resetBoard(this)">🔄 全部重置</button>
        </div>
    </aside>

    <main class="board-wrapper" id="board-wrapper">
        <div id="tactics-board">
            <svg class="court-lines" viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
                <rect class="court-svg-elem" x="0" y="0" width="900" height="550" fill="none" stroke="white" stroke-width="2"/>
                <line class="court-svg-elem" x1="450" y1="0" x2="450" y2="550" stroke="white" stroke-width="2"/>
                <circle class="court-svg-elem" cx="450" cy="275" r="60" fill="none" stroke="white" stroke-width="2"/>
                <rect class="court-svg-elem" x="0" y="185" width="170" height="180" fill="none" stroke="white" stroke-width="2"/>
                <path class="court-svg-elem" d="M 170 185 A 60 60 0 0 1 170 365" fill="none" stroke="white" stroke-width="2" stroke-dasharray="5,5"/> 
                <path class="court-svg-elem" d="M 0 40 L 140 40 A 250 250 0 0 1 140 510 L 0 510" fill="none" stroke="white" stroke-width="2"/> 
                <rect class="court-svg-elem" x="730" y="185" width="170" height="180" fill="none" stroke="white" stroke-width="2"/>
                <path class="court-svg-elem" d="M 730 185 A 60 60 0 0 0 730 365" fill="none" stroke="white" stroke-width="2" stroke-dasharray="5,5"/>
                <path class="court-svg-elem" d="M 900 40 L 760 40 A 250 250 0 0 0 760 510 L 900 510" fill="none" stroke="white" stroke-width="2"/>
            </svg>
            <canvas id="drawCanvas" width="900" height="550"></canvas>
        </div>
    </main>
</div>

<script>
    const boardWrapper = document.getElementById('board-wrapper');
    const board = document.getElementById('tactics-board');
    const canvas = document.getElementById('drawCanvas');
    const ctx = canvas.getContext('2d');
    const penColorPicker = document.getElementById('penColorPicker');

    let currentMode = 'move', isDrawing = false, activeFlag = null; 
    let initialPositions = [], scaleFactor = 1;
    let dragTargetX = 0, dragTargetY = 0, isDragPending = false; 

    // 持球連動變數
    let isCarryingBall = false;
    let carryOffsetX = 0, carryOffsetY = 0;

    const flagConfigs = [
        { id: 'off1', class: 'flag offense', text: '1' }, { id: 'off2', class: 'flag offense', text: '2' },
        { id: 'off3', class: 'flag offense', text: '3' }, { id: 'off4', class: 'flag offense', text: '4' },
        { id: 'off5', class: 'flag offense', text: '5' },
        { id: 'def1', class: 'flag defense', text: '1' }, { id: 'def2', class: 'flag defense', text: '2' },
        { id: 'def3', class: 'flag defense', text: '3' }, { id: 'def4', class: 'flag defense', text: '4' },
        { id: 'def5', class: 'flag defense', text: '5' },
        { id: 'ball', class: 'flag ball', text: '🏀' }
    ];
    const flags = []; 

    function init() {
        createFlags();
        initCanvas();
        setupGlobalEvents();
        setMode('move'); 
        changeTheme('blue'); 
        resizeBoard();
        window.addEventListener('resize', resizeBoard);
    }

    function resizeBoard() {
        scaleFactor = Math.min((boardWrapper.clientWidth) / 920, (boardWrapper.clientHeight) / 570); 
        board.style.transform = `scale(${scaleFactor})`;
    }

    function getPointerPos(e) {
        let event = e.touches ? e.touches[0] : e;
        return { x: event.clientX, y: event.clientY };
    }

    function changeTheme(themeKey) {
        const themes = {
            blue: { bg: '#2b5e9c', border: '#1a3b63', line: '#fff' },
            classic: { bg: '#e0ac69', border: '#333', line: '#fff' },
            dark: { bg: '#6b4226', border: '#382212', line: '#f0d9b5' },
            street: { bg: '#555', border: '#222', line: '#fff' },
            lioneers: { bg: '#4a197a', border: '#290c47', line: '#fff' } 
        };
        const t = themes[themeKey];
        board.style.backgroundColor = t.bg;
        board.style.borderColor = t.border;
        document.querySelectorAll('.court-svg-elem').forEach(el => el.setAttribute('stroke', t.line));
        
        // 依據不同主題設定預設畫筆顏色
        if (themeKey === 'blue' || themeKey === 'street' || themeKey === 'dark' || themeKey === 'lioneers') {
            penColorPicker.value = '#afff00'; // RGB(175, 255, 0)
        } else {
            penColorPicker.value = '#333333'; // classic
        }
    }

    function setMode(mode) {
        currentMode = mode;
        canvas.style.cursor = mode === 'draw' ? 'crosshair' : 'grab';
        flags.forEach(f => f.style.pointerEvents = mode === 'draw' ? 'none' : 'auto');
    }

    function createFlags() {
        flagConfigs.forEach((config) => {
            const el = document.createElement('div');
            el.id = config.id; el.className = config.class; el.innerHTML = config.text;
            let top, left;
            
            if (config.id.includes('off')) { 
                let num = parseInt(config.text);
                left = 450 - (num * 90) + 17.5; 
                top = 0; // 改為 0，剛好對齊上方邊線
            } else if (config.id.includes('def')) { 
                let num = parseInt(config.text);
                left = 450 + ((num - 1) * 90) + 17.5; 
                top = 0; // 改為 0，剛好對齊上方邊線
            } else { 
                left = 426.5; 
                top = 251.5;  // 籃球維持在中央
            }
            
            el.style.left = left + 'px'; el.style.top = top + 'px';
            initialPositions.push({ id: config.id, left: left, top: top });
            el.addEventListener('mousedown', onPointerDown);
            el.addEventListener('touchstart', onPointerDown, { passive: false });
            board.appendChild(el);
            flags.push(el);
        });
    }

    function setupGlobalEvents() {
        document.addEventListener('mousemove', onPointerMove, { passive: false });
        document.addEventListener('touchmove', onPointerMove, { passive: false });
        document.addEventListener('mouseup', onPointerUp);
        document.addEventListener('touchend', onPointerUp);
        canvas.addEventListener('mousedown', onCanvasPointerDown);
        canvas.addEventListener('touchstart', onCanvasPointerDown, { passive: false });
    }

    function onPointerDown(e) {
        if (currentMode !== 'move') return;
        e.preventDefault(); 
        let pos = getPointerPos(e);
        let target = e.target;

        if (target.id === 'ball' || target.parentElement.id === 'ball') {
            activeFlag = document.getElementById('ball');
            isCarryingBall = false; 
        } else {
            activeFlag = target;
            isCarryingBall = false;
            const ballEl = document.getElementById('ball');
            
            const dist = Math.hypot(
                (activeFlag.offsetLeft + 27.5) - (ballEl.offsetLeft + 23.5),
                (activeFlag.offsetTop + 27.5) - (ballEl.offsetTop + 23.5)
            );
            if (dist < 62) { 
                isCarryingBall = true;
                carryOffsetX = ballEl.offsetLeft - activeFlag.offsetLeft;
                carryOffsetY = ballEl.offsetTop - activeFlag.offsetTop;
            }
        }

        activeFlag.style.zIndex = 100; 
        activeFlag.startX = pos.x; 
        activeFlag.startY = pos.y;
        activeFlag.startLeft = activeFlag.offsetLeft; 
        activeFlag.startTop = activeFlag.offsetTop;
    }

    function onCanvasPointerDown(e) {
        if (currentMode !== 'draw') return;
        e.preventDefault();
        isDrawing = true;
        let pos = getPointerPos(e);
        const rect = canvas.getBoundingClientRect();
        ctx.beginPath();
        ctx.moveTo((pos.x - rect.left) / scaleFactor, (pos.y - rect.top) / scaleFactor);
    }

    function onPointerMove(e) {
        if (!activeFlag || currentMode !== 'move') {
            if (isDrawing && currentMode === 'draw') {
                e.preventDefault();
                let pos = getPointerPos(e);
                ctx.strokeStyle = penColorPicker.value; 
                const rect = canvas.getBoundingClientRect();
                ctx.lineTo((pos.x - rect.left) / scaleFactor, (pos.y - rect.top) / scaleFactor);
                ctx.stroke();
            }
            return;
        }
        e.preventDefault();
        let pos = getPointerPos(e);
        let dx = (pos.x - activeFlag.startX) / scaleFactor;
        let dy = (pos.y - activeFlag.startY) / scaleFactor;
        
        dragTargetX = activeFlag.startLeft + dx;
        dragTargetY = activeFlag.startTop + dy;

        if (!isDragPending) {
            isDragPending = true;
            requestAnimationFrame(() => {
                if (activeFlag) {
                    const boardWidth = 900;
                    const boardHeight = 550;

                    const halfWidth = activeFlag.offsetWidth / 2;
                    const halfHeight = activeFlag.offsetHeight / 2;

                    const minX = -halfWidth;
                    const minY = -halfHeight;
                    const maxX = boardWidth - halfWidth;
                    const maxY = boardHeight - halfHeight;

                    let finalX = Math.max(minX, Math.min(dragTargetX, maxX));
                    let finalY = Math.max(minY, Math.min(dragTargetY, maxY));

                    activeFlag.style.left = finalX + 'px';
                    activeFlag.style.top = finalY + 'px';

                    if (isCarryingBall) {
                        const ballEl = document.getElementById('ball');
                        let ballTargetX = finalX + carryOffsetX;
                        let ballTargetY = finalY + carryOffsetY;

                        const ballHalfWidth = ballEl.offsetWidth / 2;
                        const ballHalfHeight = ballEl.offsetHeight / 2;

                        const ballMinX = -ballHalfWidth;
                        const ballMinY = -ballHalfHeight;
                        const ballMaxX = boardWidth - ballHalfWidth;
                        const ballMaxY = boardHeight - ballHalfHeight;

                        ballEl.style.left = Math.max(ballMinX, Math.min(ballTargetX, ballMaxX)) + 'px';
                        ballEl.style.top = Math.max(ballMinY, Math.min(ballTargetY, ballMaxY)) + 'px';
                    }
                }
                isDragPending = false;
            });
        }
    }

    function onPointerUp() {
        if (activeFlag) {
            activeFlag.style.zIndex = activeFlag.id === 'ball' ? 20 : 10;
            activeFlag = null;
            isCarryingBall = false;
        }
        isDrawing = false;
    }

    function initCanvas() { ctx.lineWidth = 3; ctx.lineCap = 'round'; ctx.lineJoin = 'round'; }
    function clearLines(btn = null) { ctx.clearRect(0, 0, canvas.width, canvas.height); if (btn) btn.blur(); }
    
    function resetBoard(btn = null) {
        initialPositions.forEach(p => { 
            let el = document.getElementById(p.id); 
            el.style.left = p.left + 'px'; 
            el.style.top = p.top + 'px'; 
        });
        clearLines(btn);
        
        setMode('move');
        document.getElementById('modeMove').checked = true;
    }
    window.onload = init;
</script>
</body>
</html>
