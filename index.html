<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>靜網 JING NET | 沉靜心靈與專注工作坊</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+TC:wght@300;400;500;700&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* 日式和色色彩計畫 */
            --bg-main: #FBF9F6;
            --bg-section: #F3EEE7;
            --primary-dark: #2F4F4F;
            --accent-moss: #8E9775;
            --accent-brass: #A67C52;
            --text-main: #333333;
            --text-muted: #666666;
            --border-light: #D3C3A3;
            --shadow-color: rgba(47, 79, 79, 0.03);
            
            --font-title: 'Ma Shan Zheng', cursive;
            --font-body: 'Noto Serif TC', serif;
            --font-accent: 'Playfair Display', serif;
        }

        body { 
            background-color: var(--bg-main);
            font-family: var(--font-body);
            color: var(--text-main);
            padding-top: 100px;
            scroll-padding-top: 120px; 
            line-height: 2;
            -webkit-font-smoothing: antialiased;
        }

        /* 導覽列 */
        .navbar {
            background-color: rgba(251, 249, 246, 0.92) !important;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(211, 195, 163, 0.3);
            padding: 20px 0;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.02);
            z-index: 1050;
        }

        .navbar-brand {
            font-family: var(--font-title);
            color: var(--primary-dark) !important;
            letter-spacing: 1.2em;
            font-size: 1.5rem;
            margin-right: -1.2em;
        }

        .nav-link {
            color: var(--text-main) !important;
            font-size: 0.9rem;
            letter-spacing: 2px;
            position: relative;
            padding: 10px 15px !important;
        }

        /* 主視覺標題區 */
        .hero-section {
            padding: 100px 0 80px;
            text-align: center;
        }

        .header-title { 
            font-family: var(--font-title);
            font-size: 5.5rem;
            letter-spacing: 1.1em;
            margin-right: -1.1em; 
            color: var(--primary-dark);
            padding-bottom: 15px;
        }
        
        .header-subtitle { 
            color: var(--text-muted); 
            letter-spacing: 5px; 
            font-weight: 300;
        }

        /* 區塊標題 */
        .category-title {
            font-weight: 500;
            font-size: 1.3rem; 
            margin-bottom: 3rem;
            color: var(--primary-dark);
            display: flex;
            align-items: center;
            letter-spacing: 3px;
        }

        .section-tinted {
            background-color: var(--bg-section);
            border-top: 1px solid rgba(211, 195, 163, 0.2);
            border-bottom: 1px solid rgba(211, 195, 163, 0.2);
            padding: 5rem 0;
            margin: 5rem 0;
        }

        /* 卡片設計 */
        .card { 
            border: 1px solid rgba(211, 195, 163, 0.4);
            border-radius: 12px;
            background: #ffffff;
            transition: all 0.4s ease;
            height: 100%;
            padding: 2.5rem 2.2rem;
            box-shadow: 0 4px 15px var(--shadow-color);
            position: relative;
        }

        .card:hover { 
            transform: translateY(-4px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.04); 
            border-color: var(--accent-brass);
        }
        
        .icon-wrapper {
            width: 55px; height: 55px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.6rem; 
            background-color: var(--bg-main);
            border: 1px solid rgba(211, 195, 163, 0.3);
            margin-right: 20px;
            flex-shrink: 0;
        }

        .card-header-custom { display: flex; align-items: center; margin-bottom: 25px; }
        .card-title { font-weight: 500; font-size: 1.2rem; letter-spacing: 2px; margin: 0; }
        .card-text { color: var(--text-muted); font-size: 0.95rem; margin-bottom: 35px; font-weight: 300; }

        .btn-custom {
            border-radius: 6px;
            padding: 12px 0; 
            letter-spacing: 3px;
            text-align: center;
            display: block;
            width: 100%;
            text-decoration: none;
            font-size: 0.9rem;
        }

        .btn-outline-zen { border: 1px solid var(--border-light); color: var(--text-main); }
        .btn-outline-zen:hover { background: var(--primary-dark); color: #fff; }
        .btn-solid-zen { background: var(--primary-dark); color: #fff; }

        /* 📱 手機優化：雙欄 + 自動收合支援 */
        @media (max-width: 768px) {
            body { padding-top: 70px; }
            .hero-section { padding: 40px 0 20px; }
            .header-title { font-size: 2.8rem; letter-spacing: 0.4em; margin-right: -0.4em; }
            .header-subtitle { font-size: 0.8rem; letter-spacing: 2px; }
            
            .category-title { font-size: 1.1rem; margin-bottom: 1.5rem; }
            .section-tinted { padding: 3rem 0; margin: 3rem 0; }

            /* 緊湊雙欄卡片 */
            .card { padding: 1.2rem 0.8rem; text-align: center; align-items: center; }
            .card-header-custom { flex-direction: column; margin-bottom: 10px; }
            .icon-wrapper { margin: 0 0 10px 0; width: 45px; height: 45px; font-size: 1.2rem; }
            .card-title { font-size: 0.9rem; letter-spacing: 1px; }
            .card-text { display: none; } /* 隱藏描述節省空間 */
            
            .btn-custom { padding: 8px 0; font-size: 0.75rem; width: 90%; margin: 10px auto 0; }
        }
    </style>
</head>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    document.addEventListener("DOMContentLoaded", function () {
        const navLinks = document.querySelectorAll('.navbar-nav .nav-link');
        const navbarCollapse = document.getElementById('navbarNav');
        // 初始化 Bootstrap 的 Collapse 實體
        const bsCollapse = new bootstrap.Collapse(navbarCollapse, { toggle: false });

        navLinks.forEach(link => {
            link.addEventListener('click', () => {
                if (navbarCollapse.classList.contains('show')) {
                    bsCollapse.hide();
                }
            });
        });
    });
</script>
