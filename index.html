<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>籃球工具箱 - 響應式版</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding-top: 50px; }
        .card { transition: transform 0.2s; border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .card:hover { transform: translateY(-5px); }
        .btn-custom { background-color: #f05a24; color: white; } /* 籃球橘 */
        .btn-custom:hover { background-color: #d4491b; color: white; }
    </style>
</head>
<body>

<div class="container">
    <div class="text-center mb-5">
        <h1 class="display-5 fw-bold text-dark">🏀 籃球教練/隊員工具箱</h1>
        <p class="text-muted">支援手機、平板與桌機顯示</p>
    </div>

    <div class="row g-4">
        <div class="col-12 col-md-6 col-lg-3">
            <div class="card h-100">
                <div class="card-body text-center">
                    <h5 class="card-title fw-bold">籃球戰術版</h5>
                    <p class="card-text text-muted small">即時模擬進攻與防守佈置</p>
                    <a href="https://236c.github.io/tw/bcb.html" class="btn btn-custom w-100 mt-2" target="_blank">開啟連結</a>
                </div>
            </div>
        </div>

        <div class="col-12 col-md-6 col-lg-3">
            <div class="card h-100">
                <div class="card-body text-center">
                    <h5 class="card-title fw-bold">專業籃球記分板</h5>
                    <p class="card-text text-muted small">專業賽事計時與得分紀錄</p>
                    <a href="https://236c.github.io/tw/bsb.html" class="btn btn-custom w-100 mt-2" target="_blank">開啟連結</a>
                </div>
            </div>
        </div>

        <div class="col-12 col-md-6 col-lg-3">
            <div class="card h-100">
                <div class="card-body text-center">
                    <h5 class="card-title fw-bold">籃球數據中心</h5>
                    <p class="card-text text-muted small">球員數據統計與賽後分析</p>
                    <a href="https://236c.github.io/tw/bdc.html" class="btn btn-custom w-100 mt-2" target="_blank">開啟連結</a>
                </div>
            </div>
        </div>

        <div class="col-12 col-md-6 col-lg-3">
            <div class="card h-100 border-primary">
                <div class="card-body text-center">
                    <h5 class="card-title fw-bold">暑期計畫行事曆</h5>
                    <p class="card-text text-muted small">2026 年度暑期訓練時程</p>
                    <a href="https://236c.github.io/tw/spc2026.html" class="btn btn-primary w-100 mt-2" target="_blank">查看計畫</a>
                </div>
            </div>
        </div>

        <div class="col-12 col-md-6 col-lg-3">
            <div class="card h-100 border-primary">
                <div class="card-body text-center">
                    <h5 class="card-title fw-bold">商務行事曆</h5>
                    <p class="card-text text-muted small">商務行事曆 & 全域記事本</p>
                    <a href="https://236c.github.io/tw/bc.html" class="btn btn-primary w-100 mt-2" target="_blank">查看計畫</a>
                </div>
            </div>
        </div>
        
    </div>

    <footer class="text-center mt-5 py-4 text-muted border-top">
        © 2026 籃球工具箱專案
    </footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
