<!DOCTYPE html>
<html lang="zh-TW" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>模擬輸入框與流星背景</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #000;
            overflow: hidden;
            position: relative;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at bottom, #0A0A0F 0%, #000 100%);
            z-index: -3;
        }
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
        }
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 2s infinite ease-in-out;
        }
        .star:nth-child(odd) { background: #fff; }
        .star:nth-child(even) { background: #eee; animation-delay: 1s; }
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        /* ====== 模擬輸入框 ====== */
        .input-container {
            position: relative;
            width: 100%;
            max-width: 360px;
            padding: 0;
            z-index: 1;
        }
        .input-box {
            width: 100%;
            padding: 16px;
            font-size: 16px;
            border: 1px solid #666;
            background-color: #222;
            color: #aaa;
            border-radius: 5px;
            outline: none;
            padding-left: 32px;
        }
        .input-box.active {
            color: white;
            background-color: #333;
        }
        .input-box:focus {
            border-color: #0d6efd;
            box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.25);
        }
        .cursor {
            position: absolute;
            left: 28px;
            top: 50%;
            transform: translateY(-50%);
            width: 2px;
            height: 18px;
            background: white;
            animation: blink-caret 0.75s step-end infinite;
        }
        @keyframes blink-caret {
            50% { background-color: transparent; }
        }
        .input-box.active ~ .cursor { display: none; }

        @media (max-width: 768px) {
            .input-box {
                font-size: 18px;
                padding: 20px;
                padding-left: 40px;
            }
            .cursor {
                left: 36px;
                height: 20px;
            }
        }

        /* ====== 流星與拖尾 ====== */
        .meteor {
            position: fixed;
            width: 2px;
            height: 120px;
            background: linear-gradient(45deg, rgba(255,255,255,1), rgba(255,255,255,0));
            transform: rotate(45deg);
            opacity: 0;
            filter: drop-shadow(0 0 6px rgba(255,255,255,0.8));
            animation: meteor-fall 2s ease-out forwards;
            z-index: -1;
        }
        .meteor::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, rgba(255,255,255,0.5), transparent);
            filter: blur(6px);
            opacity: 0.6;
        }

        /* 流星軌跡 + 漸現 */
        @keyframes meteor-fall {
            0% {
                transform: translate3d(0, 0, 0) rotate(45deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            100% {
                transform: translate3d(-400px, 400px, 0) rotate(45deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body class="d-flex justify-content-center align-items-center min-vh-100">
    <div class="stars" id="stars"></div>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-md-6 col-lg-4">
                <div class="input-container">
                    <input type="text" class="input-box form-control" id="inputBox" readonly>
                    <span class="cursor" id="cursor"></span>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // 星星生成
        const starsContainer = document.getElementById('stars');
        const numStars = 200;
        for (let i = 0; i < numStars; i++) {
            const star = document.createElement('div');
            star.classList.add('star');
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.width = star.style.height = (Math.random() * 2 + 1) + 'px';
            star.style.animationDelay = Math.random() * 2 + 's';
            star.style.animationDuration = (Math.random() * 3 + 2) + 's';
            starsContainer.appendChild(star);
        }

        // 模擬輸入文字
        const inputBox = document.getElementById("inputBox");
        const cursor = document.getElementById("cursor");
        const demoTexts = [
            "AI 可以幫助你什麼？",
            "請輸入你的問題...",
            "今天的天氣如何？",
            "你想知道什麼？",
            "如何學習 JavaScript？"
        ];
        let textIndex = 0, charIndex = 0, typingSpeed = 50, lastTime = null, isTyping = true;

        function typeEffect(timestamp) {
            if (!isTyping) return;
            if (!lastTime) lastTime = timestamp;
            if (timestamp - lastTime >= typingSpeed) {
                if (charIndex < demoTexts[textIndex].length) {
                    inputBox.value = demoTexts[textIndex].slice(0, charIndex + 1);
                    cursor.style.display = 'block';
                    charIndex++;
                } else {
                    cursor.style.display = 'block';
                    setTimeout(switchText, 1500);
                    return;
                }
                lastTime = timestamp;
            }
            requestAnimationFrame(typeEffect);
        }

        function switchText() {
            if (!isTyping) return;
            inputBox.value = "";
            cursor.style.display = 'block';
            charIndex = 0;
            textIndex = (textIndex + 1) % demoTexts.length;
            setTimeout(() => {
                lastTime = null;
                requestAnimationFrame(typeEffect);
            }, 500);
        }

        setTimeout(() => requestAnimationFrame(typeEffect), 500);

        // 點擊進入輸入狀態
        inputBox.addEventListener("click", function() {
            if (isTyping) {
                isTyping = false;
                inputBox.value = "";
                cursor.style.display = 'none';
                inputBox.classList.add("active");
                inputBox.removeAttribute("readonly");
                inputBox.focus();
            }
        });

        // 失焦恢復展示
        inputBox.addEventListener("blur", function() {
            if (inputBox.value.trim() === "") {
                inputBox.classList.remove("active");
                inputBox.setAttribute("readonly", "true");
                isTyping = true;
                charIndex = 0;
                textIndex = 0;
                lastTime = null;
                cursor.style.display = 'block';
                setTimeout(() => requestAnimationFrame(typeEffect), 500);
            }
        });

        // ====== 流星效果 ======
        function createMeteor(angle = 45) {
            const meteor = document.createElement('div');
            meteor.classList.add('meteor');
            const startX = Math.random() * window.innerWidth;
            meteor.style.left = startX + 'px';
            meteor.style.top = Math.random() * window.innerHeight / 2 + 'px';
            meteor.style.transform = `rotate(${angle}deg)`;
            starsContainer.appendChild(meteor);
            setTimeout(() => meteor.remove(), 2500);
        }

        function randomMeteor() {
            const doubleChance = Math.random();
            if (doubleChance < 0.2) {
                // 20% 機率出現雙流星
                createMeteor(45);
                setTimeout(() => createMeteor(60), 200);
            } else {
                createMeteor(45);
            }
            setTimeout(randomMeteor, Math.random() * 4000 + 3000);
        }

        randomMeteor();
    </script>
</body>
</html>
